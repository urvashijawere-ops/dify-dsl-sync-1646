            },

            "language": string | null,

            "intent": string | null,

            "audience": string | null,

            "sentiment": string | null,

            "search_text": string | null,

            "confidence": number | null

            }'
        - id: prompt-seg-usr
          role: user
          text: 'INPUT DOCUMENT (from KB segments):


            {{#1800000000002.doc_text#}}

