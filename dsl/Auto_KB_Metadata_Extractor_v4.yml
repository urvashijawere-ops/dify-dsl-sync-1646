    - data:
        code: "import json\nimport re\n\n\ndef main(llm_output: str) -> dict:\n  \
          \  if not llm_output or not llm_output.strip():\n        return {\n    \
          \        'metadata_json': '{}',\n            'metadata_display': 'ERROR:\
          \ No LLM output received.'\n        }\n\n    raw = llm_output.strip()\n\n\
          \    try:\n        result = json.loads(raw)\n        return _format(result)\n\
          \    except json.JSONDecodeError:\n        pass\n\n    cleaned = re.sub(r'```(?:json)?\\\
          s*', '', raw).strip()\n    cleaned = re.sub(r'```\\s*$', '', cleaned).strip()\n\
          \    try:\n        result = json.loads(cleaned)\n        return _format(result)\n\
          \    except json.JSONDecodeError:\n        pass\n\n    match = re.search(r'\\\
          {[\\s\\S]*\\}', cleaned)\n    if match:\n        try:\n            result\
          \ = json.loads(match.group())\n            return _format(result)\n    \
          \    except json.JSONDecodeError:\n            pass\n\n    return {\n  \
          \      'metadata_json': '{}',\n        'metadata_display': 'ERROR: Could\
          \ not parse metadata. Raw: ' + raw[:300]\n    }\n\n\ndef _format(result:\
          \ dict) -> dict:\n    lines = []\n    for k, v in result.items():\n    \
          \    if isinstance(v, list):\n            v = ', '.join(str(i) for i in\
          \ v)\n        lines.append(f'**{k}**: {v}')\n    return {\n        'metadata_json':\
          \ json.dumps(result, ensure_ascii=False),\n        'metadata_display': '\\\
          n'.join(lines)\n    }\n"
        code_language: python3
        desc: Parse and clean JSON metadata output from LLM
        outputs:
          metadata_display:
            type: string
          metadata_json:
            type: string
        selected: false
        title: Parse Metadata JSON
        type: code
        variables:
        - value_selector:
          - '1744700000013'
          - output
          variable: llm_output
