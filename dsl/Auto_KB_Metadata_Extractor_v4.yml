    - data:
        code: "import json\n\ndef main(segments_response: str) -> dict:\n    try:\n\
          \        data = json.loads(segments_response)\n        segments = data.get('data',\
          \ [])\n        if not segments:\n            return {'doc_text': 'ERROR:\
          \ No segments found in KB response.', 'segment_count': '0'}\n        texts\
          \ = []\n        for seg in segments:\n            content = seg.get('content',\
          \ '').strip()\n            if content:\n                texts.append(content)\n\
          \        combined = '\\n\\n'.join(texts)\n        if len(combined) > 200000:\n\
          \            combined = combined[:200000]\n        return {\n          \
          \  'doc_text': combined,\n            'segment_count': str(len(segments))\n\
          \        }\n    except Exception as e:\n        return {'doc_text': 'ERROR:\
          \ ' + str(e), 'segment_count': '0'}\n"
        code_language: python3
        desc: Parse Dify segments API response and concatenate segment text into a
          single document string for the LLM. Caps at 40 000 chars to avoid LLM timeout.
        outputs:
          doc_text:
            type: string
          segment_count:
            type: string
        selected: false
        title: Parse Segments to Text
        type: code
        variables:
        - value_selector:
          - '1800000000001'
          - body
          variable: segments_response
