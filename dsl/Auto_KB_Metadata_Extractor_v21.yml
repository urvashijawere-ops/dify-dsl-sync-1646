    - data:
        code: "import json\nimport re\n\ndef main(chunk_results: list) -> dict:\n\
          \    merged = {\n        'title': None, 'summary': None, 'document_type':\
          \ None,\n        'domain': None, 'source_type': None, 'topics': [], 'keywords':\
          \ [],\n        'entities': {\n            'persons': [], 'organizations':\
          \ [], 'geopolitical': [],\n            'technologies': [], 'regulations':\
          \ [], 'events': [], 'brands_products': []\n        },\n        'dates':\
          \ {'created_at': None, 'references': []},\n        'language': None, 'intent':\
          \ None, 'audience': None,\n        'sentiment': None, 'search_text': None,\
          \ 'confidence': None\n    }\n    confidences = []\n    summaries = []\n\
          \    for raw in chunk_results:\n        try:\n            s = str(raw).strip()\n\
          \            s = re.sub(r'```(?:json)?\\s*', '', s).strip()\n          \
          \  s = re.sub(r'```\\s*$', '', s).strip()\n            m = re.search(r'\\\
          {[\\s\\S]*\\}', s)\n            if m:\n                s = m.group()\n \
          \           data = json.loads(s)\n        except Exception:\n          \
          \  continue\n        for f in ['title', 'document_type', 'domain', 'source_type',\
          \ 'language', 'intent', 'audience', 'sentiment', 'search_text']:\n     \
          \       if not merged[f] and data.get(f):\n                merged[f] = data[f]\n\
          \        if data.get('summary'):\n            summaries.append(str(data['summary']))\n\
          \        for f in ['topics', 'keywords']:\n            for v in (data.get(f)\
          \ or []):\n                if v and v not in merged[f]:\n              \
          \      merged[f].append(v)\n        ents = data.get('entities') or {}\n\
          \        if isinstance(ents, dict):\n            for sub in ['persons',\
          \ 'organizations', 'geopolitical', 'technologies', 'regulations', 'events',\
          \ 'brands_products']:\n                for v in (ents.get(sub) or []):\n\
          \                    if v and v not in merged['entities'][sub]:\n      \
          \                  merged['entities'][sub].append(v)\n        d = data.get('dates')\
          \ or {}\n        if isinstance(d, dict):\n            if not merged['dates']['created_at']\
          \ and d.get('created_at'):\n                merged['dates']['created_at']\
          \ = d['created_at']\n            for ref in (d.get('references') or []):\n\
          \                if ref and ref not in merged['dates']['references']:\n\
          \                    merged['dates']['references'].append(ref)\n       \
          \ try:\n            if data.get('confidence') is not None:\n           \
