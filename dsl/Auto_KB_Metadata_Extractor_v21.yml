app:
  description: 'Automatically extracts metadata from documents using Gemini AI and
    updates the specified Knowledge Base document in Dify 1.7.2. Supports file upload
    or text paste. Large files use Map-Reduce chunking (max 10 chunks): each chunk
    produces a partial metadata JSON, a code node merges all chunks by union — no
    information loss. After import: set DIFY_API_KEY in workflow Environment Variables.'
