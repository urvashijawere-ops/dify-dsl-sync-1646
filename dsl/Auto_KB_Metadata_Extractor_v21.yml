          \ / len(confidences), 2)\n    merged['topics'] = merged['topics'][:5]\n\
          \    merged['keywords'] = merged['keywords'][:15]\n    return {'merged_metadata':\
          \ json.dumps(merged, ensure_ascii=False)}\n"
