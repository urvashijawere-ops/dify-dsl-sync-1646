            - 入退室管理が使えない

            - カードリーダーの不具合

            - ITMSのエラー

            - BIVALEにログインできない

            - access control system issue


            【消防／給排水】

            - Fire protection systems, alarms, sprinklers, water supply, drainage,
            plumbing

            Examples:

            - 消防設備の点検依頼

            - スプリンクラーの異常

            - 水が出ない

            - 排水トラブル

            - fire alarm issue

            - plumbing problem


            【冷熱機器・冷凍機・冷温水】

            - HVAC, air conditioning, chillers, freezers, refrigeration, hot/cold
