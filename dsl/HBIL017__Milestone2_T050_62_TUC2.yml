    - data:
        code: "import re\nimport json\n\ndef main(aggregated_context) -> dict:\n \
          \   \n    def parse_content_to_dict(content_str):\n        data = {}\n \
          \       pairs = re.findall(r'(\\b[^:]+):\\s*([^;]+);', content_str)\n  \
          \      for key, value in pairs:\n            key = key.strip()\n       \
          \     value = value.strip()\n            if len(key) > 50:\n           \
          \     continue\n            if not value or value.lower() == 'nan':\n  \
          \              data[key] = None\n            elif value.replace('.', '',\
          \ 1).isdigit():\n                try:\n                    data[key] = float(value)\
          \ if '.' in value else int(value)\n                except ValueError:\n\
          \                    data[key] = value\n            else:\n            \
          \    data[key] = value\n        return data\n\n    records = []\n\n    if\
          \ isinstance(aggregated_context, list):\n        for item in aggregated_context:\n\
          \            if isinstance(item, dict) and \"content\" in item and isinstance(item[\"\
          content\"], str):\n                records.append(item[\"content\"])\n \
          \   elif isinstance(aggregated_context, dict) and \"content\" in aggregated_context:\n\
          \        records.append(aggregated_context[\"content\"])\n    elif isinstance(aggregated_context,\
          \ str):\n        records.append(aggregated_context)\n\n    gms_records_strings\
          \ = [\n        json.dumps(parse_content_to_dict(record), ensure_ascii=False)\n\
          \        for record in records\n    ]\n\n    return {\n        \"gms_records\"\
          : gms_records_strings\n    }"
        code_language: python3
        desc: This node uses regex to extract key-value pairs from the text and converts
          them into two JSON arrays, providing structured GMS Schedule and Customer
          Data for further processing.
        outputs:
          gms_records:
            children: null
            type: array[string]
        selected: false
