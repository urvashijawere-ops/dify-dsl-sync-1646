    - data:
        code: "import json\nimport re\nfrom datetime import datetime\nfrom calendar\
          \ import monthrange\nfrom collections import defaultdict\n\n# ------------------\
          \ CONFIGURATION ------------------\n\nBASE_URL = \"https://your-server-domain.com/files\"\
          \n\nREPORT_CATEGORY_MAP = {\n    \"1\": \"メンテナンスレポート\",\n    \"2\": \"ヘリオスレポート\"\
          ,\n    \"3\": \"点検レポート\"\n}\n\nPRODUCT_SERVICE_CATEGORY_MAP = {\n    \"\
          1\": \"エレベーター\",\n    \"2\": \"エスカレーター\",\n    \"3\": \"空調設備\",\n    \"\
          4\": \"ビル管理設備\"\n}\n\n# ------------------ NORMALIZATION ------------------\n\
          \ndef normalize_str(v):\n    if v is None:\n        return \"\"\n    s =\
          \ str(v).strip().replace(\"\\u3000\", \"\")\n    return \"\" if s.lower()\
          \ == \"nan\" else s\n\ndef normalize_key(k):\n    return normalize_str(k).lower().replace(\"\
          _\", \"\").replace(\" \", \"\")\n\ndef parse_content(content_str):\n   \
          \ data = {}\n    if not content_str:\n        return data\n    for k, v\
          \ in re.findall(r'([^:;]+):\\s*([^;]+);', content_str):\n        data[normalize_key(k)]\
          \ = normalize_str(v)\n    return data\n\n# ------------------ DATE HELPERS\
          \ ------------------\n\ndef parse_record_date(date_str):\n    if not date_str:\n\
          \        return None\n\n    for f in (\"%m/%d/%Y\", \"%Y-%m-%d\", \"%Y/%m/%d\"\
          ,\n              \"%d/%m/%Y\", \"%Y年%m月%d日\"):\n        try:\n         \
          \   return datetime.strptime(str(date_str).strip(), f)\n        except:\n\
          \            continue\n    return None\n\ndef format_work_month(date_str):\n\
          \    dt = parse_record_date(date_str)\n    return \"N/A\" if not dt else\
          \ dt.strftime(\"%Y/%m\")\n\n# ------------------ DATE FILTER LOGIC ------------------\n\
          \ndef is_date_in_scope(rec_dt, scope, formatted_date,\n                \
          \     start_date, end_date, discrete_dates):\n\n    if not rec_dt:\n   \
          \     return False\n\n    # ------------------ RANGE ------------------\n\
          \    if scope == \"RANGE\":\n\n        # YEAR RANGE\n        if \"/\" not\
          \ in start_date and \"/\" not in end_date:\n            try:\n         \
          \       return int(start_date) <= rec_dt.year <= int(end_date)\n       \
          \     except:\n                return False\n\n        # MONTH RANGE\n \
          \       try:\n            s_month, s_year = map(int, start_date.split(\"\
          /\"))\n            e_month, e_year = map(int, end_date.split(\"/\"))\n \
          \       except:\n            return False\n\n        start_dt = datetime(s_year,\
          \ s_month, 1)\n        last_day = monthrange(e_year, e_month)[1]\n     \
          \   end_dt = datetime(e_year, e_month, last_day, 23, 59, 59)\n\n       \
          \ return start_dt <= rec_dt <= end_dt\n\n    # ------------------ MULTI\
          \ (Exact Discrete OR) ------------------\n    if scope == \"MULTI\":\n \
          \       for d in discrete_dates or []:\n\n            # Year-only\n    \
          \        if \"/\" not in d:\n                try:\n                    if\
          \ rec_dt.year == int(d):\n                        return True\n        \
          \        except:\n                    continue\n\n            # Month/year\n\
          \            else:\n                try:\n                    m, y = d.split(\"\
          /\")\n                    if rec_dt.month == int(m) and rec_dt.year == int(y):\n\
          \                        return True\n                except:\n        \
          \            continue\n\n        return False\n\n    # ------------------\
          \ YEAR ------------------\n    if scope == \"YEAR\":\n        try:\n   \
          \         return rec_dt.year == int(formatted_date)\n        except:\n \
          \           return False\n\n    # ------------------ MONTH ------------------\n\
          \    if scope == \"MONTH\":\n        try:\n            m, y = formatted_date.split(\"\
          /\")\n            return rec_dt.month == int(m) and rec_dt.year == int(y)\n\
          \        except:\n            return False\n\n    # ------------------ LATEST\
          \ ------------------\n    if scope == \"LATEST\":\n        return True\n\
          \n    return True\n\n# ------------------ LATEST GROUPING ------------------\n\
          \ndef select_latest_per_group(records):\n    latest = {}\n\n    for r in\
          \ records:\n        dt = parse_record_date(r.get(\"workenddate\"))\n\n \
          \       key = (\n            r.get(\"customernumber\"),\n            r.get(\"\
          officecode\"),\n            r.get(\"productservicecategory\"),\n       \
          \     r.get(\"reportcategory\")\n        )\n\n        if key not in latest:\n\
          \            latest[key] = (dt, r)\n        else:\n            prev_dt =\
          \ latest[key][0]\n            if dt and (not prev_dt or dt > prev_dt):\n\
          \                latest[key] = (dt, r)\n\n    return [v[1] for v in latest.values()]\n\
          \n# ------------------ MAIN ------------------\n\ndef main(report_records,\
          \ customer_number, office_code, query_input):\n\n    target_cust = normalize_str(customer_number)\n\
          \    target_office = normalize_str(office_code)\n\n    try:\n        params\
          \ = query_input if isinstance(query_input, dict) else json.loads(str(query_input))\n\
          \    except:\n        params = {}\n\n    target_equip_codes = set(map(str,\
          \ params.get(\"equipment_codes\", [])))\n    target_report_codes = set(map(str,\
          \ params.get(\"report_type_codes\", [])))\n\n    formatted_date = params.get(\"\
          formatted_date\", \"\")\n    start_date = params.get(\"start_date\", \"\"\
          )\n    end_date = params.get(\"end_date\", \"\")\n    scope = params.get(\"\
          date_scope\", \"LATEST\")\n    discrete_dates = params.get(\"discrete_dates\"\
          , [])\n\n    parsed_reports = []\n    kb_customers = set()\n\n    for rec\
          \ in report_records or []:\n        try:\n            obj = json.loads(rec)\
          \ if isinstance(rec, str) else rec\n\n            full = {normalize_key(k):\
          \ normalize_str(v)\n                    for k, v in obj.items()}\n\n   \
          \         full.update(parse_content(obj.get(\"content\", \"\")))\n     \
          \       full[\"_raw\"] = obj\n\n            parsed_reports.append(full)\n\
          \n            if full.get(\"customernumber\"):\n                kb_customers.add(full.get(\"\
          customernumber\"))\n\n        except:\n            continue\n\n    # ------------------\
          \ PRIORITY 1: CUSTOMER ------------------\n\n    if target_cust not in kb_customers:\n\
          \        return {\n            \"aggregated_result\": json.dumps([], ensure_ascii=False),\n\
          \            \"pdf_list\": [],\n            \"matching_reports\": [],\n\
          \            \"count\": 0,\n            \"customer_number_present\": \"\
          false\",\n            \"office_code_present\": \"false\",\n            \"\
          equipment_present\": \"false\",\n            \"report_present\": \"false\"\
          \n        }\n\n    cust_filtered = [\n        r for r in parsed_reports\n\
          \        if r.get(\"customernumber\") == target_cust\n    ]\n\n    # ------------------\
          \ PRIORITY 2: BRANCH ------------------\n\n    office_filtered = [\n   \
          \     r for r in cust_filtered\n        if r.get(\"officecode\") == target_office\n\
          \    ]\n\n    if not office_filtered:\n        return {\n            \"\
          aggregated_result\": json.dumps([], ensure_ascii=False),\n            \"\
          pdf_list\": [],\n            \"matching_reports\": [],\n            \"count\"\
          : 0,\n            \"customer_number_present\": \"true\",\n            \"\
          office_code_present\": \"false\",\n            \"equipment_present\": \"\
          false\",\n            \"report_present\": \"false\"\n        }\n\n    #\
          \ ------------------ PRIORITY 3: EQUIPMENT + REPORT ------------------\n\
          \n    er_filtered = [\n        r for r in office_filtered\n        if (not\
          \ target_equip_codes or\n            r.get(\"productservicecategory\") in\
          \ target_equip_codes)\n        and\n        (not target_report_codes or\n\
          \            r.get(\"reportcategory\") in target_report_codes)\n    ]\n\n\
          \    # ------------------ DATE FILTERING ------------------\n\n    if scope\
          \ == \"LATEST\":\n        scoped = select_latest_per_group(er_filtered)\n\
          \n    else:\n        scoped = [\n            r for r in er_filtered\n  \
          \          if is_date_in_scope(\n                parse_record_date(r.get(\"\
          workenddate\")),\n                scope,\n                formatted_date,\n\
          \                start_date,\n                end_date,\n              \
          \  discrete_dates\n            )\n        ]\n\n        # For single month/year\
          \ we still return latest per group\n        if scope in [\"YEAR\", \"MONTH\"\
          ]:\n            scoped = select_latest_per_group(scoped)\n\n    if not scoped:\n\
          \        return {\n            \"aggregated_result\": json.dumps([], ensure_ascii=False),\n\
          \            \"pdf_list\": [],\n            \"matching_reports\": [],\n\
          \            \"count\": 0,\n            \"customer_number_present\": \"\
          true\",\n            \"office_code_present\": \"true\",\n            \"\
          equipment_present\": \"true\",\n            \"report_present\": \"false\"\
          \n        }\n\n    # ------------------ SUCCESS RESPONSE ------------------\n\
          \n    grouped = {}\n\n    pdf_list = []\n\n    for r in scoped:\n\n    \
          \    w_month = format_work_month(r.get(\"workenddate\"))\n\n        report_label\
          \ = REPORT_CATEGORY_MAP.get(\n            r.get(\"reportcategory\"), \"\
          Unknown\"\n        )\n\n        product_label = PRODUCT_SERVICE_CATEGORY_MAP.get(\n\
          \            r.get(\"productservicecategory\"), \"Unknown\"\n        )\n\
          \n        building_name = (\n            r.get(\"fncdecryptaes256\")\n \
          \           or r.get(\"buildingname\")\n            or r.get(\"building_name\"\
          )\n            or r.get(\"propertyname\")\n            or \"\"\n       \
          \ )\n\n        key = w_month\n\n        if key not in grouped:\n       \
          \     grouped[key] = {\n                \"支社コード\": r.get(\"officecode\"\
          ),\n                \"お客さま番号\": r.get(\"customernumber\"),\n           \
          \     \"ビル名\": building_name,\n                \"作業月\": w_month,\n     \
          \           \"レポート種類\": set(),\n                \"製品・サービス分類\": set()\n \
          \           }\n\n        grouped[key][\"レポート種類\"].add(report_label)\n  \
          \      grouped[key][\"製品・サービス分類\"].add(product_label)\n\n        fname =\
          \ (\n            r.get(\"reportfilename\")\n            or f\"report_{r.get('customernumber')}_{w_month.replace('/',\
          \ '')}.pdf\"\n        )\n\n        pdf_list.append({\n            \"filename\"\
          : fname,\n            \"content\": fname\n        })\n\n    # Sort months\n\
          \    sorted_months = sorted(\n    grouped.keys(),\n    key=lambda x: datetime.strptime(x,\
          \ \"%Y/%m\") if x != \"N/A\" else datetime.min\n)\n\n    final_output =\
          \ []\n\n    for month in sorted_months:\n        data = grouped[month]\n\
          \        final_output.append({\n            \"支社コード\": data[\"支社コード\"],\n\
          \            \"お客さま番号\": data[\"お客さま番号\"],\n            \"ビル名\": data[\"\
          ビル名\"],\n            \"作業月\": data[\"作業月\"],\n            \"レポート種類\": \"\
          , \".join(sorted(data[\"レポート種類\"])),\n            \"製品・サービス分類\": \", \"\
          .join(sorted(data[\"製品・サービス分類\"]))\n        })\n\n    return {\n       \
          \ \"aggregated_result\": json.dumps(\n        final_output,\n        ensure_ascii=False,\n\
          \        indent=2\n    ),\n        \"pdf_list\": pdf_list,\n        \"matching_reports\"\
