          \n    # -----------------------------\n    # 1. FILTER EQUIPMENT\n    #\
          \ -----------------------------\n    for block in result:\n\n        for\
          \ line in block.split('\\n'):\n            if line.startswith(\"Equipment\
          \ Name:\"):\n                name = line.replace(\"Equipment Name:\", \"\
          \").strip()\n                if name not in equipment_list and name != \"\
          N/A\":\n                    equipment_list.append(name)\n\n        if f\"\
          Equipment Name: {clean_user_input}\" in block:\n            filtered_result.append(block)\n\
          \n    # -----------------------------\n    # 2. ERROR LOGIC\n    # -----------------------------\n\
          \    if JAPANESE_RATING_ERROR_PHRASE in response_text or ENGLISH_RATING_ERROR_PHRASE\
          \ in response_lower:\n        error_message_out = \"RATING_ERROR_TRIGGER\"\
          \n        is_validation_success = False\n        next_step = 5\n\n    elif\
          \ not filtered_result or (\n        JAPANESE_EQUIPMENT_ERROR_PHRASE in response_text\n\
          \        or ENGLISH_EQUIPMENT_ERROR_PHRASE in response_lower\n    ):\n \
          \       error_message_out = JAPANESE_EQUIPMENT_ERROR_PHRASE\n        is_validation_success\
          \ = False\n        next_step = 4\n\n    # -----------------------------\n\
          \    # 3. FORMAT OUTPUT\n    # -----------------------------\n    final_output\
          \ = []\n\n    if is_validation_success:\n\n        WEEKDAYS_JP = [\"月\"\
          , \"火\", \"水\", \"木\", \"金\", \"土\", \"日\"]\n\n        def extract(label,\
          \ text_block):\n            pattern = rf\"{label}:\\s*(.*)\"\n         \
          \   match = re.search(pattern, text_block)\n            return match.group(1).strip()\
          \ if match else \"\"\n\n        def format_date(date_str):\n           \
          \ date_formats = [\n                \"%Y-%m-%d\",\n                \"%B\
          \ %d, %Y (%A)\",\n                \"%B %d, %Y\",\n                \"%B %d,\
          \ %Y (%a)\",\n                \"%Y/%m/%d\"\n            ]\n\n          \
          \  for fmt in date_formats:\n                try:\n                    dt\
          \ = datetime.strptime(date_str, fmt)\n                    weekday_jp = WEEKDAYS_JP[dt.weekday()]\n\
          \                    return dt.strftime(f\"%Y年%m月%d日（{weekday_jp}）\")\n\
          \                except:\n                    continue\n\n            return\
          \ date_str  # fallback\n\n        def format_time(time_str):\n         \
          \   if not time_str:\n                return \"時刻未定\"\n\n            lower_time\
          \ = time_str.lower().strip()\n\n            # Normalize all undetermined\
          \ cases\n            if (\n                \"not been determined\" in lower_time\n\
          \                or \"not determined\" in lower_time\n                or\
          \ \"undetermined\" in lower_time\n                or \"未定\" in time_str\n\
          \            ):\n                return \"時刻未定\"\n\n            time_formats\
          \ = [\n                \"%H:%M\",\n                \"%H:%M:%S\",\n     \
          \           \"%I:%M %p\"\n            ]\n\n            for tf in time_formats:\n\
          \                try:\n                    return datetime.strptime(time_str.strip(),\
          \ tf).strftime(\"%H時%M分\")\n                except:\n                  \
          \  continue\n\n            return time_str  # fallback\n\n        for block\
          \ in filtered_result:\n\n            branch_code = extract(\"Branch Code\"\
          , block)\n            customer_number = extract(\"Customer Number\", block)\n\
          \            building_name = extract(\"Building Name\", block)\n       \
          \     equipment_name = extract(\"Equipment Name\", block)\n\n          \
          \  inspection_date_raw = extract(\"Inspection Date\", block)\n         \
          \   start_time_raw = extract(\"Inspection Start Time\", block)\n       \
          \     end_time_raw = extract(\"Inspection End Time\", block)\n\n       \
          \     formatted_date = format_date(inspection_date_raw)\n            formatted_start\
          \ = format_time(start_time_raw)\n            formatted_end = format_time(end_time_raw)\n\
          \n            final_output.append({\n                \"支店コード\": branch_code,\n\
          \                \"顧客番号\": customer_number,\n                \"ビル名\": building_name,\n\
          \                \"設備名称\": equipment_name,\n                \"点検日\": formatted_date,\n\
          \                \"点検開始\": formatted_start,\n                \"点検終了\": formatted_end\n\
          \            })\n\n    # -----------------------------\n    # FINAL RETURN\n\
          \    # -----------------------------\n    return {\n        \"error_message\"\
          : error_message_out,\n        \"is_validation_success\": str(is_validation_success).lower(),\n\
          \        \"next_step\": next_step,\n        \"equipment_list\": equipment_list,\n\
          \        \"aggregated_result\": json.dumps(\n            final_output,\n\
          \            ensure_ascii=False,\n            indent=2\n        )\n    }"
