    - data:
        code: "import json\nfrom datetime import datetime\n\n# --- Utility Functions\
          \ ---\n\ndef format_work_date(date_str):\n    if not date_str:\n       \
          \ return \"N/A\"\n    try:\n        dt = datetime.strptime(date_str, \"\
          %m/%d/%Y\")\n        return dt.strftime(\"%B %d, %Y (%A)\")\n    except:\n\
          \        return date_str\n\ndef format_time(dt_str):\n    if not dt_str\
          \ or dt_str in [\"N/A\", None, \"\"]:\n        return \"N/A\"\n    try:\n\
          \        if dt_str.endswith(\"+00\"):\n            dt_str = dt_str + \"\
          :00\"\n        dt_str = dt_str.replace(\"Z\", \"+00:00\")\n        dt =\
          \ datetime.fromisoformat(dt_str)\n        try:\n            return dt.strftime(\"\
          %-I:%M %p\")   # Linux/macOS\n        except ValueError:\n            return\
          \ dt.strftime(\"%#I:%M %p\")  # Windows\n    except:\n        return \"\
          N/A\"\n\n# --- MAIN FUNCTION (CUSTOM TOOL SIGNATURE) ---\n\ndef main(building_name,\
          \ gms_records, kanri_no, jigyou_cd):\n    try:\n        if not building_name:\n\
          \            building_name = \"\"\n        if not gms_records:\n       \
          \     gms_records = []\n\n        gms = [json.loads(g) for g in gms_records]\n\
          \n        kanri_no = str(kanri_no).strip()\n        jigyou_cd = str(jigyou_cd).strip()\n\
          \        \n        # Mapping for Model Code to Japanese Text\n        model_code_map\
          \ = {\n            \"1\": \"エレベーター\",\n            \"2\": \"エスカレーター\",\n\
