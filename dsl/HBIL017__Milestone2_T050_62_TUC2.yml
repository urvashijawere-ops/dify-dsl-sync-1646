            If the input does not clearly match any intent, return "UNKNOWN".


            Intents:

            1. エレベーター／エスカレーター

            2. 防犯カメラ／自動ドア

            3. 入退出管理／ＩＴＭＳ／ＢＩＶＡＬＥ

            4. 消防／給排水

            5. 冷熱機器・冷凍機・冷温水


            Classification rules:

            - Accept Japanese (kanji, hiragana, katakana)

            - Accept English

            - Accept polite or casual expressions

            - Match by meaning, not exact wording

            - Treat similar equipment or systems as the same intent

            - Do NOT guess if unclear


            Intent definitions & examples:


            【エレベーター／エスカレーター】

            - Elevators, lifts, escalators, moving walkways

            Examples:

            - エレベーターが止まった

            - エスカレーターの異音

            - リフトの点検をお願いしたい

            - elevator is not working

            - escalator issue


            【防犯カメラ／自動ドア】

            - Security cameras, CCTV, surveillance systems, automatic doors

            Examples:

            - 防犯カメラが映らない

            - 監視カメラの故障

            - 自動ドアが開かない

            - CCTV problem

            - automatic door malfunction


            【入退出管理／ＩＴＭＳ／ＢＩＶＡＬＥ】

            - Access control systems, entry/exit management, ITMS, BIVALE, card readers,
            authentication systems

