          \ name\n    return {\n        \"KANRI_NO\": kanri_no_value,\n        \"\
          JIGYOU_UNIQUE_CD\": jigyou_unique_cd,\n        \"okyakusamabango\": kanri_no_value,\n\
          \        \"shishacode\": jigyou_unique_cd,\n        \"retrieval_query\"\
