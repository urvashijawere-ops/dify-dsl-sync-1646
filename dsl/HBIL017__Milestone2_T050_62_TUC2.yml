          \ \"%m/%d/%Y\")\n        return dt.strftime(\"%Y年%m月%d日\")\n    except Exception:\n\
          \        return \"日付不明\"\n\ndef format_time_jp(dt_str):\n    if not dt_str:\n\
          \        return \"\"\n    try:\n        # Handling Dify/ISO date formats\n\
          \        if isinstance(dt_str, str):\n            if dt_str.endswith(\"\
          +00\"):\n                dt_str = dt_str + \":00\"\n            if \"T\"\
          \ not in dt_str and \" \" in dt_str:\n                dt_str = dt_str.replace(\"\
          \ \", \"T\")\n        dt = datetime.fromisoformat(dt_str)\n        return\
          \ dt.strftime(\"%H時%M分\")\n    except Exception:\n        return \"\"\n\n\
          # --- MAIN FUNCTION ---\n\ndef main(gms_records, kanri_no, jigyou_cd):\n\
          \    try:\n        kanri_no = str(kanri_no).strip()\n        jigyou_cd =\
          \ str(jigyou_cd).strip()\n\n        gms = [json.loads(g) for g in gms_records\
          \ if g]\n\n        model_map = {\n            \"1\": \"エレベーター\",\n     \
          \       \"2\": \"エスカレーター\",\n            \"3\": \"空調設備\",\n            \"\
          4\": \"ビル管理設備\"\n        }\n\n        today = datetime.now().date()\n  \
          \      inspections = []\n\n        for g in gms:\n            try:\n   \
          \             # Normalize customer number (removing decimals like .0)\n\
          \                g_kanri = str(int(float(g.get(\"okyakusamabango\", 0))))\n\
          \                g_shisha = str(g.get(\"shishacode\", \"\")).strip()\n \
          \           except (TypeError, ValueError):\n                continue\n\n\
          \            if g_kanri == kanri_no and g_shisha == jigyou_cd:\n       \
          \         try:\n                    work_date_str = g.get(\"scheduledworkdate\"\
          , \"\")\n                    if not work_date_str: continue\n          \
          \          work_date = datetime.strptime(work_date_str, \"%m/%d/%Y\").date()\n\
          \                except (TypeError, ValueError):\n                    continue\n\
          \n                if work_date >= today:\n                    inspections.append(g)\n\
          \n        if not inspections:\n            return {\"result\": [\"次回点検予定はありません。\"\
          ]}\n\n        # Sort by date\n        inspections.sort(key=lambda x: datetime.strptime(x.get(\"\
          scheduledworkdate\"), \"%m/%d/%Y\"))\n\n\n        # Using a dictionary to\
          \ group equipment by the same DateTime header\n        grouped_data = {}\n\
          \        # We also keep a list of keys to preserve the sorted date order\n\
          \        ordered_keys = []\n\n        for g in inspections:\n          \
          \  date_part = format_date_jp(g.get(\"scheduledworkdate\"))\n          \
          \  start_time = format_time_jp(g.get(\"begindatetime\"))\n            end_time\
          \ = format_time_jp(g.get(\"enddatetime\"))\n            \n            #\
          \ Header acts as the unique key for grouping\n            header = f\"{date_part}　{start_time}～{end_time}\"\
          \n            \n            model = model_map.get(str(g.get(\"modelcode\"\
          )), \"設備\")\n            raw_goki = g.get('goki', 'N/A')\n            try:\n\
          \                unit = f\"{int(raw_goki):0>2}号機\"\n            except:\n\
          \                unit = f\"{raw_goki}号機\"\n                \n          \
          \  inspection_label = \"定期点検\"\n            equipment_detail = f\"{model}\
          \ / {unit} / {inspection_label}\"\n\n            if header not in grouped_data:\n\
          \                grouped_data[header] = [equipment_detail]\n           \
          \     ordered_keys.append(header)\n            else:\n                grouped_data[header].append(equipment_detail)\n\
          \n        # Build final strings: \"Header | Equip1 | Equip2\"\n        final_results\
          \ = []\n        for key in ordered_keys:\n            details = \" | \"\
          .join(grouped_data[key])\n            final_results.append(f\"{key} | {details}\"\
          )\n\n        return {\n            \"result\": final_results\n        }\n\
          \n    except Exception as e:\n        return {\n            \"result\":\
          \ [f\"Error: {str(e)}\"]\n        }"
