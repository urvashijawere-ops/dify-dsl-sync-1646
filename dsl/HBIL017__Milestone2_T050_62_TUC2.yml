    - data:
        code: "import re\nimport json\n\ndef main(kb_data: list) -> dict:\n    \n\
          \    # Helper function to extract and structure fields from a single content\
          \ string\n    def parse_content_to_dict(content_str):\n        data = {}\n\
          \        \n        # Extract 'key: value;' pairs\n        pairs = re.findall(r'(\\\
          b[^:]+):\\s*([^;]+);', content_str)\n        \n        for key, value in\
          \ pairs:\n            key = key.strip()\n            value = value.strip()\n\
          \            \n            # Skip invalid long keys (metadata noise)\n \
          \           if len(key) > 50:\n                continue\n            \n\
          \            # Handle null values\n            if value.lower() == 'nan'\
          \ or not value:\n                data[key] = None\n            \n      \
          \      # Convert numeric values\n            elif value.replace('.', '',\
          \ 1).isdigit():\n                try:\n                    data[key] = float(value)\
          \ if '.' in value else int(value)\n                except ValueError:\n\
          \                    data[key] = value\n            else:\n            \
          \    data[key] = value\n                \n        return data\n\n\n    #\
          \ --- Main Execution ---\n\n    gms_dicts = []\n\n    # kb_data is now Array[object]\n\
          \    # Assuming each object contains a 'content' field\n    for item in\
          \ kb_data:\n        content = item.get(\"content\")\n        if content:\n\
          \            parsed_data = parse_content_to_dict(content)\n            gms_dicts.append(parsed_data)\n\
          \n    # Convert dictionaries into JSON strings\n    gms_records_strings\
          \ = [json.dumps(d) for d in gms_dicts]\n\n    return {\n        \"gms_records\"\
          : gms_records_strings\n    }\n\n"
        code_language: python3
        desc: This node uses regex to extract key-value pairs from the text and converts
          them into JSON array, providing structured GMS Schedule Data for further
          processing.
        outputs:
          gms_records:
            children: null
            type: array[string]
        selected: false
