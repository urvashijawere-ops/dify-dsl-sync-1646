    - data:
        code: "import ast\nimport json\nimport time\n\ndef main(FILES_BUNDLE: str):\n\
          \n\tbundle: dict = json.loads(FILES_BUNDLE)\n\n\tWARN_BARE_EXCEPT = \"bare\
          \ 'except:' — use 'except Exception:'\"\n\tWARN_PRINT_STMT  = 'print() found\
          \ — remove before production'\n\tWARN_TODO        = 'TODO/FIXME — resolve\
          \ before deploying'\n\n\tresults   = {}\n\ttotal_err = 0\n\ttotal_wrn =\
          \ 0\n\n\tfor filename, source in bundle.items():\n\t\tentry = {\n\t\t\t\
          'status': 'PASS', 'errors': [], 'warnings': [],\n\t\t\t'lines': 0, 'parse_ms':\
          \ 0.0,\n\t\t}\n\n\t\tif not source or not source.strip():\n\t\t\tentry['errors'].append('Empty\
          \ source — assemble_source_files extraction failed.')\n\t\t\tentry['status']\
          \ = 'FAIL'\n\t\t\ttotal_err += 1\n\t\t\tresults[filename] = entry\n\t\t\t\
          continue\n\n\t\tentry['lines'] = source.count('\\n') + 1\n\n\t\t# Stage\
          \ 1 — AST syntax parse (no disk access required)\n\t\tt0 = time.perf_counter()\n\
          \t\ttry:\n\t\t\ttree = ast.parse(source, filename=filename)\n\t\t\tentry['parse_ms']\
          \ = round((time.perf_counter() - t0) * 1000, 2)\n\t\texcept SyntaxError\
          \ as exc:\n\t\t\tentry['parse_ms'] = round((time.perf_counter() - t0) *\
          \ 1000, 2)\n\t\t\tentry['errors'].append(f'SyntaxError line {exc.lineno}:\
          \ {exc.msg}')\n\t\t\tentry['status'] = 'FAIL'\n\t\t\ttotal_err += 1\n\t\t\
          \tresults[filename] = entry\n\t\t\tcontinue\n\n\t\t# Stage 2 — AST quality\
          \ checks (in-memory AST walk, no disk access)\n\t\tfor node in ast.walk(tree):\n\
          \t\t\tif isinstance(node, ast.ExceptHandler) and node.type is None:\n\t\t\
          \t\tentry['warnings'].append(f'line {node.lineno}: {WARN_BARE_EXCEPT}')\n\
          \t\t\tif (isinstance(node, ast.Call)\n\t\t\t\t\tand isinstance(getattr(node,\
          \ 'func', None), ast.Name)\n\t\t\t\t\tand node.func.id == 'print'):\n\t\t\
          \t\tentry['warnings'].append(f'line {node.lineno}: {WARN_PRINT_STMT}')\n\
          \t\tfor i, line in enumerate(source.splitlines(), 1):\n\t\t\ts = line.lstrip()\n\
          \t\t\tif s.startswith('#') and any(kw in s.upper() for kw in ('TODO', 'FIXME')):\n\
          \t\t\t\tentry['warnings'].append(f'line {i}: {WARN_TODO}')\n\t\ttotal_wrn\
          \ += len(entry['warnings'])\n\n\t\tif entry['warnings'] and entry['status']\
          \ == 'PASS':\n\t\t\tentry['status'] = 'WARN'\n\n\t\tresults[filename] =\
          \ entry\n\n\toverall  = 'PASS' if total_err == 0 else 'FAIL'\n\tpass_cnt\
          \ = sum(1 for r in results.values() if r['status'] != 'FAIL')\n\n\trows\
          \ = [\n\t\t'╯══════════════════════════════════════════╮',\n\t\t'║   CODE\
          \ COMPILATION REPORT                ║',\n\t\t'╙══════════════════════════════════════════╛',\n\
          \t\t'',\n\t\tf'  Overall  : {overall}',\n\t\tf'  Files    : {pass_cnt}/{len(results)}\
          \ passed',\n\t\tf'  Errors   : {total_err}',\n\t\tf'  Warnings : {total_wrn}',\n\
          \t\t'',\n\t\t'──────────────────────────────────────────',\n\t]\n\tfor fname,\
          \ r in results.items():\n\t\ticon = '✓' if r['status'] == 'PASS' else ('⚠'\
          \ if r['status'] == 'WARN' else '✗')\n\t\trows.append(\n\t\t\tf\"  {icon}\
          \ {fname:<22} [{r['status']:<4}]  \"\n\t\t\tf\"{r['lines']:>4} lines  \"\
          \n\t\t\tf\"parse {r['parse_ms']:>6.2f}ms\"\n\t\t)\n\t\tfor e in r['errors']:\n\
          \t\t\trows.append(f'      ERROR   : {e}')\n\t\tfor w in r['warnings']:\n\
          \t\t\trows.append(f'      WARNING : {w}')\n\trows += ['──────────────────────────────────────────',\
          \ '']\n\tif overall == 'PASS' and total_wrn == 0:\n\t\trows.append('  All\
          \ files parsed cleanly — no errors or warnings.')\n\telif overall == 'PASS':\n\
          \t\trows.append(f'  Parsing passed. {total_wrn} warning(s) to review.')\n\
          \telse:\n\t\trows.append(f'  {total_err} error(s) found. Fix before deploying.')\n\
          \n\treturn {\n\t\t\"compile_report\": '\\n'.join(rows),\n\t\t\"has_errors\"\
          :  str(total_err > 0),     # string → \"True\" / \"False\"\n        \"has_warnings\"\
          : str(total_wrn > 0),    # string → \"True\" / \"False\"\n\t\t\"overall_status\"\
          : overall\n\t}"
