        code: "import httpx\n\ndef main(DIFY_ACCESS_TOKEN: str, DIFY_HOST: str):\n\
          \    # Standardize the host URL\n    host = DIFY_HOST.rstrip('/')\n    url\
          \ = f\"{host}/console/api/apps?page=1&limit=10\"\n    \n    headers = {\n\
          \        \"Authorization\": f\"Bearer {DIFY_ACCESS_TOKEN}\",\n        \"\
          Content-Type\": \"application/json\"\n    }\n    \n    try:\n        with\
          \ httpx.Client(timeout=30.0) as client:\n            resp = client.get(url,\
          \ headers=headers)\n            \n            # If status is not 200, this\
          \ will trigger the 'except' block\n            resp.raise_for_status()\n\
          \            \n            data = resp.json()\n            apps = data.get('data',\
          \ [])\n\n            # Get the total count of all apps in the workspace\n\
          \            total_count = len(apps)\n            \n            return {\n\
          \                \"apps_list\": apps,\n                \"total_apps_in_workspace\"\
          : total_count,\n                \"status\": \"Success\" if apps else \"\
          No Apps Found\"\n            }\n    except Exception as e:\n        # This\
          \ will now return the actual error message from the server\n        error_detail\
          \ = \"\"\n        if hasattr(e, 'response'):\n            error_detail =\
          \ f\" | Details: {e.response.text}\"\n            \n        return {\n \
          \           \"apps_list\": [],\n            \"total_apps_in_workspace\"\
          : 0,\n            \"status\": f\"Error: {str(e)}{error_detail}\"\n     \
          \   }"
