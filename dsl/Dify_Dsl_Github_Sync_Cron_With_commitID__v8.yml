        - id: sys-sync
          role: system
          text: You are a Python code generator. Output only a single ```python```
            code block. No prose, no explanation, no markdown outside the fence.
        - id: usr-sync
          role: user
          text: "Output sync_service.py exactly as follows:\n\n```python\nimport difflib\n\
            from datetime import datetime, timezone\nfrom dataclasses import dataclass,\
            \ field\nfrom typing import Optional\nfrom dify_client import dify_client,\
            \ TokenExpiredError\nfrom github_client import github_client\nfrom config\
            \ import config\n\n\n@dataclass\nclass SyncResult:\n    status: str  \
            \                     # committed | no_change | token_expired | error\n\
            \    committed: bool\n    message: str\n    commit_url: Optional[str]\
            \         = None\n    lines_changed: int                = 0\n    token_refresh_required:\
            \ bool      = False\n\n\nclass SyncService:\n\n    def _commit_message(self,\
            \ app_name: str, diff_lines: list, custom: str = None) -> str:\n     \
            \   if custom:\n            return custom\n        added   = sum(1 for\
            \ l in diff_lines if l.startswith('+') and not l.startswith('+++'))\n\
            \        removed = sum(1 for l in diff_lines if l.startswith('-') and\
            \ not l.startswith('---'))\n        ts = datetime.now(timezone.utc).strftime('%Y-%m-%d\
            \ %H:%M UTC')\n        return f'chore: sync Dify DSL [{app_name}] +{added}/-{removed}\
            \ ({ts})'\n\n    def _diff(self, current: str, new: str) -> tuple:\n \
            \       a = current.strip().splitlines()\n        b = new.strip().splitlines()\n\
            \        lines = list(difflib.unified_diff(a, b, fromfile='current', tofile='new',\
            \ lineterm=''))\n        changed = sum(\n            1 for l in lines\n\
            \            if l.startswith(('+', '-')) and not l.startswith(('+++',\
            \ '---'))\n        )\n        return bool(lines), lines, changed\n\n \
            \   async def run(\n        self,\n        app_id: str = None,\n     \
            \   file_path: str = None,\n        commit_message: str = None,\n    \
            \    include_secret: bool = False,\n    ) -> SyncResult:\n        app_id\
            \    = app_id    or config.DIFY_APP_ID\n        file_path = file_path\
            \ or config.GITHUB_FILE_PATH\n\n        try:\n            new_dsl = await\
            \ dify_client.export_dsl(app_id, include_secret)\n        except TokenExpiredError\
            \ as exc:\n            return SyncResult(\n                status='token_expired',\
            \ committed=False,\n                message=str(exc), token_refresh_required=True,\n\
            \            )\n        except Exception as exc:\n            return SyncResult(status='error',\
            \ committed=False,\n                              message=f'DSL export\
            \ failed: {exc}')\n\n        try:\n            sha, current_dsl = await\
            \ github_client.get_file(file_path)\n        except Exception as exc:\n\
            \            return SyncResult(status='error', committed=False,\n    \
            \                          message=f'GitHub read failed: {exc}')\n\n \
            \       if current_dsl is not None:\n            changed, diff_lines,\
            \ n_changed = self._diff(current_dsl, new_dsl)\n            if not changed:\n\
            \                return SyncResult(status='no_change', committed=False,\n\
            \                                  message='DSL unchanged — no commit\
            \ required.',\n                                  lines_changed=0)\n  \
            \      else:\n            diff_lines, n_changed = [], new_dsl.count('\\\
            n') + 1\n\n        msg = self._commit_message(config.DIFY_APP_NAME, diff_lines,\
            \ commit_message)\n        try:\n            url = await github_client.github_commit_push(file_path,\
            \ new_dsl, msg, sha)\n        except Exception as exc:\n            return\
            \ SyncResult(status='error', committed=False,\n                      \
            \        message=f'GitHub commit failed: {exc}')\n\n        return SyncResult(status='committed',\
            \ committed=True,\n                          message=msg, commit_url=url,\
            \ lines_changed=n_changed)\n\n\nsync_service = SyncService()\n```"
