        desc: Emit sync_service.py — diff-based change detection and conditional commit
          orchestrator
        model:
          completion_params:
            temperature: 0.2
          mode: chat
          name: gemini-2.5-pro
          provider: langgenius/gemini/google
        outputs:
          text:
            children: null
