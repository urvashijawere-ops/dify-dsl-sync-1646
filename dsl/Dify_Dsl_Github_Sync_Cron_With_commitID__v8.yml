    - data:
        code: "import httpx\nimport base64\n\ndef main(DIFY_ACCESS_TOKEN: str, DIFY_HOST:\
          \ str, GITHUB_TOKEN: str, GITHUB_REPO: str, GITHUB_OWNER: str, app_id: dict,\
          \ app_name: dict):\n    # 1. Extract IDs from the iteration objects\n  \
          \  actual_id = app_id.get('id')\n    actual_name = app_name.get('name')\n\
          \    \n    # Setup Headers\n    dify_headers = {\"Authorization\": f\"Bearer\
          \ {DIFY_ACCESS_TOKEN}\"}\n    github_headers = {\n        \"Authorization\"\
          : f\"Bearer {GITHUB_TOKEN}\",\n        \"Accept\": \"application/vnd.github+json\"\
          \n    }\n\n    # Setup File Paths\n    clean_name = \"\".join(c for c in\
          \ actual_name if c.isalnum() or c in (' ', '_')).strip().replace(' ', '_')\n\
          \    file_path = f\"dsl/{clean_name}.yml\"\n    github_url = f\"https://api.github.com/repos/{GITHUB_OWNER}/{GITHUB_REPO}/contents/{file_path}\"\
          \n\n    try:\n        with httpx.Client(timeout=120.0) as client:\n    \
          \        # --- STEP A: FETCH FROM DIFY ---\n            dify_url = f\"{DIFY_HOST}/console/api/apps/{actual_id}/export\"\
          \n            dify_resp = client.get(dify_url, headers=dify_headers)\n \
          \           dify_resp.raise_for_status()\n            new_content = dify_resp.text\n\
          \n            # --- STEP B: CHECK GITHUB FOR SHA ---\n            sha =\
          \ None\n            get_resp = client.get(github_url, headers=github_headers)\n\
          \            \n            if get_resp.status_code == 200:\n           \
          \     data = get_resp.json()\n                sha = data['sha']\n      \
          \          remote_raw = base64.b64decode(data['content']).decode('utf-8')\n\
          \                \n                # Compare content to skip unnecessary\
          \ commits\n                if remote_raw.strip() == new_content.strip():\n\
          \                    return {\"result\": {\"app\": actual_name, \"status\"\
          : \"Skipped\", \"commit_id\": \"N/A\"}}\n\n            # --- STEP C: PUSH\
          \ TO GITHUB ---\n            payload = {\n                \"message\": f\"\
          sync: {actual_name}\",\n                \"content\": base64.b64encode(new_content.encode('utf-8')).decode('utf-8'),\n\
          \                \"branch\": \"main\"\n            }\n            if sha:\
          \ payload[\"sha\"] = sha\n                \n            put_resp = client.put(github_url,\
          \ headers=github_headers, json=payload)\n            put_resp.raise_for_status()\n\
          \            new_sha = put_resp.json().get('commit', {}).get('sha', 'Unknown')[:7]\n\
          \            \n            return {\n                \"result\": {\n   \
          \                 \"app\": actual_name,\n                    \"status\"\
          : \"Success\",\n                    \"commit_id\": new_sha\n           \
          \     }\n            }\n\n    except Exception as e:\n        return {\n\
          \            \"result\": {\n                \"app\": actual_name,\n    \
          \            \"status\": \"Error\",\n                \"commit_id\": str(e)[:100]\
          \ # Limit error length\n            }\n        }"
