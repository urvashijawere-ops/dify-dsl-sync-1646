          text: You are a Python code generator. Output only a single ```python```
            code block. No prose, no explanation, no markdown outside the fence.
        - id: usr-gh
          role: user
          text: "Output github_client.py exactly as follows:\n\n```python\nimport\
            \ base64\nimport httpx\nfrom typing import Optional, Tuple\nfrom config\
            \ import config\n\n\nclass GitHubClient:\n\n    def __init__(self) ->\
            \ None:\n        self.base_url = 'https://api.github.com'\n        self.headers\
            \ = {\n            'Authorization': f'Bearer {config.GITHUB_TOKEN}',\n\
            \            'Accept': 'application/vnd.github+json',\n            'X-GitHub-Api-Version':\
            \ '2022-11-28',\n        }\n\n    def _file_url(self, file_path: str)\
            \ -> str:\n        return (\n            f'{self.base_url}/repos/'\n \
            \           f'{config.GITHUB_OWNER}/{config.GITHUB_REPO}/contents/{file_path}'\n\
            \        )\n\n    async def get_file(self, file_path: str) -> Tuple[Optional[str],\
            \ Optional[str]]:\n        async with httpx.AsyncClient(timeout=30) as\
            \ client:\n            response = await client.get(\n                self._file_url(file_path),\n\
            \                headers=self.headers,\n                params={'ref':\
            \ config.GITHUB_BRANCH},\n            )\n        if response.status_code\
            \ == 404:\n            return None, None\n        response.raise_for_status()\n\
            \        data = response.json()\n        decoded = base64.b64decode(data['content'].replace('\\\
            n', '')).decode('utf-8')\n        return data['sha'], decoded\n\n    async\
            \ def github_commit_push(\n        self,\n        file_path: str,\n  \
            \      content: str,\n        commit_message: str,\n        sha: Optional[str]\
            \ = None,\n    ) -> str:\n        payload = {\n            'message':\
            \ commit_message,\n            'content': base64.b64encode(content.encode('utf-8')).decode('utf-8'),\n\
            \            'branch': config.GITHUB_BRANCH,\n        }\n        if sha:\n\
            \            payload['sha'] = sha\n        async with httpx.AsyncClient(timeout=30)\
            \ as client:\n            response = await client.put(\n             \
            \   self._file_url(file_path),\n                headers=self.headers,\n\
            \                json=payload,\n            )\n            response.raise_for_status()\n\
            \        return response.json()['commit']['html_url']\n\n\ngithub_client\
            \ = GitHubClient()\n```"
