        - id: usr-dify
          role: user
          text: "Output dify_client.py exactly as follows:\n\n```python\nimport httpx\n\
            from config import config\n\n\nclass TokenExpiredError(Exception):\n \
            \   \"\"\"Raised when Dify Cloud returns HTTP 401 — DIFY_ACCESS_TOKEN\
            \ has expired.\"\"\"\n    pass\n\n\nclass DifyClient:\n\n    def _get_headers(self)\
            \ -> dict:\n        if not config.DIFY_ACCESS_TOKEN:\n            raise\
            \ ValueError(\n                'DIFY_ACCESS_TOKEN is not set. Extract\
            \ it from cloud.dify.ai '\n                'DevTools > Application > Local\
            \ Storage > access_token.'\n            )\n        return {\n        \
            \    'Authorization': f'Bearer {config.DIFY_ACCESS_TOKEN}',\n        \
            \    'Content-Type': 'application/json',\n        }\n\n    async def export_dsl(self,\
            \ app_id: str, include_secret: bool = False) -> str:\n        url = f'{config.DIFY_HOST}/console/api/apps/{app_id}/export'\n\
            \        params = {'include_secret': str(include_secret).lower()}\n  \
            \      async with httpx.AsyncClient(timeout=30) as client:\n         \
            \   response = await client.get(url, headers=self._get_headers(), params=params)\n\
            \        if response.status_code == 401:\n            raise TokenExpiredError(\n\
            \                'TOKEN_EXPIRED: update DIFY_ACCESS_TOKEN in .env from\
            \ '\n                'cloud.dify.ai DevTools > Application > Local Storage\
            \ > access_token.'\n            )\n        response.raise_for_status()\n\
            \        content_type = response.headers.get('content-type', '')\n   \
            \     return response.json().get('data', response.text) if 'json' in content_type\
            \ else response.text\n\n\ndify_client = DifyClient()\n```"
