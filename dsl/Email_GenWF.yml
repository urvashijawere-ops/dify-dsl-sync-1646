    - data:
        code: "def main(full_text: str,chunk_size:int, overlap_size:int):\n    max_chunk_size\
          \ = chunk_size if chunk_size else 5000\n    overlap_size = overlap_size\
          \ if overlap_size else 300    \n    chunks = []\n    \n    current_start\
          \ = 0\n    text_length = len(full_text)\n\n    while current_start < text_length:\n\
          \        current_end = current_start + max_chunk_size\n        \n      \
          \  # 1. Handle the final chunk\n        if current_end >= text_length:\n\
          \            content = full_text[current_start:]\n            if current_start\
          \ > 0:\n                overlap_text = full_text[current_start:current_start\
          \ + overlap_size]\n                new_text = full_text[current_start +\
          \ overlap_size:]\n                content = f\"<context>{overlap_text}</context>{new_text}\"\
          \n            chunks.append(content)\n            break\n\n        # 2.\
          \ Progress Guard: Newline search must start AFTER the overlap area\n   \
          \     # to ensure the next starting point is higher than the current one.\n\
          \        min_progress_index = current_start + overlap_size + 1\n       \
          \ \n        split_index = -1\n        if min_progress_index < current_end:\n\
          \            # Search for breaks only in the \"new text\" area of the chunk\n\
          \            split_index = full_text.rfind('\\n\\n', min_progress_index,\
          \ current_end)\n            if split_index == -1:\n                split_index\
          \ = full_text.rfind('\\n', min_progress_index, current_end)\n        \n\
          \        # 3. If no newline guarantees progress, force a hard split at the\
          \ end\n        if split_index == -1:\n            split_index = current_end\n\
          \n        # 4. Extract and tag\n        if current_start == 0:\n       \
          \     chunks.append(full_text[current_start:split_index])\n        else:\n\
          \            overlap_text = full_text[current_start:current_start + overlap_size]\n\
          \            new_text = full_text[current_start + overlap_size:split_index]\n\
          \            chunks.append(f\"<context>{overlap_text}</context>{new_text}\"\
          )\n\n        # 5. Move the window forward\n        current_start = split_index\
          \ - overlap_size\n            \n    return {\"chunk_list\": chunks}"
        code_language: python3
        desc: (Python Node) Recursively splits the large input stream into 2,000-character
