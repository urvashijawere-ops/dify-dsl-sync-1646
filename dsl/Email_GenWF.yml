    - data:
        code: "import json\n\ndef main(all_results: list):\n    all_segments = []\n\
          \    for iteration_output in all_results:\n        segments = iteration_output.get(\"\
          segments\", [])\n        all_segments.extend(segments)\n\n    if not all_segments:\
          \ return {\"result\": \"\"}\n\n    stitched_segments = []\n    for seg in\
          \ all_segments:\n        if not stitched_segments:\n            stitched_segments.append(seg)\n\
          \            continue\n        \n        prev = stitched_segments[-1]\n\
          \        \n        # Merge paragraphs if the previous one is incomplete\
          \ (no terminal punctuation)\n        if (prev.get(\"type\") == \"p\" and\
          \ seg.get(\"type\") == \"p\" and \n            not prev.get(\"content\"\
          , \"\").strip().endswith(('.', '!', '?', ':'))):\n            prev[\"content\"\
          ] = prev.get(\"content\", \"\") + seg.get(\"content\", \"\")\n        else:\n\
          \            stitched_segments.append(seg)\n\n    final_html = []\n    in_list\
          \ = False\n\n    for item in stitched_segments:\n        label = item.get(\"\
          type\")\n        content = item.get(\"content\", \"\")\n\n        if label\
          \ == \"list_item\":\n            if not in_list:\n                final_html.append(\"\
          <ul>\")\n                in_list = True\n            final_html.append(f\"\
          \  <li>{content.strip()}</li>\")\n        else:\n            if in_list:\n\
          \                final_html.append(\"</ul>\")\n                in_list =\
          \ False\n            \n            if label == \"h1\": final_html.append(f\"\
          <h1>{content.strip()}</h1>\")\n            elif label == \"h2\": final_html.append(f\"\
          <h2>{content.strip()}</h2>\")\n            elif label == \"p\": final_html.append(f\"\
          <p>{content}</p>\")\n            elif label == \"code\": final_html.append(f\"\
          <pre><code>{content}</code></pre>\")\n\n    if in_list: final_html.append(\"\
          </ul>\")\n\n    return {\"result\": \"\\n\".join(final_html).strip()}"
        code_language: python3
        desc: The "Reduce" phase. It collects the JSON outputs from all iterations
          and stiches them into a single, valid HTML document with proper list-wrapping.
