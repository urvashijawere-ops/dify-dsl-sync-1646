    - data:
        code: "import re\nimport json\nfrom typing import List, Dict, Any\n\ndef main(input_data:\
          \ str, lang: str) -> dict:\n    \"\"\"\n    Extracts objects, adds client_id,\
          \ and creates client_selection text format.\n    Validates that at least\
          \ one Client Name is present, otherwise returns an error.\n    \"\"\"\n\
          \    # 1. Define Localization Mapping\n    locales = {\n        \"en\":\
          \ {\n            \"header\": \"Client No | Client name | Business Unit |\
          \ Submission date\",\n            \"no_date\": \"No date found\",\n    \
          \        \"no_data\": \"No Client Data Found\",\n            \"error_no_name\"\
          : \"No client name found in the data.\"\n        },\n        \"jp\": {\n\
          \            \"header\": \"顧客番号 | 取引先名 | 担当調達部署 | 確認書提出日\",\n          \
          \  \"no_date\": \"日付なし\",\n            \"no_data\": \"クライアントデータが見つかりません\"\
          ,\n            \"error_no_name\": \"データ内に取引先名が見つかりません。\"\n        }\n  \
          \  }\n    \n    # Default to English if lang is not provided or unsupported\n\
          \    t = locales.get(lang.lower(), locales[\"en\"])\n\n    try:\n      \
          \  # 2. Handle input parsing\n        if isinstance(input_data, str):\n\
          \            try:\n                data_dict = json.loads(input_data)\n\
          \            except:\n                data_dict = {\"text\": input_data}\n\
          \        else:\n            data_dict = input_data\n        \n        #\
          \ 3. Pre-check for error flags in input\n        is_error = str(data_dict.get(\"\
          is_error\", \"\")).lower() == \"true\"\n        if is_error:\n         \
          \   return {\n                \"client_selection\": \"\",\n            \
          \    \"error\": data_dict.get(\"result\", \"Unknown error occurred\"),\n\
          \                \"clients_available\": \"False\",\n                \"result\"\
          : []\n            }\n\n        # 4. Extract data list using Regex\n    \
          \    text = data_dict.get(\"text\", str(data_dict))\n        match = re.search(r'\\\
          {data:\\s*\\[(.*?)\\]\\s*\\}', text, re.DOTALL)\n        \n        if not\
          \ match:\n            return {\n                \"result\": [], \n     \
          \           \"client_selection\": \"\", \n                \"clients_available\"\
          : \"False\",\n                \"error\": \"No data list found\"\n      \
          \      }\n\n        content = match.group(1).strip()\n        object_matches\
          \ = re.findall(r'\\{[^}]*\\}', content)\n        \n        result: List[Dict[str,\
          \ Any]] = []\n        client_selection_lines = [t[\"header\"]]\n       \
          \ client_counter = 0\n\n        # 5. Process each object\n        for i,\
          \ obj_str in enumerate(object_matches, start=1):\n            inner = obj_str[1:-1].strip()\n\
          \            # Parse internal key-value pairs\n            pairs = re.findall(r'([^,]+?)\\\
          s*:\\s*([^,]+?)(?=,|$)', inner)\n            \n            obj_dict: Dict[str,\
          \ Any] = {}\n            for key, value in pairs:\n                cleaned_key\
          \ = key.strip()\n                cleaned_value = value.strip().strip('\"\
          \\'')\n                obj_dict[cleaned_key] = cleaned_value\n\n       \
          \     # Add client_id (01, 02, etc.)\n            client_id = f\"{i:02d}\"\
          \n            ordered_obj = {\"client_id\": client_id}\n            ordered_obj.update(obj_dict)\n\
          \            result.append(ordered_obj)\n\n            # 6. Extract values\
          \ using multi-language keys\n            client_name = (\n             \
          \   obj_dict.get(\"Client Name\") or \n                obj_dict.get(\"取引先名\"\
          ) or \n                \"\"\n            ).strip()\n\n            if client_name\
          \ != \"\":\n                client_counter += 1\n            \n        \
          \    dept = (\n                obj_dict.get(\"Procurement Department in\
          \ Charge\") or \n                obj_dict.get(\"担当調達部署\") or \n        \
          \        \"\"\n            ).strip()\n\n            submission_date = (\n\
          \                obj_dict.get(\"submit_date\") or \n                obj_dict.get(\"\
          Confirmation Form Submission Date\") or \n                t[\"no_date\"\
          ]\n            ).strip()\n            \n            selection_line = f\"\
          {client_id} | {client_name} | {dept} | {submission_date}\"\n           \
          \ client_selection_lines.append(selection_line)\n        \n        # 7.\
          \ Final validation for missing client names\n        error_msg = \"\"\n\
          \        if client_counter == 0:\n            error_msg = t[\"error_no_name\"\
          ]\n\n        return {\n            \"result\": result,\n            \"client_selection\"\
          : t[\"no_data\"] if client_counter == 0 else \"\\n\".join(client_selection_lines),\n\
          \            \"clients_available\": str(client_counter > 0),\n         \
          \   \"error\" : error_msg\n        }\n\n    except Exception as e:\n   \
          \     return {\n            \"result\": [],\n            \"client_selection\"\
          : \"\",\n            \"error\": f\"Processing failed: {str(e)}\",\n    \
          \        \"clients_available\": \"False\"\n        }"
        code_language: python3
        desc: This code node takes in the input from the excel extractor workflow
          and extract the client names, BU and dates from the raw data and pass to
          next node.
        error_strategy: fail-branch
        outputs:
          client_selection:
            children: null
            type: string
          clients_available:
