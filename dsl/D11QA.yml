app:
  description: A smart chatbot helps the person incharge to resolve pc inspection
    error.
  icon: 🤖
  icon_background: '#FFEAD5'
  mode: advanced-chat
  name: D-11-QA
  use_icon_as_answer_icon: false
dependencies: []
kind: app
version: 0.3.1
workflow:
  conversation_variables:
  - description: this variable tells is the user query is a follow up question post
      AI recommendation.
    id: c06f6109-9076-41e4-b6bb-26e7106535de
    name: is_follow_up
    selector:
    - conversation
    - is_follow_up
    value: 'NO'
    value_type: string
  - description: ''
    id: 094a0862-c206-4667-89ac-bdf110caa867
    name: error_history
    selector:
    - conversation
    - error_history
    value: ''
    value_type: string
  - description: this defines the acceptable file extension
    id: 18168d50-252f-460d-a9a4-c0563bf5ce6a
    name: valid_file_extensions
    selector:
    - conversation
    - valid_file_extensions
    value: xlsx, xls
    value_type: string
  - description: ''
    id: 0b655c6f-e87f-4035-a242-d1e7d19ddd77
    name: sheet_data
    selector:
    - conversation
    - sheet_data
    value: []
    value_type: array[object]
  - description: ''
    id: 89b4d59f-72c3-4c20-80fc-5e3553c7bd60
    name: uploaded_file_config
    selector:
    - conversation
    - uploaded_file_config
    value:
      list_of_columns: Client Name,  Procurement Department in Charge,  Confirmation
        Form Submission Date,error
      number_of_rows: '10'
      sheet_name: ' FY2025 Confirmation'
    value_type: object
  - description: ''
    id: 851397a6-d70a-4d43-b3c5-e37c451f5c9b
    name: pms_counter
    selector:
    - conversation
    - pms_counter
    value: 0
    value_type: integer
  - description: this variable stores all static data in both language English and
      Japanese
    id: bd9e5317-80d2-40b1-b034-1fb17ccd21ea
    name: static_data
    selector:
    - conversation
    - static_data
    value:
      button_template: '{index}. <button type="button" data-message="{id}">{label}</button>'
      choose_client_msg:
        en: '

          Please enter the number corresponding to the client you want to proceed
          with. For example, to proceed with Client 1, enter 01.'
        jp: '

          続行するクライアントに対応する番号を入力してください。例えば、Client 1を続行するには、01と入力してください。'
      document_received_msg:
        en: Document received. Processing records...Please wait while we retrieve
          the client list for your selection.
        jp: 書類を受領しました。記録を処理中です。お客様が選択されたクライアントリストを取得するまでしばらくお待ちください。
      error_message_document_received:
        en: Something went wrong. Could you please upload the document again?
        jp: 何らかの問題が発生しました。もう一度ドキュメントをアップロードしていただけますか？
      error_message_file_extractor:
        en: We could not process your file, could you please upload the document again?
        jp: ファイルを処理できませんでした。もう一度ファイルをアップロードしていただけますか？
      error_message_file_missing:
        en: A file is required for this process. Please upload it.
        jp: この処理にはファイルが必要です。アップロードしてください。
      error_message_language:
        buttons:
        - id: English
          label: English
        - id: 日本語
          label: 日本語
        en_jp: "Sorry, we could not update your preference, could you re-select your\
          \ preferred langauge.\n\n 申し訳ありませんが、お客様の設定を更新できませんでした。もう一度ご希望の言語を選択してください。"
      invalid_client_msg:
        en: The client id you selected is invalid. Please choose a valid client id
          between 1 and 3.
        jp: 選択したクライアントIDが無効です。1から3の有効なクライアントIDを選択してください。
      request_file_msg:
        en: A file is required for this process. Please upload it.
        jp: この処理にはファイルが必要です。アップロードしてください。
      selected_client_msg:
        en: You have selected {client_name}. We will now analyze the error and provide
          recommendations for it.
        jp: '{client_name}を選択しました。これからエラーを分析し、推奨事項を提供します。'
      user_guide:
        en: "Your preferred language is now English. \n\n **Operating Procedure**:\n\
          \n  **Interface Configuration:** Select your preferred language (Japanese\
          \ or English) to initialize the localized interface.\n**Requisition Input:**\
          \ Submit your requirements by describing them in the natural language chat\
          \ and by uploading supporting documentation  (Excel Format). \n**Client\
          \ Selection:** Please select one client from the list.  \n**Recommendation:**\
          \ Recommends how to correct errors, address omissions, and fix other deficiencies.\
          \  \n**Review and Confirm:** BPO Staff/Person in charge can review and confirm\
          \ whether he wants to rectify the data or send a notification(email) to\
          \ the Business User/Vendor.  \n**Email Draft:** Generates a professional\
          \ notification email based on the findings.  \n\nPlease upload the document\
          \ - Progress Management Sheet"
        jp: "ご希望の言語は日本語です。  \n\n**操作手順**: \n\n**インターフェース設定:** ご希望の言語（日本語または英語）を選択して、ローカライズされたインターフェースを初期化してください。\
          \ \n**依頼内容の入力:** 自然言語チャットで要件を説明し、関連資料（Excel形式）をアップロードして送信してください。 \n**クライアントの選択:**\
          \ リストからクライアントを1社選択してください。 \n**推奨事項:** エラーの修正方法、漏れへの対応、その他の不備の修正方法を提案します。\
          \ \n**確認と承認:** BPO担当者/担当者は、データ修正を行うか、ビジネスユーザー/ベンダーに通知（メール）を送信するかを確認できます。\
          \ \n**メール下書き:** 結果に基づいて、プロフェッショナルな通知メールを作成します。  \n\n進捗管理シートをアップロードしてください"
    value_type: object
  - description: This variable stores user's preferred language, the default one is
      None
    id: 1527706c-6116-450d-a31b-12822812709f
    name: preferred_lang
    selector:
    - conversation
    - preferred_lang
    value: ''
    value_type: string
  environment_variables: []
  features:
    file_upload:
      allowed_file_extensions:
      - .JPG
      - .JPEG
      - .PNG
      - .GIF
      - .WEBP
      - .SVG
      allowed_file_types:
      - document
      allowed_file_upload_methods:
      - local_file
      enabled: true
      fileUploadConfig:
        audio_file_size_limit: 50
        batch_count_limit: 5
        file_size_limit: 50
        image_file_size_limit: 10
        video_file_size_limit: 100
        workflow_file_upload_limit: 10
      image:
        enabled: false
        number_limits: 3
        transfer_methods:
        - local_file
        - remote_url
      number_limits: 1
    opening_statement: 'Hi there, welcome to Annual PC inspection data evaluation.


      Please select your Preferred language.


      ***

      こんにちは。年間PC点検データの評価へようこそ。


      ご希望の言語を選択してください。

      ***'
    retriever_resource:
      enabled: false
    sensitive_word_avoidance:
      enabled: false
    speech_to_text:
      enabled: false
    suggested_questions:
    - English
    - 日本語
    suggested_questions_after_answer:
      enabled: false
    text_to_speech:
      enabled: false
      language: ''
      voice: ''
