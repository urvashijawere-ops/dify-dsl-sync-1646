    - data:
        code: "def main(user_input: str, sheet_data: list, static_data: dict, preferred_lang:\
          \ str, is_follow_up: str) -> dict:\n    # 1. Handle Follow-up logic (Directly\
          \ assign error to input)\n    if is_follow_up == \"YES\":\n        return\
          \ {\n            \"client_name\": \"Follow_up\",\n            \"error\"\
          : user_input\n        }\n\n    # 2. Process Standard Input (is_follow_up\
          \ is \"NO\" or other)\n    selected_id = user_input.zfill(2)\n    client_map\
          \ = {item.get('client_id'): item for item in sheet_data}\n    client_info\
          \ = client_map.get(selected_id)\n\n    # 3. Check if Client ID exists\n\
          \    if not client_info:\n        msg = static_data.get(\"invalid_client_msg\"\
          , {})\n        error = msg.get(preferred_lang, {})\n        return {\n \
          \           \"client_name\": \"Invalid\",\n            \"error\": error\n\
          \        }\n\n    # 4. If ID exists, retrieve the error and the formatted\
          \ name\n    client_name = client_info.get(\"Client Name\", \"Unknown\")\n\
          \    existing_error = client_info.get(\"error\", \"\")\n\n    msg_templates\
          \ = static_data.get(\"selected_client_msg\", {})\n    client_msg = msg_templates.get(preferred_lang,\
          \ \"{}\") \n\n    return {\n        \"client_name\": client_msg.format(client_name=client_name),\n\
          \        \"error\": existing_error\n    }"
        code_language: python3
        desc: This code node takes in the client id from the user and retrieve the
          error for corresponding client and return client name and errors.
