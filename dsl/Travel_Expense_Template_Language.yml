    - data:
        code: "import re\nfrom typing import List, Dict, Tuple, Optional\n\n\n# -----------------------------\n\
          # Metadata Extraction\n# -----------------------------\ndef extract_metadata(text:\
          \ str) -> Dict[str, str]:\n    date_match = re.search(r\"([A-Z][a-z]+ \\\
          d{1,2}, \\d{4})\", text)\n    company_match = re.search(r\"Company Name:\\\
          s*(.*?) \\|\", text)\n    supplier_match = re.search(r\"\\(1\\) Supplier\
          \ Code \\| (\\d+)\", text)\n\n    return {\n        \"date\": date_match.group(1)\
          \ if date_match else \"\",\n        \"company\": company_match.group(1).strip()\
          \ if company_match else \"\",\n        \"supplier_code\": supplier_match.group(1)\
          \ if supplier_match else \"\"\n    }\n\n\n# -----------------------------\n\
          # Metadata Validation\n# -----------------------------\n# def validate_metadata(metadata:\
          \ Dict[str, str]) -> List[str]:\n#     errors = []\n\n#     if not metadata[\"\
          date\"]:\n#         errors.append(\"Missing or invalid date\")\n\n#    \
          \ if not metadata[\"company\"]:\n#         errors.append(\"Missing company\
          \ name\")\n\n#     if not metadata[\"supplier_code\"]:\n#         errors.append(\"\
          Missing supplier code\")\n\n#     if metadata[\"supplier_code\"] and not\
          \ re.match(r\"^\\d{11}$\", metadata[\"supplier_code\"]):\n#         errors.append(\"\
          Supplier code must be 11 digits\")\n\n#     return errors\n\n\n# -----------------------------\n\
          # Helpers\n# -----------------------------\ndef clean_value(val: str) ->\
          \ str:\n    val = val.strip()\n    return \"\" if val.lower() in [\"nan\"\
          , \"-\", \"－\"] else val\n\n\ndef parse_allowance(val: str) -> Tuple[Optional[int],\
          \ bool]:\n    val = val.strip()\n\n    if val.lower() == \"actual expenses\"\
          :\n        return None, True\n\n    if val.isdigit():\n        return int(val),\
          \ False\n\n    return None, False\n\n\n# -----------------------------\n\
          # Row Parsing\n# -----------------------------\ndef parse_rows(lines: List[str])\
          \ -> List[Dict]:\n    valid_categories = {\n        \"No Change\",\n   \
          \     \"New Addition\",\n        \"Deletion\",\n        \"Daily Allowance\
          \ Amount Change\"\n    }\n\n    rows = []\n    start_table = False\n\n \
          \   for line in lines:\n        if \"Category 1\" in line and \"Category\
          \ 2\" in line:\n            start_table = True\n            continue\n\n\
          \        if not start_table or \"|\" not in line:\n            continue\n\
          \n        parts = [p.strip() for p in line.split(\"|\")]\n\n        if len(parts)\
          \ < 6:\n            continue\n\n        revision = parts[1].strip()\n  \
          \      class_1 = clean_value(parts[2])\n        class_2 = clean_value(parts[3])\n\
          \        holiday = clean_value(parts[4])\n        allowance_raw = parts[5].strip()\n\
          \n        # Skip invalid rows early\n        if (\n            revision\
          \ not in valid_categories or\n            revision == \"Revision/Abolition\
          \ Category\" or\n            all(x.lower() == \"nan\" for x in [class_1,\
          \ class_2, holiday, allowance_raw])\n        ):\n            continue\n\n\
          \        allowance_amount, is_actual = parse_allowance(allowance_raw)\n\n\
          \        rows.append({\n            \"revision_category\": revision,\n \
          \           \"class_1\": class_1,\n            \"class_2\": class_2,\n \
          \           \"holiday_class\": holiday,\n            \"daily_allowance_amount\"\
          : allowance_amount,\n            \"is_actual_expense\": is_actual\n    \
          \    })\n\n    return rows\n\n\n# -----------------------------\n# Main\
          \ Orchestrator\n# -----------------------------\n# \ndef main(arg1) -> dict:\n\
          \    # Handle Doc Extractor output:\n    # Doc Extractors often return a\
          \ list of strings (one per page).\n    # We join them with newlines to treat\
          \ it as one continuous document.\n    if isinstance(arg1, list):\n     \
          \   text = \"\\n\".join(map(str, arg1))\n    elif arg1 is None:\n      \
          \  text = \"\"\n    else:\n        text = str(arg1)\n\n    if not text.strip():\n\
          \        return {\n            \"result_metadata\": {},\n            \"\
          result_rows\": [],\n            \"error\": \"Input text from Doc Extractor\
          \ was empty\"\n        }\n\n    lines = text.split(\"\\n\")\n\n    metadata\
          \ = extract_metadata(text)\n    rows = parse_rows(lines)\n\n    if not rows:\n\
          \        return {\n            \"result_metadata\": metadata,\n        \
          \    \"result_rows\": [],\n            \"warning\": \"Metadata found, but\
          \ no table rows were parsed.\"\n        }\n\n    return {\n        \"result_metadata\"\
          : metadata,\n        \"result_rows\": rows\n    }"
        code_language: python3
        desc: ''
