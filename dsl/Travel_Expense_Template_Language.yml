    - data:
        code: "import re\nfrom typing import List, Dict, Tuple, Optional\n\n\n# -----------------------------\n\
          # Metadata Extraction (JP)\n# -----------------------------\ndef extract_metadata(text:\
          \ str) -> Dict[str, str]:\n\n    date_match = re.search(r\"([A-Z][a-z]+\
          \ \\d{1,2}, \\d{4})\", text)\n    company_match = re.search(r\"会社名[:：]\\\
          s*(.*?)\\s*\\|\", text)\n    supplier_match = re.search(r\"[（(]1[）)]\\s*サプライヤーコード\\\
          s*\\|\\s*(\\d+)\", text)\n\n    return {\n        \"date\": date_match.group(1)\
          \ if date_match else \"\",\n        \"company\": company_match.group(1).strip()\
          \ if company_match else \"\",\n        \"supplier_code\": supplier_match.group(1)\
          \ if supplier_match else \"\"\n    }\n\n\n# -----------------------------\n\
          # Helpers\n# -----------------------------\ndef clean_value(val: str) ->\
          \ str:\n    val = val.strip()\n    return \"\" if val.lower() in [\"nan\"\
          , \"-\", \"－\"] else val\n\n\ndef parse_allowance(val: str) -> Tuple[Optional[int],\
          \ bool]:\n    val = val.strip()\n\n    if val in [\"実費\", \"actual expenses\"\
          ]:\n        return None, True\n\n    if val.isdigit():\n        return int(val),\
          \ False\n\n    return None, False\n\n\n# -----------------------------\n\
          # Row Parsing (JP)\n# -----------------------------\ndef parse_rows(lines:\
          \ List[str]) -> List[Dict]:\n\n    category_map = {\n        \"変更なし\": \"\
          No Change\",\n        \"新規追加\": \"New Addition\",\n        \"削除\": \"Deletion\"\
          ,\n        \"日当変更\": \"Daily Allowance Amount Change\"\n    }\n\n    rows\
          \ = []\n    start_table = False\n\n    for line in lines:\n\n        if\
          \ \"カテゴリ1\" in line and \"カテゴリ2\" in line:\n            start_table = True\n\
          \            continue\n\n        if not start_table or \"|\" not in line:\n\
          \            continue\n\n        parts = [p.strip() for p in line.split(\"\
          |\")]\n\n        if len(parts) < 6:\n            continue\n\n        revision_raw\
          \ = parts[1].strip()\n        revision = category_map.get(revision_raw,\
          \ \"\")\n\n        class_1 = clean_value(parts[2])\n        class_2 = clean_value(parts[3])\n\
          \        holiday = clean_value(parts[4])\n        allowance_raw = parts[5].strip()\n\
          \n        if (\n            revision == \"\" or\n            all(x.lower()\
          \ == \"nan\" for x in [class_1, class_2, holiday, allowance_raw])\n    \
          \    ):\n            continue\n\n        allowance_amount, is_actual = parse_allowance(allowance_raw)\n\
          \n        rows.append({\n            \"revision_category\": revision,\n\
          \            \"class_1\": class_1,\n            \"class_2\": class_2,\n\
          \            \"holiday_class\": holiday,\n            \"daily_allowance_amount\"\
          : allowance_amount,\n            \"is_actual_expense\": is_actual\n    \
          \    })\n\n    return rows\n\n\n# -----------------------------\n# Main\
          \ Orchestrator (DIFY SAFE)\n# -----------------------------\ndef main(arg1)\
          \ -> dict:\n\n    # Normalize input\n    if isinstance(arg1, list):\n  \
          \      text = \"\\n\".join(map(str, arg1))\n    elif arg1 is None:\n   \
          \     text = \"\"\n    else:\n        text = str(arg1)\n\n    # ALWAYS return\
          \ same structure\n    result_metadata = {}\n    result_rows = []\n\n   \
          \ if not text.strip():\n        return {\n            \"result_metadata\"\
          : result_metadata,\n            \"result_rows\": result_rows\n        }\n\
          \n    lines = text.split(\"\\n\")\n\n    result_metadata = extract_metadata(text)\n\
          \    result_rows = parse_rows(lines)\n\n    return {\n        \"result_metadata\"\
          : result_metadata,\n        \"result_rows\": result_rows\n    }"
        code_language: python3
