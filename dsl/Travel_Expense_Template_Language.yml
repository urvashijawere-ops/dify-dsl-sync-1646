          \  \n    MAX_SIZE = 10 * 1024 * 1024\n    lang = lang.lower().strip()\n\n\
          \    def error_res(msg, filename=None):\n        return {\n            \"\
          valid\": \"false\",\n            \"error\": msg,\n            \"new_filename\"\
          : \"None\",\n            \"file_name\": filename if filename else \"None\"\
          \n        }\n\n    # 1. Language Validation\n    if lang not in static_data.get(\"\
          upload_invalid_language_message\", {}):\n        err = static_data[\"upload_invalid_language_message\"\
          ].get(\n            \"en\", \n            \"Please select a preferred language\
          \ (eng or jp)\"\n        )\n        return error_res(err)\n\n    # 2. File\
          \ Presence Check\n    if not xl_file:\n        return error_res(static_data[\"\
          upload_file_message\"][lang])\n\n    file_obj = xl_file[0]\n    original\
          \ = file_obj.get(\"filename\") or file_obj.get(\"name\") or \"unknown.xlsx\"\
          \n\n    # 3. File Type Validation\n    if file_obj.get(\"extension\", \"\
          \").lower() not in {\".xlsx\", \".xls\"}:\n        return error_res(static_data[\"\
          upload_file_type_error_message\"][lang], original)\n\n    # 4. File Size\
          \ Validation\n    if file_obj.get(\"size\", 0) > MAX_SIZE:\n        return\
          \ error_res(static_data[\"upload_file_size_error_message\"][lang], original)\n\
          \n    # ✅ SUCCESS (IMPORTANT: return ALL fields)\n    return {\n       \
          \ \"valid\": \"true\",\n        \"error\": \"None\",\n        \"new_filename\"\
          : original,\n        \"file_name\": original\n    }"
