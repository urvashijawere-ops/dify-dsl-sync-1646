        prompt_template:
        - id: 1da474f7-db07-4db3-a10a-510435706d7d
          role: system
          text: '# Identify the error category from the list below that most accurately
            matches the user''s query.

            ## Allowed Categories:  [Submission Error, Script Error, Write Failure,
            Save Error, Checkbox Error, Usage Error, Automation Failure, Inspection
            Request, Security Verification, Visibility Issue, Transcription Procedure,
            Date Conflict, Department Submission, NDA Protocol, NDA Handling, Formula
            Error]

            ## Constraints:

            - Return ONLY the category name.

            - Do not include any explanation, punctuation, or extra words.

            - If the error does not match any category, return "Unknown".


            User Error: {{#sys.query#}}

            '
        selected: false
        structured_output_enabled: false
        title: LLM_Error Categorizer
        type: llm
        variables: []
