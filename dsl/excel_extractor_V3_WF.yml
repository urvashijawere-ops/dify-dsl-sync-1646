    - data:
        code: "def main(xl_file: list, sheet_name: str, lang: str, static_data: dict,\
          \ max_file_size: int) -> dict:\n    # 1. Constants & Input Normalization\n\
          \    MAX_SIZE = max_file_size * 1024 * 1024\n    lang = lang.lower().strip()\n\
          \    \n    # Template for error responses to avoid repetition\n    def error_res(msg,\
          \ filename=None):\n        return {\n            \"valid\": \"false\",\n\
          \            \"result\": msg,\n            \"new_filename\": \"None\",\n\
          \            \"file_name\": filename,\n            \"is_error\":\"true\"\
          \n        }\n\n    # 2. Language Validation\n    # Use 'get' to safely check\
          \ if the language exists in the static_data keys\n    if lang not in static_data.get(\"\
          upload_invalid_language_message\", {}):\n        # Fallback to English for\
          \ the error message itself\n        err = static_data[\"upload_invalid_language_message\"\
          ].get(\"en\", \"Invalid Language\")\n        return error_res(err)\n\n \
          \   # 3. File Presence Check\n    if not xl_file:\n        return error_res(static_data[\"\
          upload_file_message\"][lang])\n\n    file_obj = xl_file[0]\n    # Use .get()\
          \ with a single fallback chain\n    original = file_obj.get(\"filename\"\
          ) or file_obj.get(\"name\") or \"unknown.xlsx\"\n    \n    # 4. File Type\
          \ Validation\n    # Sets provide O(1) lookup time\n    if file_obj.get(\"\
          extension\", \"\").lower() not in {\".xlsx\", \".xls\"}:\n        return\
          \ error_res(static_data[\"upload_file_type_error_message\"][lang], original)\n\
          \n    # 5. File Size Validation\n    if file_obj.get(\"size\", 0) > MAX_SIZE:\n\
          \        return error_res(static_data[\"upload_file_size_error_message\"\
          ][lang], original)\n\n    # 6. Success Logic\n    # Optimized string splitting\
          \ and naming\n    base_name = original.rsplit(\".\", 1)[0]\n    new_filename\
          \ = f\"{base_name}_{sheet_name.strip()}.csv\"\n\n    return {\n        \"\
          valid\": \"true\",\n        \"result\": \"None\",\n        \"new_filename\"\
          : new_filename,\n        \"file_name\": original,\n        \"is_error\"\
          : \"false\"\n    }"
        code_language: python3
        desc: ''
        outputs:
          file_name:
            children: null
            type: string
          is_error:
            children: null
            type: string
          new_filename:
            children: null
            type: string
          result:
            children: null
            type: string
          valid:
