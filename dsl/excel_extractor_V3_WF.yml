          jp\": \"Excelファイルを提供してください\"\n            },\n            \"upload_invalid_language_message\"\
          : {\n                \"en\": \"Please select language en or jp. 言語は en または\
          \ jp を選択してください\",\n                \"jp\": \"言語は en または jp を選択してください\"\n\
          \            },\n            \"file_not_exist_message\": {\n           \
          \     \"en\": \"Not existed\",\n                \"jp\": \"提供されたExcelには存在しませんでした。\"\
          \n            }\n        }\n    }"
        code_language: python3
