            \ Rows: {{#1776117453924.number_of_rows#}}   (if not specified or empty,\
            \ extract all)\n\n### EXTRACTION RULES\n- Skip any row where ALL requested\
            \ columns are empty or \"0\".\n- Empty cells must be returned as \"\"\
            \ (empty string). Never use \"N/A\", \"None\", or any text.\n- Extract\
            \ only the exact columns specified.\n\n### TASK\nExtract the data and\
            \ return it strictly in this dictionary format strictly Note: no backslash,\
            \ no markdown, only key value pairs:\nexample dictionary below i will\
            \ pass this to python code directoy and i will use eval():\n{ \"data\"\
            : [{\"Column Name 1\": \"value1\",\"Column Name 2\": \"value2\"}]}\n\n\
            ### CONSTRAINTS\n- Return ONLY dictionary. No markdown, no code blocks,\
            \ no explanations, no extra text. \n- If no data is found or File Content\
            \ is empty, return exactly: {\"error\": \"Data Not Found\"}\n- Use exact\
            \ column names as they appear in the header (case sensitive).\n- Respect\
            \ the Number of Rows if specified.\n- if any column having date strcly\
            \ the value should be date only, should not include time inside of it.\n\
            Now extract the data."
