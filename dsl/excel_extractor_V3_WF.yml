    - data:
        code: "def main(sheet_data: dict, new_filename: str,sheet_name: str, lang:\
          \ str):\n    # Ensure we are looking at the 'files' list\n    # We check\
          \ if arg1 is actually the list itself or the parent dict\n    if isinstance(sheet_data,\
          \ list):\n        files_list = sheet_data\n    else:\n        files_list\
          \ = sheet_data.get(\"files\", [])\n    fall_back_message = sheet_name +\
          \ (\" Not existed\" if lang.lower() == \"en\" else \" 提供されたExcelには存在しませんでした。\"\
          )\n    target_filename = new_filename.strip()\n    \n    # Check if any\
          \ file matches the target name\n    # Added a .strip() to handle potential\
          \ whitespace issues in filenames\n    found_file = next(\n        (f for\
          \ f in files_list if isinstance(f, dict) and f.get(\"filename\") == target_filename),\
          \ \n        None\n    )\n\n    file_exists = found_file is None\n\n    return\
          \ {\n        \"exists\": str(file_exists).lower(),\n        \"found_filename\"\
          : found_file.get(\"filename\") if found_file else fall_back_message,\n \
          \       \"file_url\": str(found_file.get(\"url\")) if found_file else \"\
          None\",\n        \"error\" : found_file.get(\"filename\") if found_file\
          \ else fall_back_message,\n        \"sheet_name\" : sheet_name\n    }"
