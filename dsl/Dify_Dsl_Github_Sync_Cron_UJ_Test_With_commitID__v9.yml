    - data:
        code: "import httpx\nimport base64\n\ndef main(\n    DIFY_ACCESS_TOKEN: str,\
          \ DIFY_HOST: str,\n    GITHUB_TOKEN: str, GITHUB_REPO: str,\n    GITHUB_OWNER:\
          \ str, GITHUB_BRANCH: str,\n    app: dict\n):\n    app_id   = app.get('id',\
          \ '')\n    app_name = app.get('name', 'unknown')\n    host     = DIFY_HOST.rstrip('/')\n\
          \n    dify_headers   = {'Authorization': f'Bearer {DIFY_ACCESS_TOKEN}'}\n\
          \    github_headers = {\n        'Authorization':        f'Bearer {GITHUB_TOKEN}',\n\
          \        'Accept':               'application/vnd.github+json',\n      \
          \  'X-GitHub-Api-Version': '2022-11-28'\n    }\n    clean  = ''.join(c for\
          \ c in app_name if c.isalnum() or c in (' ','_')).strip().replace(' ','_')\n\
          \    gh_url = f'https://api.github.com/repos/{GITHUB_OWNER}/{GITHUB_REPO}/contents/dsl/{clean}.yml'\n\
          \n    # Timeout strategy:\n    # Dify is on LAN — DSL YAMLs are small. Realistic:\
          \ <2s. Cap: 7s.\n    # GitHub API — small payload. Realistic: <1s. Cap:\
          \ 7s.\n    # Dify(7s) + GitHub_GET(7s) + GitHub_PUT(7s) = 21s absolute worst\
          \ case.\n    # Actual p99: ~3-5s total. Sandbox limit 15s gives large real\
          \ headroom.\n    # If Dify or GitHub consistently hit 7s, the issue is network\
          \ not sandbox.\n    T = 7.0\n\n    # ── Step 1: Export DSL from Dify ─────────────────────────────────────\n\
          \    try:\n        with httpx.Client(timeout=T) as client:\n           \
          \ dr = client.get(f'{host}/console/api/apps/{app_id}/export', headers=dify_headers)\n\
          \            if dr.status_code == 401:\n                return {'result':\
          \ {'app': app_name, 'status': 'Error', 'commit_id': 'TOKEN_EXPIRED'}}\n\
          \            dr.raise_for_status()\n            ct  = dr.headers.get('content-type',\
          \ '')\n            dsl = dr.json().get('data', '') if 'json' in ct else\
          \ dr.text\n    except httpx.TimeoutException:\n        return {'result':\
          \ {'app': app_name, 'status': 'Error', 'commit_id': 'Dify export timeout\
          \ (7s)'}}\n    except Exception as e:\n        return {'result': {'app':\
          \ app_name, 'status': 'Error', 'commit_id': f'Dify error: {str(e)[:60]}'}}\n\
          \n    # ── Step 2: GitHub GET — check existing SHA ───────────────────────────\n\
          \    try:\n        with httpx.Client(timeout=T) as client:\n           \
          \ sha      = None\n            get_resp = client.get(gh_url, headers=github_headers)\n\
          \            if get_resp.status_code == 200:\n                data    =\
          \ get_resp.json()\n                sha     = data.get('sha')\n         \
          \       raw_b64 = data.get('content', '').replace('\\n', '')\n         \
          \       remote  = base64.b64decode(raw_b64).decode('utf-8')\n          \
          \      if remote.strip() == dsl.strip():\n                    return {'result':\
          \ {'app': app_name, 'status': 'Skipped', 'commit_id': 'N/A'}}\n        \
          \    elif get_resp.status_code not in (200, 404):\n                return\
          \ {'result': {'app': app_name, 'status': 'Error', 'commit_id': f'GitHub\
          \ GET {get_resp.status_code}'}}\n    except httpx.TimeoutException:\n  \
          \      return {'result': {'app': app_name, 'status': 'Error', 'commit_id':\
          \ 'GitHub GET timeout (7s)'}}\n    except Exception as e:\n        return\
          \ {'result': {'app': app_name, 'status': 'Error', 'commit_id': f'GitHub\
          \ GET error: {str(e)[:60]}'}}\n\n    # ── Step 3: GitHub PUT — push DSL\
          \ ────────────────────────────────────\n    try:\n        with httpx.Client(timeout=T)\
          \ as client:\n            payload = {\n                'message': f'sync:\
          \ {app_name}',\n                'content': base64.b64encode(dsl.encode('utf-8')).decode('utf-8'),\n\
          \                'branch':  GITHUB_BRANCH\n            }\n            if\
          \ sha:\n                payload['sha'] = sha\n            put_resp = client.put(gh_url,\
          \ headers=github_headers, json=payload)\n            put_resp.raise_for_status()\n\
          \            commit_sha = put_resp.json().get('commit', {}).get('sha', 'unknown')[:7]\n\
          \            return {'result': {'app': app_name, 'status': 'Success', 'commit_id':\
          \ commit_sha}}\n    except httpx.TimeoutException:\n        return {'result':\
          \ {'app': app_name, 'status': 'Error', 'commit_id': 'GitHub PUT timeout\
          \ (7s)'}}\n    except Exception as e:\n        return {'result': {'app':\
          \ app_name, 'status': 'Error', 'commit_id': f'GitHub PUT error: {str(e)[:60]}'}}\n"
        code_language: python3
        desc: 'Processes exactly ONE app per invocation (serial iteration). Three
          separate httpx clients: Dify export (7s), GitHub GET (7s), GitHub PUT (7s).
          Each client is independent — a skip on diff check exits before GitHub PUT.
          Realistic p99 total: 3-5s. Sandbox limit 15s. is_parallel=False on iteration
          = 1 thread always = zero thread ceiling pressure.'
