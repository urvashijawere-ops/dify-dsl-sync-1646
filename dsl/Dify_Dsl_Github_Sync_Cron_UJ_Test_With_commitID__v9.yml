      targetPosition: left
      type: custom
      width: 244
    - data:
        code: "import ast\nimport json\nimport time\n\ndef main(FILES_BUNDLE: str):\n\
          \tbundle = json.loads(FILES_BUNDLE)\n\tWARN_BARE_EXCEPT = \"bare 'except:'\
          \ use 'except Exception:'\"\n\tWARN_PRINT_STMT  = 'print() found remove\
          \ before production'\n\tWARN_TODO        = 'TODO/FIXME resolve before deploying'\n\
          \tresults = {}\n\ttotal_err = 0\n\ttotal_wrn = 0\n\tfor filename, source\
          \ in bundle.items():\n\t\tentry = {'status': 'PASS', 'errors': [], 'warnings':\
          \ [], 'lines': 0, 'parse_ms': 0.0}\n\t\tif not source or not source.strip():\n\
          \t\t\tentry['errors'].append('Empty source')\n\t\t\tentry['status'] = 'FAIL'\n\
          \t\t\ttotal_err += 1\n\t\t\tresults[filename] = entry\n\t\t\tcontinue\n\t\
          \tentry['lines'] = source.count('\\n') + 1\n\t\tt0 = time.perf_counter()\n\
          \t\ttry:\n\t\t\ttree = ast.parse(source, filename=filename)\n\t\t\tentry['parse_ms']\
          \ = round((time.perf_counter() - t0) * 1000, 2)\n\t\texcept SyntaxError\
          \ as exc:\n\t\t\tentry['parse_ms'] = round((time.perf_counter() - t0) *\
          \ 1000, 2)\n\t\t\tentry['errors'].append(f'SyntaxError line {exc.lineno}:\
          \ {exc.msg}')\n\t\t\tentry['status'] = 'FAIL'\n\t\t\ttotal_err += 1\n\t\t\
          \tresults[filename] = entry\n\t\t\tcontinue\n\t\tfor node in ast.walk(tree):\n\
          \t\t\tif isinstance(node, ast.ExceptHandler) and node.type is None:\n\t\t\
          \t\tentry['warnings'].append(f'line {node.lineno}: {WARN_BARE_EXCEPT}')\n\
          \t\t\tif (isinstance(node, ast.Call) and isinstance(getattr(node, 'func',\
          \ None), ast.Name) and node.func.id == 'print'):\n\t\t\t\tentry['warnings'].append(f'line\
          \ {node.lineno}: {WARN_PRINT_STMT}')\n\t\tfor i, line in enumerate(source.splitlines(),\
          \ 1):\n\t\t\ts = line.lstrip()\n\t\t\tif s.startswith('#') and any(kw in\
          \ s.upper() for kw in ('TODO', 'FIXME')):\n\t\t\t\tentry['warnings'].append(f'line\
          \ {i}: {WARN_TODO}')\n\t\ttotal_wrn += len(entry['warnings'])\n\t\tif entry['warnings']\
          \ and entry['status'] == 'PASS':\n\t\t\tentry['status'] = 'WARN'\n\t\tresults[filename]\
          \ = entry\n\toverall  = 'PASS' if total_err == 0 else 'FAIL'\n\tpass_cnt\
          \ = sum(1 for r in results.values() if r['status'] != 'FAIL')\n\trows =\
          \ ['=== CODE COMPILATION REPORT ===', f'Overall: {overall}', f'Files: {pass_cnt}/{len(results)}\
          \ passed', f'Errors: {total_err}', f'Warnings: {total_wrn}', '']\n\tfor\
          \ fname, r in results.items():\n\t\ticon = 'OK' if r['status'] == 'PASS'\
          \ else ('WARN' if r['status'] == 'WARN' else 'FAIL')\n\t\trows.append(f'\
          \  [{icon}] {fname} - {r[\"lines\"]} lines, parse {r[\"parse_ms\"]}ms')\n\
          \t\tfor e in r['errors']:\n\t\t\trows.append(f'    ERROR: {e}')\n\t\tfor\
          \ w in r['warnings']:\n\t\t\trows.append(f'    WARNING: {w}')\n\treturn\
          \ {\n\t\t'compile_report': '\\n'.join(rows),\n\t\t'has_errors': str(total_err\
          \ > 0),\n\t\t'has_warnings': str(total_wrn > 0),\n\t\t'overall_status':\
          \ overall\n\t}"
