app:
  description: Standalone Python script that exports Dify DSL and commits it to GitHub.
    Designed to run as a scheduled cron job — no web server, no HTTP endpoints. Uses
    a static Bearer token for Dify Cloud authentication.
  icon: 🕐
  icon_background: '#E0F2FE'
  mode: workflow
  name: Dify Dsl Github Sync Cron UJ Test With commitID - v9
  use_icon_as_answer_icon: false
dependencies: []
kind: app
version: 0.3.1
workflow:
  conversation_variables: []
  environment_variables:
  - description: ''
    id: bfa3e977-6369-41cb-a4b0-52b6b94de7b6
    name: DIFY_REFRESH_TOKEN
    selector:
    - env
    - DIFY_REFRESH_TOKEN
    value: ''
    value_type: secret
  - description: Static Bearer token from cloud.dify.ai DevTools > Application > Local
      Storage > access_token
    id: env-dify-access-token
    name: DIFY_ACCESS_TOKEN
    selector:
    - env
    - DIFY_ACCESS_TOKEN
    value: ''
    value_type: secret
  - description: Dify Cloud host URL
    id: env-dify-host
    name: DIFY_HOST
    selector:
    - env
    - DIFY_HOST
    value: http://172.30.116.165
    value_type: string
  - description: GitHub Personal Access Token with repo scope
    id: env-github-token
    name: GITHUB_TOKEN
    selector:
    - env
    - GITHUB_TOKEN
    value: ''
    value_type: secret
  - description: GitHub repository owner or organisation
    id: env-github-owner
    name: GITHUB_OWNER
    selector:
    - env
    - GITHUB_OWNER
    value: urvashijawere-ops
    value_type: string
  - description: GitHub repository name
    id: env-github-repo
    name: GITHUB_REPO
    selector:
    - env
    - GITHUB_REPO
    value: dify-dsl-sync-1646
    value_type: string
  - description: Target branch for commits
    id: env-github-branch
    name: GITHUB_BRANCH
    selector:
    - env
    - GITHUB_BRANCH
    value: main
    value_type: string
  - description: Max apps to process per run. Keep <=40 to stay within iteration queue
      limits.
    id: env-batch-size
    name: BATCH_SIZE
    selector:
    - env
    - BATCH_SIZE
    value: '40'
    value_type: string
  - description: Starting index for this run. Set 0,40,80,120... across multiple cron
      schedules to cover all apps.
    id: env-batch-offset
    name: BATCH_OFFSET
    selector:
    - env
    - BATCH_OFFSET
    value: '0'
    value_type: string
