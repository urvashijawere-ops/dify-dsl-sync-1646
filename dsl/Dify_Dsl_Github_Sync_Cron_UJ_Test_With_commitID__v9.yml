    - data:
        code: "import httpx\n\ndef main(DIFY_ACCESS_TOKEN: str, DIFY_HOST: str, BATCH_SIZE:\
          \ str, BATCH_OFFSET: str):\n    PAGE_SIZE   = 30\n    MAX_PAGES   = 50\n\
          \    batch_size  = int(BATCH_SIZE)   if str(BATCH_SIZE).isdigit()  else\
          \ 40\n    batch_offset= int(BATCH_OFFSET) if str(BATCH_OFFSET).isdigit()\
          \ else 0\n    host        = DIFY_HOST.rstrip('/')\n    headers     = {'Authorization':\
          \ f'Bearer {DIFY_ACCESS_TOKEN}'}\n    all_apps    = []\n    page       \
          \ = 1\n\n    try:\n        with httpx.Client(timeout=10.0) as client:\n\
          \            while page <= MAX_PAGES:\n                url  = f'{host}/console/api/apps?page={page}&limit={PAGE_SIZE}'\n\
          \                resp = client.get(url, headers=headers)\n             \
          \   resp.raise_for_status()\n                body  = resp.json()\n     \
          \           batch = body.get('data', [])\n                # Collect only\
          \ id + name — minimal payload\n                all_apps.extend({'id': a['id'],\
          \ 'name': a['name']} for a in batch)\n                if not body.get('has_more',\
          \ False) or not batch:\n                    break\n                page\
          \ += 1\n\n        # Slice to current batch window\n        batch_apps =\
          \ all_apps[batch_offset : batch_offset + batch_size]\n\n        return {\n\
          \            'apps_batch':    batch_apps,\n            'batch_count':  \
          \ len(batch_apps),\n            'total_apps':    len(all_apps),\n      \
          \      'batch_offset':  batch_offset,\n            'batch_size':    batch_size,\n\
          \            'status':        'OK' if batch_apps else 'Empty batch — offset\
          \ may exceed total apps'\n        }\n\n    except Exception as e:\n    \
          \    detail = f' | {e.response.text}' if hasattr(e, 'response') else ''\n\
          \        return {\n            'apps_batch':   [],\n            'batch_count':\
          \  0,\n            'total_apps':   0,\n            'batch_offset': batch_offset,\n\
          \            'batch_size':   batch_size,\n            'status':       f'Error:\
          \ {str(e)}{detail}'\n        }\n"
        code_language: python3
        desc: 'Paginates Dify API (page_size=30) to collect all app IDs+names. Slices
          result to [BATCH_OFFSET : BATCH_OFFSET+BATCH_SIZE]. Outputs apps_batch —
          always <=BATCH_SIZE items. Keeps iteration array small regardless of total
          workspace size.'
