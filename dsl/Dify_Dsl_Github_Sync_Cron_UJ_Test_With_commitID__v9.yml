      targetPosition: left
      type: custom
      width: 244
    - data:
        code: "import json\n\ndef main():\n\tCRON_CONFIG = {\n\t\t\"schedules\": [\n\
          \t\t\t{\"expression\": \"0 2 * * *\",  \"label\": \"nightly_02_utc\"},\n\
          \t\t\t{\"expression\": \"0 14 * * *\", \"label\": \"afternoon_14_utc\"},\n\
          \t\t],\n\t\t\"timezone\": \"UTC\",\n\t\t\"max_retries\": 3,\n\t\t\"retry_delay_seconds\"\
          : 60,\n\t\t\"timeout_seconds\": 120,\n\t\t\"notify_on_failure\": True,\n\
          \t\t\"skip_if_no_change\": True,\n\t}\n\tcron_config_json  = json.dumps(CRON_CONFIG,\
          \ indent=2)\n\tschedule_count    = len(CRON_CONFIG[\"schedules\"])\n\tschedule_labels\
          \   = \", \".join(s[\"label\"] for s in CRON_CONFIG[\"schedules\"])\n\t\
          schedule_exprs    = \", \".join(s[\"expression\"] for s in CRON_CONFIG[\"\
          schedules\"])\n\treturn {\n\t\t\"cron_config_json\": cron_config_json,\n\
          \t\t\"schedule_count\": schedule_count,\n\t\t\"schedule_labels\": schedule_labels,\n\
          \t\t\"schedule_exprs\": schedule_exprs\n\t}"
        code_language: python3
        desc: Defines the cron schedule configuration. Outputs a structured JSON config
          block.
        outputs:
          cron_config_json:
            children: null
            type: string
          schedule_count:
            children: null
            type: number
          schedule_exprs:
            children: null
            type: string
          schedule_labels:
            children: null
            type: string
        selected: false
        title: cron_schedule
        type: code
        variables: []
      height: 146
      id: cron_schedule
      position:
        x: 380
        y: 300
      positionAbsolute:
        x: 380
        y: 300
      selected: false
      sourcePosition: right
      targetPosition: left
      type: custom
      width: 244
    - data:
        code: "import json\n\ndef main(DIFY_HOST: str, GITHUB_OWNER: str, GITHUB_REPO:\
          \ str, GITHUB_BRANCH: str):\n    # Env vars injected from Dify so os.getenv\
          \ defaults in config.py\n    # match whatever is set in the Dify environment\
          \ variables panel.\n\n    config_py = (\n        'import os\\n'\n      \
          \  'from dotenv import load_dotenv\\n'\n        '\\n'\n        'load_dotenv()\\\
          n'\n        '\\n'\n        '\\n'\n        'class Config:\\n'\n        f\"\
          \    DIFY_HOST: str          = os.getenv('DIFY_HOST',          '{DIFY_HOST}')\\\
          n\"\n        f\"    DIFY_ACCESS_TOKEN: str  = os.getenv('DIFY_ACCESS_TOKEN',\
          \  '')\\n\"\n        f\"    DIFY_APP_ID: str        = os.getenv('DIFY_APP_ID',\
          \        '')\\n\"\n        f\"    DIFY_APP_NAME: str      = os.getenv('DIFY_APP_NAME',\
          \      'app')\\n\"\n        f\"    GITHUB_TOKEN: str       = os.getenv('GITHUB_TOKEN',\
          \       '')\\n\"\n        f\"    GITHUB_OWNER: str       = os.getenv('GITHUB_OWNER',\
          \       '{GITHUB_OWNER}')\\n\"\n        f\"    GITHUB_REPO: str        =\
          \ os.getenv('GITHUB_REPO',        '{GITHUB_REPO}')\\n\"\n        f\"   \
          \ GITHUB_BRANCH: str      = os.getenv('GITHUB_BRANCH',      '{GITHUB_BRANCH}')\\\
          n\"\n        f\"    GITHUB_FILE_PATH: str   = os.getenv('GITHUB_FILE_PATH',\
          \   'dsl/app.yml')\\n\"\n        '\\n'\n        '    def validate(self)\
          \ -> None:\\n'\n        \"        required = ['DIFY_HOST', 'DIFY_ACCESS_TOKEN',\
          \ 'DIFY_APP_ID',\\n\"\n        \"                    'GITHUB_TOKEN', 'GITHUB_OWNER',\
          \ 'GITHUB_REPO']\\n\"\n        '        missing = [k for k in required if\
          \ not getattr(self, k)]\\n'\n        \"        if missing:\\n\"\n      \
          \  \"            raise ValueError(f'Missing required env vars: {missing}')\\\
          n\"\n        '\\n'\n        '\\n'\n        'config = Config()\\n'\n    \
          \    'config.validate()\\n'\n    )\n\n    dify_client_py = (\n        'import\
          \ httpx\\n'\n        'from config import config\\n'\n        '\\n'\n   \
          \     '\\n'\n        'class TokenExpiredError(Exception):\\n'\n        '\
          \    pass\\n'\n        '\\n'\n        '\\n'\n        'class DifyClient:\\\
          n'\n        '\\n'\n        '    def _get_headers(self) -> dict:\\n'\n  \
          \      '        if not config.DIFY_ACCESS_TOKEN:\\n'\n        \"       \
          \     raise ValueError('DIFY_ACCESS_TOKEN is not set.')\\n\"\n        '\
          \        return {\\n'\n        \"            'Authorization': f'Bearer {config.DIFY_ACCESS_TOKEN}',\\\
          n\"\n        \"            'Content-Type': 'application/json',\\n\"\n  \
          \      '        }\\n'\n        '\\n'\n        '    async def export_dsl(self,\
          \ app_id: str, include_secret: bool = False) -> str:\\n'\n        \"   \
          \     url = f'{config.DIFY_HOST}/console/api/apps/{app_id}/export'\\n\"\n\
          \        \"        params = {'include_secret': str(include_secret).lower()}\\\
          n\"\n        '        async with httpx.AsyncClient(timeout=30) as client:\\\
          n'\n        '            response = await client.get(url, headers=self._get_headers(),\
          \ params=params)\\n'\n        '        if response.status_code == 401:\\\
          n'\n        \"            raise TokenExpiredError('TOKEN_EXPIRED: update\
          \ DIFY_ACCESS_TOKEN in .env')\\n\"\n        '        response.raise_for_status()\\\
          n'\n        \"        content_type = response.headers.get('content-type',\
          \ '')\\n\"\n        \"        return response.json().get('data', response.text)\
          \ if 'json' in content_type else response.text\\n\"\n        '\\n'\n   \
          \     '\\n'\n        'dify_client = DifyClient()\\n'\n    )\n\n    github_client_py\
          \ = (\n        'import base64\\n'\n        'import httpx\\n'\n        'from\
          \ typing import Optional, Tuple\\n'\n        'from config import config\\\
          n'\n        '\\n'\n        '\\n'\n        'class GitHubClient:\\n'\n   \
          \     '\\n'\n        '    def __init__(self) -> None:\\n'\n        \"  \
          \      self.base_url = 'https://api.github.com'\\n\"\n        '        self.headers\
          \ = {\\n'\n        \"            'Authorization': f'Bearer {config.GITHUB_TOKEN}',\\\
          n\"\n        \"            'Accept': 'application/vnd.github+json',\\n\"\
          \n        \"            'X-GitHub-Api-Version': '2022-11-28',\\n\"\n   \
          \     '        }\\n'\n        '\\n'\n        '    def _file_url(self, file_path:\
          \ str) -> str:\\n'\n        \"        return f'{self.base_url}/repos/{config.GITHUB_OWNER}/{config.GITHUB_REPO}/contents/{file_path}'\\\
          n\"\n        '\\n'\n        '    async def get_file(self, file_path: str)\
          \ -> Tuple[Optional[str], Optional[str]]:\\n'\n        '        async with\
          \ httpx.AsyncClient(timeout=30) as client:\\n'\n        '            response\
          \ = await client.get(\\n'\n        '                self._file_url(file_path),\\\
          n'\n        '                headers=self.headers,\\n'\n        \"     \
          \           params={'ref': config.GITHUB_BRANCH},\\n\"\n        '      \
          \      )\\n'\n        '        if response.status_code == 404:\\n'\n   \
          \     '            return None, None\\n'\n        '        response.raise_for_status()\\\
          n'\n        '        data = response.json()\\n'\n        \"        decoded\
          \ = base64.b64decode(data['content'].replace('\\\\n', '')).decode('utf-8')\\\
          n\"\n        \"        return data['sha'], decoded\\n\"\n        '\\n'\n\
          \        '    async def github_commit_push(\\n'\n        '        self,\\\
          n'\n        '        file_path: str,\\n'\n        '        content: str,\\\
          n'\n        '        commit_message: str,\\n'\n        '        sha: Optional[str]\
          \ = None,\\n'\n        '    ) -> str:\\n'\n        '        payload = {\\\
          n'\n        \"            'message': commit_message,\\n\"\n        \"  \
          \          'content': base64.b64encode(content.encode('utf-8')).decode('utf-8'),\\\
          n\"\n        \"            'branch': config.GITHUB_BRANCH,\\n\"\n      \
          \  '        }\\n'\n        '        if sha:\\n'\n        \"            payload['sha']\
          \ = sha\\n\"\n        '        async with httpx.AsyncClient(timeout=30)\
          \ as client:\\n'\n        '            response = await client.put(\\n'\n\
          \        '                self._file_url(file_path),\\n'\n        '    \
          \            headers=self.headers,\\n'\n        '                json=payload,\\\
          n'\n        '            )\\n'\n        '            response.raise_for_status()\\\
          n'\n        \"        return response.json()['commit']['html_url']\\n\"\n\
          \        '\\n'\n        '\\n'\n        'github_client = GitHubClient()\\\
          n'\n    )\n\n    sync_service_py = (\n        'import difflib\\n'\n    \
          \    'from datetime import datetime, timezone\\n'\n        'from dataclasses\
          \ import dataclass\\n'\n        'from typing import Optional\\n'\n     \
          \   'from dify_client import dify_client, TokenExpiredError\\n'\n      \
          \  'from github_client import github_client\\n'\n        'from config import\
          \ config\\n'\n        '\\n'\n        '\\n'\n        '@dataclass\\n'\n  \
          \      'class SyncResult:\\n'\n        '    status: str\\n'\n        ' \
          \   committed: bool\\n'\n        '    message: str\\n'\n        '    commit_url:\
          \ Optional[str]    = None\\n'\n        '    lines_changed: int         \
          \  = 0\\n'\n        '    token_refresh_required: bool = False\\n'\n    \
          \    '\\n'\n        '\\n'\n        'class SyncService:\\n'\n        '\\\
          n'\n        '    def _commit_message(self, app_name: str, diff_lines: list,\
          \ custom: str = None) -> str:\\n'\n        '        if custom:\\n'\n   \
          \     '            return custom\\n'\n        \"        added   = sum(1\
          \ for l in diff_lines if l.startswith('+') and not l.startswith('+++'))\\\
          n\"\n        \"        removed = sum(1 for l in diff_lines if l.startswith('-')\
          \ and not l.startswith('---'))\\n\"\n        \"        ts = datetime.now(timezone.utc).strftime('%Y-%m-%d\
          \ %H:%M UTC')\\n\"\n        \"        return f'chore: sync Dify DSL [{app_name}]\
          \ +{added}/-{removed} ({ts})'\\n\"\n        '\\n'\n        '    def _diff(self,\
          \ current: str, new: str) -> tuple:\\n'\n        '        a = current.strip().splitlines()\\\
          n'\n        '        b = new.strip().splitlines()\\n'\n        \"      \
          \  lines = list(difflib.unified_diff(a, b, fromfile='current', tofile='new',\
          \ lineterm=''))\\n\"\n        \"        changed = sum(1 for l in lines if\
          \ l.startswith(('+', '-')) and not l.startswith(('+++', '---')))\\n\"\n\
          \        '        return bool(lines), lines, changed\\n'\n        '\\n'\n\
          \        '    async def run(self, app_id: str = None, file_path: str = None,\\\
          n'\n        '                  commit_message: str = None, include_secret:\
          \ bool = False) -> SyncResult:\\n'\n        '        app_id    = app_id\
          \    or config.DIFY_APP_ID\\n'\n        '        file_path = file_path or\
          \ config.GITHUB_FILE_PATH\\n'\n        '        try:\\n'\n        '    \
          \        new_dsl = await dify_client.export_dsl(app_id, include_secret)\\\
          n'\n        '        except TokenExpiredError as exc:\\n'\n        \"  \
          \          return SyncResult(status='token_expired', committed=False, message=str(exc),\
          \ token_refresh_required=True)\\n\"\n        '        except Exception as\
          \ exc:\\n'\n        \"            return SyncResult(status='error', committed=False,\
          \ message=f'DSL export failed: {exc}')\\n\"\n        '        try:\\n'\n\
          \        '            sha, current_dsl = await github_client.get_file(file_path)\\\
          n'\n        '        except Exception as exc:\\n'\n        \"          \
          \  return SyncResult(status='error', committed=False, message=f'GitHub read\
          \ failed: {exc}')\\n\"\n        '        if current_dsl is not None:\\n'\n\
          \        '            changed, diff_lines, n_changed = self._diff(current_dsl,\
          \ new_dsl)\\n'\n        '            if not changed:\\n'\n        \"   \
          \             return SyncResult(status='no_change', committed=False, message='DSL\
          \ unchanged - no commit required.', lines_changed=0)\\n\"\n        '   \
          \     else:\\n'\n        \"            diff_lines, n_changed = [], new_dsl.count('\\\
          \\n') + 1\\n\"\n        '        msg = self._commit_message(config.DIFY_APP_NAME,\
          \ diff_lines, commit_message)\\n'\n        '        try:\\n'\n        '\
          \            url = await github_client.github_commit_push(file_path, new_dsl,\
          \ msg, sha)\\n'\n        '        except Exception as exc:\\n'\n       \
          \ \"            return SyncResult(status='error', committed=False, message=f'GitHub\
          \ commit failed: {exc}')\\n\"\n        \"        return SyncResult(status='committed',\
          \ committed=True, message=msg, commit_url=url, lines_changed=n_changed)\\\
          n\"\n        '\\n'\n        '\\n'\n        'sync_service = SyncService()\\\
          n'\n    )\n\n    sync_py = (\n        'import asyncio\\n'\n        'import\
          \ logging\\n'\n        'import sys\\n'\n        'from datetime import datetime,\
          \ timezone\\n'\n        'from sync_service import sync_service\\n'\n   \
          \     '\\n'\n        'logging.basicConfig(\\n'\n        '    level=logging.INFO,\\\
          n'\n        \"    format='%(asctime)s  %(levelname)-8s  %(message)s',\\\
          n\"\n        \"    datefmt='%Y-%m-%d %H:%M:%S',\\n\"\n        '    handlers=[logging.StreamHandler(sys.stdout)],\\\
          n'\n        ')\\n'\n        'log = logging.getLogger(__name__)\\n'\n   \
          \     '\\n'\n        '\\n'\n        'async def main() -> int:\\n'\n    \
          \    '    started_at = datetime.now(timezone.utc).isoformat()\\n'\n    \
          \    \"    log.info('Dify DSL sync started - %s', started_at)\\n\"\n   \
          \     '    result = await sync_service.run()\\n'\n        \"    log.info('Status\
          \        : %s', result.status)\\n\"\n        \"    log.info('Committed \
          \    : %s', result.committed)\\n\"\n        \"    log.info('Message    \
          \   : %s', result.message)\\n\"\n        '    if result.committed:\\n'\n\
          \        \"        log.info('Commit URL    : %s', result.commit_url)\\n\"\
          \n        \"        log.info('Lines changed : %d', result.lines_changed)\\\
          n\"\n        \"    if result.status == 'token_expired':\\n\"\n        '\
          \        log.error(\\n'\n        \"            'ACTION REQUIRED: DIFY_ACCESS_TOKEN\
          \ has expired.\\\\n'\\n\"\n        \"            '  1. Go to https://cloud.dify.ai\
          \ and log in.\\\\n'\\n\"\n        \"            '  2. Open DevTools > Application\
          \ > Local Storage > access_token.\\\\n'\\n\"\n        \"            '  3.\
          \ Copy value and update DIFY_ACCESS_TOKEN in your .env file.\\\\n'\\n\"\n\
          \        \"            '  4. Re-run this script to verify.'\\n\"\n     \
          \   '        )\\n'\n        '        return 1\\n'\n        \"    if result.status\
          \ == 'error':\\n\"\n        \"        log.error('Sync failed: %s', result.message)\\\
          n\"\n        '        return 1\\n'\n        \"    log.info('Sync complete.')\\\
          n\"\n        '    return 0\\n'\n        '\\n'\n        '\\n'\n        \"\
          if __name__ == '__main__':\\n\"\n        '    sys.exit(asyncio.run(main()))\\\
          n'\n    )\n\n    bundle = {\n        'config.py':        config_py.strip(),\n\
          \        'dify_client.py':   dify_client_py.strip(),\n        'github_client.py':\
          \ github_client_py.strip(),\n        'sync_service.py':  sync_service_py.strip(),\n\
          \        'sync.py':          sync_py.strip(),\n    }\n\n    return {\n \
          \       'files_bundle': json.dumps(bundle, ensure_ascii=False),\n      \
          \  'file_count':   len(bundle),\n        'file_names':   ', '.join(bundle.keys()),\n\
          \    }\n"
        code_language: python3
        desc: Replaces 5 LLM nodes + assemble_source_files. Receives DIFY_HOST, GITHUB_OWNER,
          GITHUB_REPO, GITHUB_BRANCH from Dify env and bakes them as os.getenv defaults
          in the generated config.py. Zero LLM calls, zero 503 risk.
        outputs:
          file_count:
            children: null
            type: number
          file_names:
            children: null
            type: string
          files_bundle:
            children: null
            type: string
        selected: false
        title: bundle_source_files
        type: code
        variables:
        - value_selector:
          - env
          - DIFY_HOST
          value_type: string
          variable: DIFY_HOST
        - value_selector:
          - env
          - GITHUB_OWNER
          value_type: string
          variable: GITHUB_OWNER
        - value_selector:
          - env
          - GITHUB_REPO
          value_type: string
          variable: GITHUB_REPO
        - value_selector:
          - env
          - GITHUB_BRANCH
          value_type: string
          variable: GITHUB_BRANCH
      height: 162
      id: bundle_source_files
      position:
        x: 680
        y: 300
      positionAbsolute:
        x: 680
        y: 300
      selected: false
