    - data:
        code: "import json\nimport re\n\ndef normalize_branch_code_input(text):\n\
          \    if not isinstance(text, str): return \"\"\n    if re.search(r'[.,]',\
          \ text): return \"\"\n    text = text.translate(str.maketrans('０１２３４５６７８９－','0123456789-'))\n\
          \    return text.replace(' ', '').strip() if text.replace(' ', '').isdigit()\
          \ else \"\"\n\ndef normalize_customer_num_input(text):\n    if not isinstance(text,\
          \ str): return \"\"\n    if re.search(r'[.,]', text): return \"\"\n    text\
          \ = text.translate(str.maketrans('０１２３４５６７８９－','0123456789-'))\n    text\
          \ = re.sub(r'[\\s　-]', '', text)\n    return text.strip() if text.isdigit()\
          \ else \"\"\n\ndef get_language_text(key):\n    MESSAGES = {\n        \"\
          branch_prompt\": \"支店コード（2桁の数字）を入力してください。\\n例: 11\",\n        \"branch_error\"\
          : \"支店コードが無効です。2桁の数字を入力してください。\\n例: 11\",\n        \"customer_prompt\":\
          \ \"顧客番号を入力してください。\",\n        \"customer_error\": \"顧客番号が無効です。5桁の数字を入力してください。\\\
          n例: 10001\",\n        \"rating_prompt\": \"最後に、評価を入力してください。\",\n       \
          \ \"rating_error\": \"入力された評価が無効です。評価は「Resolved（解決済み）」または「Not Resolved（未解決）」のいずれかで入力してください\"\
          ,\n        \"rating_submit\": \"評価は正常に送信されました。\",\n        \"option_submit\"\
          : \"正しい選択をしました。\",\n        \"unknown_state_error\": \"処理状態が不明です。支店コード（2桁の数字）を入力して再開してください。\\\
          n例: 11\"\n    }\n    return MESSAGES.get(key)\n\n# --------------------------------------------------------------------------\n\
          # --- FLAT LOGIC HANDLERS ---\n# --------------------------------------------------------------------------\n\
          \ndef handle_branch_step(user_input, *args):\n    code = normalize_branch_code_input(user_input)\n\
          \    if re.fullmatch(r'\\d{2}', code):\n        return get_language_text(\"\
          customer_prompt\"), {\"branch_code\": code, \"step\": 2}, 0, code, None\n\
          \    return get_language_text(\"branch_error\"), {\"step\": 1}, 0, None,\
          \ None\n\ndef handle_customer_step(user_input, branch, *args):\n    num\
          \ = normalize_customer_num_input(user_input)\n    if re.fullmatch(r'\\d{5}',\
          \ num):\n        return get_language_text(\"rating_prompt\"), {\"branch_code\"\
          : branch, \"customer_number\": num, \"step\": 3}, 0, branch, num\n    return\
          \ get_language_text(\"customer_error\"), {\"branch_code\": branch, \"step\"\
          : 2}, 0, branch, None\n\ndef handle_option_step(user_input, branch, customer):\n\
          \    return get_language_text(\"option_submit\"), {\"branch_code\": branch,\
          \ \"customer_number\": customer, \"option\": user_input.strip(), \"step\"\
          : 4}, 0, branch, customer\n\ndef handle_equipment_step(user_input, branch,\
          \ customer):\n    return \"\", {\"branch_code\": branch, \"customer_number\"\
          : customer, \"step\": 5}, 0, branch, customer\n\ndef handle_rating_step(user_input,\
          \ branch, customer):\n    if user_input.lower().strip() in [\"resolved\"\
          , \"not resolved\", \"解決した\", \"解決しなかった\"]:\n        return get_language_text(\"\
          rating_submit\"), {\"step\": 6}, 1, None, None\n    return get_language_text(\"\
          rating_error\"), {\"branch_code\": branch, \"customer_number\": customer,\
          \ \"step\": 4}, 0, branch, customer\n\n# --------------------------------------------------------------------------\n\
          # --- MAIN DISPATCHER ---\n# --------------------------------------------------------------------------\n\
          \ndef process_state(current_step, user_input, branch_code_current, customer_number_current):\n\
          \    # Map steps to functions (The \"Dispatch Table\")\n    handlers = {\n\
          \        1: handle_branch_step,\n        2: handle_customer_step,\n    \
          \    3: handle_option_step,\n        4: handle_equipment_step,\n       \
          \ 5: handle_rating_step\n    }\n\n    # Get the handler or fallback to unknown\
          \ error\n    handler = handlers.get(current_step)\n    if not handler:\n\
          \        update = {\"step\": 1}\n        return {\"output_message\": get_language_text(\"\
          unknown_state_error\"), \"state_json\": f\"STATE_UPDATE: {json.dumps(update)}\"\
          , \"is_final\": 0, \"branch_code_current\": None, \"customer_number_current\"\
          : None}\n\n    # Execute the selected handler\n    msg, update, is_final,\
          \ b_code, c_num = handler(user_input, branch_code_current, customer_number_current)\n\
          \n    return {\n        \"output_message\": msg,\n        \"state_json\"\
          : f\"STATE_UPDATE: {json.dumps(update)}\",\n        \"is_final\": is_final,\n\
          \        \"branch_code_current\": b_code,\n        \"customer_number_current\"\
          : c_num\n    }\n\ndef main(current_step: int, user_input: str, branch_code_current:\
          \ str = None, customer_number_current: str = None):\n    try:\n        step\
          \ = int(current_step)\n    except:\n        step = 1\n    return process_state(step,\
          \ user_input, branch_code_current, customer_number_current)"
