    - data:
        code: "import re\n# --------------------------------------------------------------------------\n\
          # --- STEP HANDLERS ---\n# --------------------------------------------------------------------------\n\
          def handle_step_0(raw_input, existing_data, response_text, JAPANESE_RATING_ERROR_PHRASE):\n\
          \    if JAPANESE_RATING_ERROR_PHRASE in response_text:\n        return 0,\
          \ \"\", False, \"入力された評価が無効です。\"\n    return 1, \"STEP_0\", True, \"\"\n\
          \ndef handle_step_1(raw_input, existing_data):\n    valid_main = [\"エレベーター\"\
          , \"エスカレーター\", \"空調設備\"]\n    valid_building = [\"ビル管理設備\", \"防犯カメラ\", \"\
          自動ドア\", \"入退室管理\", \"消防設備\", \"給排水設備\"]\n    if raw_input in valid_building:\n\
          \        existing_data[\"model_type\"] = \"ビル管理設備\"\n        return 11,\
          \ \"STEP_11\", True, \"\"\n    elif raw_input in valid_main:\n        existing_data[\"\
          model_type\"] = raw_input\n        existing_data[\"sub_type\"] = \"\"\n\
          \        return 2, \"STEP_2\", True, \"\"\n    return 1, \"\", False, \"\
          無効な設備選択です\"\ndef handle_step_11(raw_input, existing_data):\n    valid_sub\
          \ = [\"防犯カメラ\", \"自動ドア\", \"入退室管理\", \"消防設備\", \"給排水設備\"]\n    if raw_input\
          \ in valid_sub:\n        existing_data[\"sub_type\"] = raw_input\n     \
          \   return 2, \"STEP_2\", True, \"\"\n    return 11, \"\", False, \"無効な設備です\"\
          \ndef handle_step_2(raw_input, existing_data):\n    valid_options = [\"\
          急いでいない\", \"至急対応してほしい\"]\n    if raw_input in valid_options:\n        existing_data[\"\
          urgency_of_call_back\"] = raw_input\n        edit_mode = existing_data.get(\"\
          edit_mode\", False)\n        next_step = 6 if edit_mode else 3\n       \
          \ ui = \"SUMMARY\" if edit_mode else \"INPUT_NAME\"\n        existing_data[\"\
          edit_mode\"] = False\n        return next_step, ui, True, \"\"\n    return\
          \ 2, \"\", False, \"緊急度エラー\"\ndef handle_step_3(raw_input, existing_data):\n\
          \    existing_data[\"customer_name\"] = raw_input\n    edit_mode = existing_data.get(\"\
          edit_mode\", False)\n    next_step = 6 if edit_mode else 4\n    ui = \"\
          SUMMARY\" if edit_mode else \"INPUT_PHONE\"\n    existing_data[\"edit_mode\"\
          ] = False\n    return next_step, ui, True, \"\"\n\ndef handle_step_4(raw_input,\
          \ existing_data):\n    \n    phone_input = raw_input.strip()\n \n    # Reject\
          \ alphabet or invalid special characters\n    if re.search(r\"[A-Za-z]\"\
          , phone_input) or re.search(r\"[^\\d\\-\\+\\s]\", phone_input):\n      \
          \  return 4, \"INPUT_PHONE\", False, \"電話番号に無効な文字が含まれています\"\n   \n    #\
          \ Extract digits only\n    phone_digits = re.sub(r\"\\D\", \"\", phone_input)\n\
          \ \n    if len(phone_digits) == 11:\n        formatted_phone = f\"{phone_digits[:3]}-{phone_digits[3:7]}-{phone_digits[7:]}\"\
          \n    elif len(phone_digits) == 10:\n     \n        formatted_phone = f\"\
          {phone_digits[:2]}-{phone_digits[2:6]}-{phone_digits[6:]}\"\n    else:\n\
          \        return 4, \"INPUT_PHONE\", False, \"無効な電話番号\"\n   \n    existing_data[\"\
          customer_phone\"] = formatted_phone\n    edit_mode = existing_data.get(\"\
          edit_mode\", False)\n    next_step = 6 if edit_mode else 5\n    ui = \"\
          SUMMARY\" if edit_mode else \"STEP_5\"\n    existing_data[\"edit_mode\"\
          ] = False\n \n    return next_step, ui, True, \"\"\n\ndef handle_step_5(raw_input,\
          \ existing_data):\n    existing_data[\"special_instructions\"] = \"なし\"\
          \ if raw_input in [\"特記事項なし\", \"\"] else raw_input\n    return 6, \"SUMMARY\"\
          , True, \"\"\ndef handle_step_6(raw_input, existing_data):\n    mapping\
          \ = {\n        \"決定（変更なし）\": (99, \"SUMMARY\"),\n        \"メニューに戻る\": (13,\
          \ \"MENU\"),\n        \"折り返しの緊急度の変更\": (2, \"STEP_2\"),\n        \"お客さま名の変更\"\
          : (3, \"INPUT_NAME\"),\n        \"連絡先の変更\": (4, \"INPUT_PHONE\"),\n    \
          \    \"特記事項の変更\": (5, \"STEP_5\")\n    }\n    if raw_input in mapping:\n\
          \        step, ui = mapping[raw_input]\n        if step not in [99, 13]:\
          \ existing_data[\"edit_mode\"] = True\n        return step, ui, True, \"\
          \"\n    return 6, \"\", False, \"無効な選択です\"\n# --------------------------------------------------------------------------\n\
          # --- MAIN DISPATCHER ---\n# --------------------------------------------------------------------------\n\
          def main(internal_step: int, input: str, existing_data: dict, response_text:\
          \ str) -> dict:\n    # State recovery\n    internal_step = existing_data.get(\"\
          button7_step\", internal_step)\n    existing_data[\"request\"] = \"その他\"\
          \n    JAPANESE_RATING_ERROR_PHRASE = \"入力された評価が無効です。\"\n    raw_input =\
          \ input.strip()\n    ui_step = \"\"\n    is_validation = True\n    error_message\
          \ = \"\"\n    # Dispatch table mapping steps to handlers\n    handlers =\
          \ {\n        1: handle_step_1,\n        11: handle_step_11,\n        2:\
          \ handle_step_2,\n        3: handle_step_3,\n        4: handle_step_4,\n\
          \        5: handle_step_5,\n        6: handle_step_6\n    }\n    # Step\
          \ 0 logic (Gatekeeper check)\n    if internal_step == 0:\n        internal_step,\
          \ ui_step, is_validation, error_message = handle_step_0(\n            raw_input,\
          \ existing_data, response_text, JAPANESE_RATING_ERROR_PHRASE\n        )\n\
          \    # Process via Dispatcher for standard steps\n    elif internal_step\
          \ in handlers:\n        internal_step, ui_step, is_validation, error_message\
          \ = handlers[internal_step](raw_input, existing_data)\n\n    return {\n\
          \        \"result\": existing_data,\n        \"ui_step\": ui_step,\n   \
          \     \"internal_step\": internal_step,\n        \"error_message\": error_message,\n\
          \        \"is_validation\": str(is_validation).lower()\n    }"
        code_language: python3
        desc: This code manages a multi-step user input workflow (Button 7 process)
          where each step validates input, stores user data, and decides the next
          step using a step-based handler system.It also handles errors, edit mode,
          and final summary routing to ensure the user moves through a structured
          form-like flow correctly.
        outputs:
          error_message:
            children: null
            type: string
          internal_step:
            children: null
            type: number
          is_validation:
            children: null
            type: string
          result:
            children: null
            type: object
          ui_step:
            children: null
            type: string
