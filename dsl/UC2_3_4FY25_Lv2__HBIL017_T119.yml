    - data:
        code: "import json\nimport re\nfrom datetime import datetime\nfrom calendar\
          \ import monthrange\n\n# --- Constants ---\nREPORT_CATEGORY_MAP = {\"1\"\
          : \"メンテナンスレポート\", \"2\": \"ヘリオスレポート\", \"3\": \"点検レポート\", \"4\": \"監視報告書\"\
          , \"5\": \"写真\"}\nPRODUCT_SERVICE_CATEGORY_MAP = {\"1\": \"エレベーター\", \"\
          2\": \"エスカレーター\", \"3\": \"空調設備\", \"4\": \"ビル管理設備\"}\n\n# Column mappings\
          \ as a single config for easier maintenance\nCOL = {\n    \"CUST\": \"customernumber\"\
          , \"OFFICE\": \"officecode\", \"PROD\": \"productservicecategory\",\n  \
          \  \"REP_CAT\": \"reportcategory\", \"DATE\": \"workenddate\", \"FILE\"\
          : \"reportfilename\",\n    \"BUIL\": [\"fncdecryptaes256\", \"buildingname\"\
          , \"building_name\", \"propertyname\"]\n}\n\n# --- Utility Functions ---\n\
          \ndef normalize_str(v):\n    if v is None: return \"\"\n    s = str(v).strip().replace(\"\
          \\u3000\", \"\")\n    return \"\" if s.lower() in {\"nan\", \"null\"} else\
          \ s\n\ndef normalize_key(k):\n    return normalize_str(k).lower().replace(\"\
          _\", \"\").replace(\" \", \"\")\n\ndef parse_content(content_str):\n   \
          \ if not content_str: return {}\n    # Optimized re.findall to dict conversion\n\
          \    return {normalize_key(k): normalize_str(v) for k, v in re.findall(r'([^:;]+):\\\
          s*([^;]+);', content_str)}\n\ndef parse_record_date(date_str):\n    if not\
          \ date_str: return None\n    date_str = str(date_str).strip()\n    for fmt\
          \ in (\"%Y-%m-%d\", \"%Y/%m/%d\", \"%m/%d/%Y\", \"%Y年%m月%d日\"):\n      \
          \  try:\n            return datetime.strptime(date_str, fmt)\n        except\
          \ (ValueError, TypeError):\n            continue\n    return None\n\ndef\
          \ is_date_in_scope(rec_dt, scope, formatted_date, start_date, end_date,\
          \ discrete_dates):\n    if not rec_dt: return False\n    try:\n        if\
          \ scope == \"YEAR\":\n            return rec_dt.year == int(formatted_date)\n\
          \n        if scope == \"MONTH\":\n            m, y = map(int, formatted_date.split(\"\
          /\"))\n            return rec_dt.month == m and rec_dt.year == y\n\n   \
          \     if scope == \"RANGE\":\n            if \"/\" not in start_date: #\
          \ Year range\n                return int(start_date) <= rec_dt.year <= int(end_date)\n\
          \            s_m, s_y = map(int, start_date.split(\"/\"))\n            e_m,\
          \ e_y = map(int, end_date.split(\"/\"))\n            start_dt = datetime(s_y,\
          \ s_m, 1)\n            end_dt = datetime(e_y, e_m, monthrange(e_y, e_m)[1])\n\
          \            return start_dt <= rec_dt <= end_dt\n\n        if scope ==\
          \ \"MULTI\":\n            for d in discrete_dates:\n                if \"\
          /\" in d:\n                    m, y = map(int, d.split(\"/\"))\n       \
          \             if rec_dt.month == m and rec_dt.year == y: return True\n \
          \               elif rec_dt.year == int(d):\n                    return\
          \ True\n    except (ValueError, TypeError, IndexError):\n        return\
          \ False\n    return False\n\ndef select_latest_per_group(records):\n   \
          \ latest = {}\n    for r in records:\n        dt = r.get(\"_dt\") # Use\
          \ pre-parsed date\n        key = (r.get(COL[\"PROD\"]), r.get(COL[\"REP_CAT\"\
          ]))\n        if key not in latest or (dt and (not latest[key][0] or dt >\
          \ latest[key][0])):\n            latest[key] = (dt, r)\n    return [v[1]\
          \ for v in latest.values()]\n\ndef empty_response(e_flag, r_flag):\n   \
          \ return {\n        \"aggregated_result\": \"[]\", \"pdf_list\": [], \"\
          matching_reports\": [],\n        \"count\": 0, \"equipment_present\": e_flag,\
          \ \"report_present\": r_flag\n    }\n\n# --- MAIN ---\n\ndef main(report_records,\
          \ query_input):\n    # Safe Input Parsing\n    if isinstance(report_records,\
          \ str):\n        try: report_records = json.loads(report_records)\n    \
          \    except: report_records = []\n    \n    if isinstance(report_records,\
          \ dict): report_records = [report_records]\n    elif not isinstance(report_records,\
          \ list): report_records = []\n\n    try: params = query_input if isinstance(query_input,\
          \ dict) else json.loads(str(query_input))\n    except: params = {}\n\n \
          \   target_equip = set(map(str, params.get(\"equipment_codes\", [])))\n\
          \    target_report = set(map(str, params.get(\"report_type_codes\", [])))\n\
          \    scope = params.get(\"date_scope\", \"LATEST\")\n\n    parsed_reports\
          \ = []\n    equipment_present_flag = \"true\" if not target_equip else \"\
          false\"\n    report_present_flag = \"true\" if not target_report else \"\
          false\"\n\n    # Step 1: Pre-parse and filter presence\n    for rec in report_records:\n\
          \        try:\n            obj = rec if isinstance(rec, dict) else json.loads(rec)\n\
          \            full = {normalize_key(k): normalize_str(v) for k, v in obj.items()}\n\
          \            full.update(parse_content(obj.get(\"content\", \"\")))\n  \
          \          full[\"_raw\"] = obj\n            \n            # Pre-parse date\
          \ once to avoid re-parsing in every filter step\n            full[\"_dt\"\
          ] = parse_record_date(full.get(COL[\"DATE\"]))\n\n            # Update presence\
          \ flags\n            if equipment_present_flag == \"false\" and full.get(COL[\"\
          PROD\"]) in target_equip:\n                equipment_present_flag = \"true\"\
          \n            if report_present_flag == \"false\" and full.get(COL[\"REP_CAT\"\
          ]) in target_report:\n                report_present_flag = \"true\"\n\n\
          \            # Filter by codes immediately\n            if target_equip\
          \ and full.get(COL[\"PROD\"]) not in target_equip: continue\n          \
          \  if target_report and full.get(COL[\"REP_CAT\"]) not in target_report:\
          \ continue\n            \n            parsed_reports.append(full)\n    \
          \    except: continue\n\n    if not parsed_reports:\n        return empty_response(equipment_present_flag,\
          \ report_present_flag)\n\n    # Step 2: Date Filter\n    if scope == \"\
          LATEST\":\n        scoped = select_latest_per_group(parsed_reports)\n  \
          \  else:\n        scoped = [\n            r for r in parsed_reports \n \
          \           if is_date_in_scope(r[\"_dt\"], scope, params.get(\"formatted_date\"\
          , \"\"), \n                               params.get(\"start_date\", \"\"\
          ), params.get(\"end_date\", \"\"), \n                               params.get(\"\
          discrete_dates\", []))\n        ]\n\n    if not scoped:\n        return\
          \ empty_response(equipment_present_flag, report_present_flag)\n\n    # Step\
          \ 3: Group and Format\n    grouped = {}\n    pdf_list = []\n    pdf_seen\
          \ = set()\n\n    for r in scoped:\n        dt = r[\"_dt\"]\n        w_month\
          \ = dt.strftime(\"%Y/%m\") if dt else \"N/A\"\n\n        if w_month not\
          \ in grouped:\n            # Building Name logic (first non-empty from preference\
          \ list)\n            b_name = next((r.get(normalize_key(col)) for col in\
          \ COL[\"BUIL\"] if r.get(normalize_key(col))), \"\")\n            grouped[w_month]\
          \ = {\n                \"支社コード\": r.get(COL[\"OFFICE\"]), \"お客さま番号\": r.get(COL[\"\
          CUST\"]),\n                \"ビル名\": b_name, \"作業月\": w_month, \"レポート種類\"\
          : set(), \"製品・サービス分類\": set()\n            }\n\n        grouped[w_month][\"\
          レポート種類\"].add(REPORT_CATEGORY_MAP.get(r.get(COL[\"REP_CAT\"]), \"Unknown\"\
          ))\n        grouped[w_month][\"製品・サービス分類\"].add(PRODUCT_SERVICE_CATEGORY_MAP.get(r.get(COL[\"\
          PROD\"]), \"Unknown\"))\n\n        fname = r.get(COL[\"FILE\"])\n      \
          \  if fname and fname not in pdf_seen:\n            pdf_seen.add(fname)\n\
          \            pdf_list.append({\"filename\": fname, \"content\": fname})\n\
          \n    # Step 4: Finalize Output\n    final_output = [\n        {\n     \
          \       **v, \n            \"レポート種類\": \", \".join(sorted(v[\"レポート種類\"])),\n\
          \            \"製品・サービス分類\": \", \".join(sorted(v[\"製品・サービス分類\"]))\n    \
          \    } \n        for k, v in sorted(grouped.items())\n    ]\n\n    return\
          \ {\n        \"aggregated_result\": json.dumps(final_output, ensure_ascii=False,\
          \ indent=2),\n        \"pdf_list\": pdf_list,\n        \"matching_reports\"\
          : [json.dumps(r[\"_raw\"], ensure_ascii=False) for r in scoped],\n     \
          \   \"count\": len(scoped),\n        \"equipment_present\": equipment_present_flag,\n\
          \        \"report_present\": report_present_flag\n    }"
        code_language: python3
