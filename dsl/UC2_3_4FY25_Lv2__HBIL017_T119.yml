    - data:
        code: "import json\n\n# --- Constants ---\nDEFAULT_EQUIPMENT = [1, 2, 3, 4]\n\
          DEFAULT_REPORT = [1, 2, 3]\nVAGUE_NEGATIVES = {\"no\", \"いいえ\", \"nope\"\
          , \"nah\", \"none\"}\n\ndef normalize_list(value):\n    return value if\
          \ isinstance(value, list) else []\n\ndef normalize_date(value):\n    if\
          \ value and str(value).strip().lower() not in {\"null\", \"none\", \"\"\
          }:\n        return value\n    return None\n\ndef main(llm_output: dict,\
          \ inspection_state: dict, clarification_count: int) -> dict:\n    # 1. Robust\
          \ Input Parsing\n    if isinstance(llm_output, str):\n        raw_input\
          \ = llm_output.strip().lower()\n        if raw_input in VAGUE_NEGATIVES:\n\
          \            curr = {\"valid\": True, \"isPartial\": True}\n        else:\n\
          \            try:\n                cleaned = llm_output.strip().replace(\"\
          ```json\", \"\").replace(\"```\", \"\")\n                curr = json.loads(cleaned)\n\
          \            except (json.JSONDecodeError, ValueError):\n              \
          \  curr = {\"valid\": True, \"isPartial\": True}\n    else:\n        curr\
          \ = llm_output or {}\n\n    # 2. State Initialization & Normalization\n\
          \    prev = inspection_state or {}\n    \n    # Extract and normalize current/previous\
          \ values\n    curr_equip = normalize_list(curr.get(\"equipment_codes\"))\n\
          \    curr_report = normalize_list(curr.get(\"report_type_codes\"))\n   \
          \ \n    prev_equip = normalize_list(prev.get(\"equipment_codes\"))\n   \
          \ prev_report = normalize_list(prev.get(\"report_type_codes\"))\n\n    #\
          \ 3. Invalid Handling\n    if not curr.get(\"valid\", True):\n        if\
          \ not prev_equip and not prev_report:\n            return {\n          \
          \      \"inspection_state\": {\"equipment_codes\": prev_equip, \"report_type_codes\"\
          : prev_report, \"inspection_date\": prev.get(\"inspection_date\")},\n  \
          \              \"clarification_count\": clarification_count,\n         \
          \       \"status\": \"invalid\"\n            }\n        curr[\"isPartial\"\
          ] = True\n\n    # 4. Merge Logic\n    # Using sorted list of sets ensures\
          \ uniqueness and consistency\n    merged_equip = sorted(list(set(prev_equip\
          \ + curr_equip)))\n    merged_report = sorted(list(set(prev_report + curr_report)))\n\
          \    \n    # Safe Date Handling\n    new_date = normalize_date(curr.get(\"\
          inspection_date\"))\n    merged_date = new_date if new_date else prev.get(\"\
          inspection_date\")\n\n    # Helper for creating the standard response state\n\
          \    def build_state(e, r, d):\n        return {\"equipment_codes\": e,\
          \ \"report_type_codes\": r, \"inspection_date\": d}\n\n    # 5. Status Detection\
          \ Flags\n    has_equipment = len(merged_equip) > 0\n    has_report = len(merged_report)\
          \ > 0\n    is_complete = has_equipment and has_report\n    is_partial =\
          \ curr.get(\"isPartial\", False)\n\n    # 6. Logic Routing (Exact order\
          \ preserved)\n    \n    # Full Intent Detection\n    if set(merged_equip)\
          \ == set(DEFAULT_EQUIPMENT) and set(merged_report) == set(DEFAULT_REPORT):\n\
          \        return {\n            \"inspection_state\": build_state(merged_equip,\
          \ merged_report, None),\n            \"clarification_count\": clarification_count,\n\
          \            \"status\": \"complete\"\n        }\n\n    # Smart Completion\n\
          \    if is_complete:\n        if bool(merged_date) or clarification_count\
          \ >= 2 or not is_partial:\n            return {\n                \"inspection_state\"\
          : build_state(merged_equip, merged_report, merged_date),\n             \
          \   \"clarification_count\": clarification_count,\n                \"status\"\
          : \"complete\"\n            }\n\n    # Force Complete after 2 attempts\n\
          \    if clarification_count >= 2:\n        if not has_equipment and not\
          \ has_report:\n            return {\n                \"inspection_state\"\
          : build_state(prev_equip, prev_report, prev.get(\"inspection_date\")),\n\
          \                \"clarification_count\": clarification_count,\n       \
          \         \"status\": \"invalid\"\n            }\n        \n        return\
          \ {\n            \"inspection_state\": build_state(\n                merged_equip\
          \ if has_equipment else DEFAULT_EQUIPMENT,\n                merged_report\
          \ if has_report else DEFAULT_REPORT,\n                merged_date\n    \
          \        ),\n            \"clarification_count\": clarification_count,\n\
          \            \"status\": \"complete\"\n        }\n\n    # Partial / Final\
          \ Fallback\n    new_clarification_count = clarification_count + 1 if is_partial\
          \ else clarification_count\n    status = \"partial\" if (is_partial or not\
          \ is_complete) else \"complete\"\n\n    return {\n        \"inspection_state\"\
          : build_state(merged_equip, merged_report, merged_date),\n        \"clarification_count\"\
          : new_clarification_count,\n        \"status\": status\n    }"
        code_language: python3
        desc: This node normalizes and merges the current LLM output with the previous
          inspection_state, validates and enriches extracted data (equipment, report
          types, date), and determines the conversation status (complete, partial,
          or invalid) based on completeness and clarification attempts.
        outputs:
          clarification_count:
            children: null
            type: number
          inspection_state:
            children: null
            type: object
          status:
            children: null
            type: string
