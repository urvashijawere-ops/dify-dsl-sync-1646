          text: "Input: {{#context#}} \nStep: {{#conversation.button7_step#}}\n\n\
            Return EXACT Japanese UI text OR formatted value.\n ----------------------------------\
            \ \nSTEP= 2 (Urgency Selection): \n- urgent/asap/至急 → 至急対応してほしい\n - not\
            \ urgent/後で/急ぎでない → 急いでいない\n ---------------------------------- \nSTEP=\
            \ 6 (Summary Actions):\n - confirm/ok → 決定（変更なし）\n - menu/back → メニューに戻る\
            \ \n- change urgency of callback→ 折り返しの緊急度の変更\n- name → お客さま名の変更 \n- contact/phone\
            \ → 連絡先の変更\n - notes → 特記事項の変更\n ---------------------------------- \n\
            STEP= 1 or 11 (Equipment): \nSub優先: \n防犯カメラ(カメラ,CCTV,録画)\n自動ドア(ドア,扉) \n\
            入退室管理(カード,認証,鍵) \n消防設備(火災,煙,警報) \n給排水設備(水,漏れ,排水,トイレ) \n\nMain: \nエレベーター(lift,elevator,リフト)\
            \ \nエスカレーター(escalator) \n空調設備(AC,エアコン,冷房,暖房)\nビル管理設備(ビル,防犯,消防,水道)\n -\
            \ If sub match → return sub\n- Else main\n ----------------------------------\n\
            \ Rules:\n - Only evaluate current STEP \n- Ignore all other intents \n\
            - Match by meaning (JP/EN/typos OK)\n- If unclear → null\n- Output one\
            \ exact value only"
