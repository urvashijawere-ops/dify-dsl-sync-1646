    - data:
        code: "import json\nimport re\nfrom datetime import datetime\n\ndef parse_date(date_str):\n\
          \    date_str = date_str.strip()\n    formats = [\"%Y年%m月%d日\"]\n    for\
          \ fmt in formats:\n        try: return datetime.strptime(date_str, fmt)\n\
          \        except: continue\n    return None\n\n# --------------------------------------------------------------------------\n\
          # --- STEP HANDLERS ---\n# --------------------------------------------------------------------------\n\
          \ndef handle_step_0(raw_input, existing_data, response_text, JAPANESE_RATING_ERROR_PHRASE):\n\
          \    if JAPANESE_RATING_ERROR_PHRASE in response_text:\n        return 0,\
          \ \"\", False, \"入力された評価が無効です。\"\n    return 1, \"STEP_0\", True, \"\" \n\
          \ndef handle_step_1(raw_input, existing_data):\n    valid_main = [\"エレベーター\"\
          , \"エスカレーター\", \"空調設備\"]\n    valid_building = [\"ビル管理設備\",\"防犯カメラ\",\"\
          自動ドア\",\"消防設備\",\"入退室管理\",\"給排水設備\"]\n\n    if raw_input in valid_building:\n\
          \        existing_data[\"model_type\"] = \"ビル管理設備\"\n        return 11,\
          \ \"STEP_11\", True, \"\"\n    elif raw_input in valid_main:\n        existing_data[\"\
          model_type\"] = raw_input\n        existing_data[\"sub_type\"] = \"\"\n\
          \        return 2, \"INPUT_PART\", True, \"\"\n    return 1, \"\", False,\
          \ \"無効な設備選択です\"\n\ndef handle_step_11(raw_input, existing_data):\n    valid_sub\
          \ = [\"防犯カメラ\", \"自動ドア\", \"入退室管理\",\"消防設備\",\"給排水設備\"]\n    if raw_input\
          \ in valid_sub:\n        existing_data[\"sub_type\"] = raw_input\n     \
          \   return 2, \"INPUT_PART\", True, \"\"\n    return 11, \"\", False, \"\
          検査または修理を行うための機器または設備が無効です。\"\n\ndef handle_step_2(raw_input, existing_data):\n\
          \    existing_data[\"part_condition\"] = raw_input\n    edit_mode = existing_data.get(\"\
          edit_mode\", False)\n    next_step = 8 if edit_mode else 3\n    ui = \"\
          SUMMARY\" if edit_mode else \"INPUT_TIME\"\n    existing_data[\"edit_mode\"\
          ] = False\n    return next_step, ui, True, \"\"\n\ndef handle_step_3(raw_input,\
          \ existing_data):\n    parsed_date = parse_date(raw_input)\n    if not parsed_date:\n\
          \        return 3, \"INPUT_TIME\", False, \"無効な日付形式です\"\n    \n    if parsed_date.date()\
          \ > datetime.now().date():\n        return 3, \"INPUT_TIME\", False, \"\
          未来の日付は入力できません\"\n    \n    existing_data[\"time_of_occurence\"] = raw_input\n\
          \    edit_mode = existing_data.get(\"edit_mode\", False)\n    next_step\
          \ = 8 if edit_mode else 4\n    ui = \"SUMMARY\" if edit_mode else \"STEP_4\"\
          \n    existing_data[\"edit_mode\"] = False\n    return next_step, ui, True,\
          \ \"\"\n\ndef handle_step_4(raw_input, existing_data):\n    if raw_input\
          \ in [\"急いでいない\", \"至急対応してほしい\"]:\n        existing_data[\"urgency_of_call_back\"\
          ] = raw_input\n        edit_mode = existing_data.get(\"edit_mode\", False)\n\
          \        next_step = 8 if edit_mode else 5\n        ui = \"SUMMARY\" if\
          \ edit_mode else \"INPUT_NAME\"\n        existing_data[\"edit_mode\"] =\
          \ False\n        return next_step, ui, True, \"\"\n    return 4, \"\", False,\
          \ \"緊急性エラー\"\n\ndef handle_step_5(raw_input, existing_data):\n    existing_data[\"\
          customer_name\"] = raw_input\n    edit_mode = existing_data.get(\"edit_mode\"\
          , False)\n    next_step = 8 if edit_mode else 6\n    ui = \"SUMMARY\" if\
          \ edit_mode else \"INPUT_PHONE\"\n    existing_data[\"edit_mode\"] = False\n\
          \    return next_step, ui, True, \"\"\n\ndef handle_step_6(raw_input, existing_data):\n\
          \ \n    phone_input = raw_input.strip()\n \n    # Reject alphabet or invalid\
          \ special characters\n    if re.search(r\"[A-Za-z]\", phone_input) or re.search(r\"\
          [^\\d\\-\\+\\s]\", phone_input):\n        return 6, \"INPUT_PHONE\", False,\
          \ \"電話番号に無効な文字が含まれています\"\n   \n    # Extract digits only\n    phone_digits\
          \ = re.sub(r\"\\D\", \"\", phone_input)\n \n    if len(phone_digits) ==\
          \ 11:\n        formatted_phone = f\"{phone_digits[:3]}-{phone_digits[3:7]}-{phone_digits[7:]}\"\
          \n    elif len(phone_digits) == 10:\n     \n        formatted_phone = f\"\
          {phone_digits[:2]}-{phone_digits[2:6]}-{phone_digits[6:]}\"\n    else:\n\
          \        return 6, \"INPUT_PHONE\", False, \"無効な電話番号\"\n   \n    existing_data[\"\
          customer_phone\"] = formatted_phone\n    edit_mode = existing_data.get(\"\
          edit_mode\", False)\n    next_step = 8 if edit_mode else 7\n    ui = \"\
          SUMMARY\" if edit_mode else \"STEP_7\"\n    existing_data[\"edit_mode\"\
          ] = False\n \n    return next_step, ui, True, \"\"\n\n\ndef handle_step_7(raw_input,\
          \ existing_data):\n    existing_data[\"special_instructions\"] = \"なし\"\
          \ if raw_input in [\"特記事項なし\", \"\"] else raw_input\n    return 8, \"SUMMARY\"\
          , True, \"\"\n\ndef handle_step_8(raw_input, existing_data):\n    mapping\
          \ = {\n        \"決定（変更なし）\": (9, \"\"),\n        \"メニューに戻る\": (10, \"MENU\"\
          ),\n        \"点検・調査個所の変更\": (2, \"INPUT_PART\"),\n        \"発生日時の変更\": (3,\
          \ \"INPUT_TIME\"),\n        \"折り返しの緊急度の変更\": (4, \"STEP_4\"),\n        \"\
          お客さま名の変更\": (5, \"INPUT_NAME\"),\n        \"連絡先の変更\": (6, \"INPUT_PHONE\"\
          ),\n        \"特記事項の変更\": (7, \"STEP_7\")\n    }\n    if raw_input in mapping:\n\
          \        step, ui = mapping[raw_input]\n        if step not in [9, 10]:\
          \ existing_data[\"edit_mode\"] = True\n        return step, ui, True, \"\
          \"\n    return 8, \"\", False, \"最終概要ボタンのエラー\"\n\n# --------------------------------------------------------------------------\n\
          # --- MAIN DISPATCHER ---\n# --------------------------------------------------------------------------\n\
          \ndef main(internal_step: int, input: str, existing_data: dict, response_text:\
          \ str) -> dict:\n    internal_step = existing_data.get(\"button4_step\"\
          , internal_step)\n    existing_data[\"request\"] = \"点検/故障対応依頼\"\n    raw_input\
          \ = input.strip()\n    \n    ui_step = \"\"\n    error_message = \"\"\n\
          \    is_validation = True\n    JAPANESE_RATING_ERROR_PHRASE = \"入力された評価が無効です。\"\
          \n\n    # Define the dispatch table for standard handlers\n    handlers\
          \ = {\n        1: handle_step_1,\n        11: handle_step_11,\n        2:\
          \ handle_step_2,\n        3: handle_step_3,\n        4: handle_step_4,\n\
          \        5: handle_step_5,\n        6: handle_step_6,\n        7: handle_step_7,\n\
          \        8: handle_step_8\n    }\n\n    # Step 0 logic (gatekeeper)\n  \
          \  if internal_step == 0:\n        internal_step, ui_step, is_validation,\
          \ error_message = handle_step_0(\n            raw_input, existing_data,\
          \ response_text, JAPANESE_RATING_ERROR_PHRASE\n        )\n        # If internal_step\
          \ remains 0, it means the phrase was present, \n        # allowing the code\
          \ to skip the 'elif' handlers and hit the rating check below.\n\n    # Check\
          \ if the current step is in our handler map\n    elif internal_step in handlers:\n\
          \        internal_step, ui_step, is_validation, error_message = handlers[internal_step](raw_input,\
          \ existing_data)\n\n    return {\n        \"result\": existing_data,\n \
          \       \"ui_step\": ui_step,\n        \"internal_step\": internal_step,\n\
          \        \"error_message\": error_message,\n        \"is_validation\": str(is_validation).lower()\n\
          \    }"
