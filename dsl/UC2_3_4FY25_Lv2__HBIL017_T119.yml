    - data:
        code: "import json\nfrom datetime import datetime\n\n# --- Constants & Configuration\
          \ ---\nMODEL_CODE_MAP = {\n    \"1\": \"エレベーター\",\n    \"2\": \"エスカレーター\"\
          ,\n    \"3\": \"空調設備\",\n    \"4\": \"ビル管理設備\"\n}\n\nCOLUMN_MAP = {\n  \
          \  \"work_date\": \"scheduledworkdate\",\n    \"begin\": \"begindatetime\"\
          ,\n    \"end\": \"enddatetime\",\n    \"goki\": \"goki\",\n    \"model\"\
          : \"modelcode\",\n    \"buil\": \"BUIL_NAME\"\n}\n\n# --- Utility Functions\
          \ ---\n\ndef format_work_date(date_str):\n    if not date_str:\n       \
          \ return \"N/A\"\n    try:\n        dt = datetime.strptime(date_str, \"\
          %Y-%m-%d\")\n        return dt.strftime(\"%B %d, %Y (%A)\")\n    except\
          \ (ValueError, TypeError):\n        return date_str\n\ndef format_time(dt_str):\n\
          \    if not dt_str or dt_str in {\"N/A\", \"null\", \"\"}:\n        return\
          \ \"点検時間が未確定です。\"\n    try:\n        # Standardize ISO format for fromisoformat\n\
          \        clean_dt = dt_str.replace(\"Z\", \"+00:00\")\n        if clean_dt.endswith(\"\
          +00\"):\n            clean_dt += \":00\"\n            \n        dt = datetime.fromisoformat(clean_dt)\n\
          \        # Handle platform-specific zero-padding removal\n        fmt =\
          \ \"%#I:%M %p\" if hasattr(datetime, \"strftime\") and \"%#\" in \"%#I\"\
          \ else \"%-I:%M %p\"\n        try:\n            return dt.strftime(fmt)\n\
          \        except ValueError:\n            return dt.strftime(\"%I:%M %p\"\
          )\n    except (ValueError, TypeError):\n        return \"点検時間が未確定です。\"\n\
          \n# --- MAIN FUNCTION ---\n\ndef main(building_name, gms_records, kanri_no,\
          \ jigyou_cd):\n    try:\n        building_name = building_name or \"\"\n\
          \        today = datetime.now().date()\n\n        # --- Safe JSON Parsing\
          \ ---\n        if isinstance(gms_records, str):\n            try:\n    \
          \            gms = json.loads(gms_records)\n            except json.JSONDecodeError:\n\
          \                gms = []\n        else:\n            gms = gms_records\
          \ or []\n\n        # Ensure gms is a list\n        if isinstance(gms, dict):\n\
          \            gms = [gms]\n        elif not isinstance(gms, list):\n    \
          \        gms = []\n\n        result_strings = []\n        equipment_seen\
          \ = set()\n        equipment_list = []\n        matching_gms_out = []\n\n\
          \        for g in gms:\n            # 1. Date Filtering\n            work_date_str\
          \ = g.get(COLUMN_MAP[\"work_date\"])\n            try:\n               \
          \ if not work_date_str or datetime.strptime(work_date_str, \"%Y-%m-%d\"\
          ).date() < today:\n                    continue\n            except ValueError:\n\
          \                continue\n\n            # Record this as a matching GMS\
          \ record\n            matching_gms_out.append(json.dumps(g, ensure_ascii=False))\n\
          \n            if not building_name:\n                continue\n\n      \
          \      # 2. Equipment String Construction\n            m_code = str(g.get(COLUMN_MAP[\"\
          model\"], \"\"))\n            model_text = MODEL_CODE_MAP.get(m_code, \"\
          \")\n            goki_val = g.get(COLUMN_MAP[\"goki\"]) or \"\"\n      \
          \      \n            if model_text and goki_val:\n                equipment_display\
          \ = f\"{model_text} {goki_val}号機\"\n            else:\n                equipment_display\
          \ = model_text or \"N/A\"\n\n            if equipment_display != \"N/A\"\
          \ and equipment_display not in equipment_seen:\n                equipment_list.append(equipment_display)\n\
          \                equipment_seen.add(equipment_display)\n\n            #\
          \ 3. Formatting Time/Date for Display\n            start_time = format_time(g.get(COLUMN_MAP[\"\
          begin\"]))\n            end_time = format_time(g.get(COLUMN_MAP[\"end\"\
          ]))\n            insp_date_display = format_work_date(work_date_str)\n\n\
          \            # 4. Result Block Creation\n            block = (\n       \
          \         f\"Branch Code: {jigyou_cd}\\n\"\n                f\"Customer\
          \ Number: {kanri_no}\\n\"\n                f\"Building Name: {building_name}\\\
          n\"\n                f\"Equipment Name: {equipment_display}\\n\"\n     \
          \           f\"Inspection Date: {insp_date_display}\\n\"\n             \
          \   f\"Inspection Start Time: {start_time}\\n\"\n                f\"Inspection\
          \ End Time: {end_time}\"\n            )\n            result_strings.append(block)\n\
          \n        return {\n            \"result\": result_strings or [\"No future\
          \ inspection records found.\"],\n            \"equipment_list\": equipment_list,\n\
          \            \"matching_gms\": matching_gms_out\n        }\n\n    except\
          \ Exception as e:\n        return {\n            \"result\": [f\"Error:\
          \ {str(e)}\"],\n            \"equipment_list\": [],\n            \"matching_gms\"\
          : [],\n        }"
