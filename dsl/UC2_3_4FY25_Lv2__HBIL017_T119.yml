    - data:
        code: "def main(\n    internal_step: int,\n    input: str,\n    existing_data:\
          \ dict,\n    future_inspection_date_result: list,\n    response_text: str,\n\
          \    is_equipment_name: str,\n    wrong_input_count: int\n) -> dict:\n\n\
          \    import re\n    from datetime import datetime\n\n    # =====================\
          \ CONSTANTS =====================\n    JAPANESE_RATING_ERROR_PHRASE = \"\
          入力された評価が無効です。\"\n    ENGLISH_RATING_ERROR_PHRASE = \"your rating input was\
          \ invalid\"\n    jp_date_pattern = r\"^\\d{4}年\\d{1,2}月\\d{1,2}日$\"\n  \
          \  slash_date_pattern = r\"^\\d{4}/\\d{1,2}/\\d{1,2}$\"\n\n    # =====================\
          \ HELPERS =====================\n    def normalize_space(text):\n      \
          \  if not text:\n            return \"\"\n        text = text.replace(\"\
          　\", \" \").replace(\"\\n\", \" \").replace(\"\\r\", \" \")\n        return\
          \ re.sub(r\"\\s+\", \" \", text).strip()\n\n    def default(val):\n    \
          \    return val if val else \"なし\"\n\n    def extract_inspection_data(matched_item):\n\
          \        date = \"\"\n        time = \"\"\n        category = \"\"\n   \
          \     unit = \"\"\n        work = \"\"\n\n        d = re.search(r\"\\d{4}年\\\
          d{1,2}月\\d{1,2}日\", matched_item)\n        t = re.search(r\"\\d{1,2}時\\\
          d{2}分～\\d{1,2}時\\d{2}分\", matched_item)\n        m = re.findall(r\"([^|\\\
          s]+)\\s*/\\s*(\\d+)号機\\s*/\\s*([^|]+)\", matched_item)\n\n        if d:\n\
          \            date = d.group(0)\n        if t:\n            time = t.group(0)\n\
          \        if m:\n            category = \", \".join(e.strip() for e, _, _\
          \ in m)\n            unit = \", \".join(u.strip() for _, u, _ in m)\n  \
          \          work = \", \".join(w.strip() for _, _, w in m)\n\n        return\
          \ date, time, category, unit, work\n\n    # ===================== INIT =====================\n\
          \    inquiry_content = \"点検日時を変更したい\"\n\n    current_maintenance_date =\
          \ existing_data.get(\"current_maintenance_date\", \"\")\n    current_maintenance_time\
          \ = existing_data.get(\"current_maintenance_time\", \"\")\n    equipment_category\
          \ = existing_data.get(\"equipment_category\", \"\")\n    equipment_name\
          \ = existing_data.get(\"equipment_name\", \"\")\n    unit_number = existing_data.get(\"\
          unit_number\", \"\")\n    work_names = existing_data.get(\"work_names\"\
          , \"\")\n    desired_changed_date = existing_data.get(\"desired_changed_date\"\
          , \"\")\n    urgency_of_call_back = existing_data.get(\"urgency_of_call_back\"\
          , \"\")\n    customer_name = existing_data.get(\"customer_name\", \"\")\n\
          \    customer_information = existing_data.get(\"customer_information\",\
          \ \"\")\n    remarks = existing_data.get(\"remarks\", \"\")\n    edit_mode\
          \ = existing_data.get(\"edit_mode\", \"\")\n    common_date_list = existing_data.get(\"\
          common_date_list\", [])\n\n    output = \"\"\n    is_validation = True\n\
          \    error_message = \"\"\n    next_step = 5\n    output_message = \"\"\n\
          \n    raw_input = input.strip()\n    normalized_input = normalize_space(raw_input)\n\
          \    response_lower = response_text.lower()\n\n    is_rating_error = (\n\
          \        JAPANESE_RATING_ERROR_PHRASE in response_text\n        or ENGLISH_RATING_ERROR_PHRASE\
          \ in response_lower\n    )\n\n    # ===================== HANDLERS =====================\n\
          \    def step_0():\n        nonlocal equipment_category, equipment_name\n\
          \        nonlocal current_maintenance_date, current_maintenance_time\n \
          \       nonlocal unit_number, work_names, common_date_list\n\n        simple\
          \ = [\"エレベーター\", \"エスカレーター\", \"空調設備\"]\n        building = \"ビル管理設備\"\n\
          \        sub = [\"防犯カメラ\", \"自動ドア\", \"入退室管理\", \"消防設備\", \"給排水設備\"]\n\n\
          \        if is_equipment_name == \"true\":\n            if any(x in normalized_input\
          \ for x in simple):\n                equipment_category = next(x for x in\
          \ simple if x in normalized_input)\n                equipment_name = \"\"\
          \n                return 1, \"DESIRED_CHANGE_DATE_OUTPUT_MESSAGE\", True\n\
          \n            if building in normalized_input or any(x in normalized_input\
          \ for x in sub):\n                equipment_category = building\n      \
          \          equipment_name = \"\"\n                return 102, \"BUILDING_MANAGEMENT_EQUIPMENT_BUTTON_OUTPUT_MESSAGE\"\
          , True\n\n            return 0, \"EQUIPMENT_BUTTON_ERROR_MESSAGE\", False\n\
          \n        normalized_results = [normalize_space(i) for i in future_inspection_date_result]\n\
          \        matched = []\n\n        for o, n in zip(future_inspection_date_result,\
          \ normalized_results):\n            if not n:\n                continue\n\
          \n            if normalized_input == n or normalized_input in n:\n     \
          \           matched.append(o)\n                continue\n\n            parts\
          \ = [p.strip() for p in normalized_input.split(\"|\") if p.strip()]\n  \
          \          if any(p in n for p in parts):\n                matched.append(o)\n\
          \n        if not matched:\n            return 0, \"INSPECTION_DATE_RESULT_BUTTON_ERROR_MESSAGE\"\
          , False\n\n        if len(matched) == 1:\n            d, t, c, u, w = extract_inspection_data(matched[0])\n\
          \            current_maintenance_date = d\n            current_maintenance_time\
          \ = t\n            equipment_category = c\n            unit_number = u\n\
          \            work_names = w\n            return 1, \"DESIRED_CHANGE_DATE_OUTPUT_MESSAGE\"\
