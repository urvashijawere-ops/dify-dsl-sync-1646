    - data:
        desc: This node guides the user through a step-by-step workflow to collect
          user request and contract information. It dynamically displays options,
          input fields, and confirmation buttons based on the current step, ensuring
          structured data collection and smooth conversation flow.
        selected: false
        template: "{% if ui_step == \"STEP_0\" %}\r\n\r\n<p>点検・故障対応が必要な設備をお選びいただくか、入力してください。\r\
          \n</p>\r\n\r\n<div style=\"display:flex; flex-direction:column; gap:10px;\"\
          >\r\n<button data-message=\"エレベーター\" data-variant=\"primary\">エレベーター</button>\r\
          \n<button data-message=\"エスカレーター\" data-variant=\"primary\">エスカレーター</button>\r\
          \n<button data-message=\"空調設備\" data-variant=\"primary\">空調設備</button>\r\
          \n<button data-message=\"ビル管理設備\" data-variant=\"primary\">ビル管理設備</button>\r\
          \n</div>\r\n\r\n{% elif ui_step == \"STEP_11\" %}\r\n\r\n\r\n<p>点検または故障対応依頼する機器・設備をお選びいただくか、入力してください。</p>\r\
          \n\r\n<div style=\"display:flex; flex-direction:column; gap:10px;\">\r\n\
          <button data-message=\"防犯カメラ\" data-variant=\"primary\">防犯カメラ</button>\r\
          \n<button data-message=\"自動ドア\" data-variant=\"primary\">自動ドア</button>\r\
          \n<button data-message=\"入退室管理\" data-variant=\"primary\">入退室管理</button>\r\
          \n<button data-message=\"消防設備\" data-variant=\"primary\">消防設備</button>\r\
          \n<button data-message=\"給排水設備\" data-variant=\"primary\">給排水設備</button>\r\
          \n</div>\r\n\r\n{% elif ui_step == \"STEP_4\" %}\r\n\r\n\r\n<p>担当者からの折り返し連絡対応の希望を選択してください。</p>\r\
          \n\r\n<div style=\"display:flex; flex-direction:column; gap:10px;\">\r\n\
          <button data-message=\"急いでいない\" data-variant=\"primary\">急いでいない</button>\r\
          \n<button data-message=\"至急対応してほしい\" data-variant=\"primary\">至急対応してほしい</button>\r\
          \n</div>\r\n\r\n{% elif ui_step == \"STEP_7\" %}\r\n\r\n<p>ご連絡を差し上げるご希望時間帯や、</p>\r\
          \n<p>その他特記事項があれば、ご入力ください。</p>\r\n<p>入力例：午前中に連絡ほしい</p>\r\n\r\n<div style=\"\
          display:flex; flex-direction:column; gap:10px;\">\r\n<button data-message=\"\
          特記事項なし\" data-variant=\"primary\">特記事項なし</button>\r\n</div>\r\n\r\n{% elif\
          \ ui_step == \"INPUT_PART\" %}\r\n\r\n点検・故障対応を行いたい部位と状態をご入力ください。  \r\n入力例：エレベーターの外の掲示板\r\
          \n\r\n{% elif ui_step == \"INPUT_TIME\" %}\r\n\r\n発生した日時を教えてください。\r\n入力例：\
          \  2026年4月2日\r\n\r\n{% elif ui_step == \"INPUT_NAME\" %}\r\n\r\nお客さまのお名前を入力してください\r\
          \n\r\n{% elif ui_step == \"INPUT_PHONE\" %}\r\nお客さまの電話番号を入力してください\r\n\r\n\
          {% elif ui_step == \"SUMMARY\" %}\r\n\r\n以下の内容でよろしければ、決定ボタンを選択してください。\r\n\
          設備を変更する場合は、メニューより再度入力してください。\r\n変更がある場合は、変更ボタンの選択、または、変更する項目を入力してください。（入力例：変更希望日）\r\
          \n\r\n支社コード: {{ branchCodeCurrent }}\r\nお客様番号: {{ customerNumberCurrent\
          \ }}\r\nビル名: {{ buildingName }}\r\n問合せ内容：{{ result.request }}\r\n設備分類: {{\
          \ result.model_type }}\r\n設備機器: {{ result.sub_type }}\r\n点検・調査個所: {{ result.part_condition\
          \ }}\r\n発生日時: {{ result.time_of_occurence }}\r\n折り返し連絡の緊急度: {{ result.urgency_of_call_back\
          \ }}\r\nお客さま名: {{ result.customer_name }}\r\n連絡先: {{ result.customer_phone\
          \ }}\r\n特記事項: {{ result.special_instructions or \"なし\" }}\r\n\r\n\r\n<div\
          \ style=\"display:flex; flex-direction:column; gap:10px;\">\r\n<button data-message=\"\
