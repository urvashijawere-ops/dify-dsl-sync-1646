          \  \"至急対応してほしい\",\n        \"エレベーター\",\n        \"エスカレーター\",\n        \"\
          空調設備\",\n        \"ビル管理設備\",\n        \"防犯カメラ\",\n        \"自動ドア\",\n  \
          \      \"入退室管理\",\n        \"消防設備\",\n        \"給排水設備\",\n        \"特記事項なし\"\
          ,\n        \"決定（変更なし）\",\n        \"メニューに戻る\",\n        \"変更希望日の変更\",\n\
          \        \"折り返し連絡の緊急度の変更\",\n        \"お客さま名の変更\",\n        \"連絡先の変更\",\n\
          \        \"特記事項の変更\",\n        \"解決した\",\n        \"解決しなかった\"\n    ]\n\n\
          \    if internal_step in [1, 3, 4, 5, 7, 9, 10, 11, 101]:\n        return\
          \ {\n            \"is_valid_option\": \"True\",\n            \"input_value\"\
          : user_input.strip() if user_input else \"\"\n        }\n\n    if not user_input:\n\
          \        return {\n            \"is_valid_option\": \"False\",\n       \
          \     \"input_value\": \"\"\n        }\n\n    def normalize(text: str) ->\
          \ str:\n        return (\n            text.replace(\"　\", \" \")\n     \
          \           .replace(\"\\r\", \"\")\n                .replace(\"\\n\", \"\
          \")\n                .strip()\n        )\n\n    cleaned_input = normalize(user_input)\n\
          \n    # Static option check (exact match)\n    for opt in static_options:\n\
          \        if cleaned_input == normalize(opt):\n            return {\n   \
          \             \"is_valid_option\": \"True\",\n                \"input_value\"\
          : cleaned_input\n            }       \n\n    # Dynamic option check (containment\
          \ logic)\n    normalized_parts = [normalize(x) for x in future_inspection_date_result\
          \ or []]\n\n    matched_parts = [\n        part for part in normalized_parts\n\
          \        if part and part in cleaned_input\n    ]\n\n    if matched_parts:\n\
          \        return {\n            \"is_valid_option\": \"True\",\n        \
          \    \"input_value\": cleaned_input\n        }\n\n    return {\n       \
          \ \"is_valid_option\": \"False\",\n        \"input_value\": cleaned_input\n\
          \    }"
