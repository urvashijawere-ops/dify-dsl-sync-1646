    - data:
        code: "import re\nimport json\n\n# --- Constants & Maps ---\nMONTH_MAP = {\n\
          \    \"January\": \"1\", \"February\": \"2\", \"March\": \"3\", \"April\"\
          : \"4\", \"May\": \"5\", \"June\": \"6\",\n    \"July\": \"7\", \"August\"\
          : \"8\", \"September\": \"9\", \"October\": \"10\", \"November\": \"11\"\
          , \"December\": \"12\"\n}\n\nWEEKDAY_MAP = {\n    \"Monday\": \"月\", \"\
          Tuesday\": \"火\", \"Wednesday\": \"水\", \"Thursday\": \"木\", \"Friday\"\
          : \"金\", \"Saturday\": \"土\", \"Sunday\": \"日\"\n}\n\n# Pre-compiled regex\
          \ for performance\nRE_TIME = re.compile(r'(\\d{1,2}):(\\d{2})\\s*(AM|PM)',\
          \ re.I)\nRE_EQUIP_NAME = re.compile(r'Equipment Name:\\s*(.*)')\nRE_UNIT\
          \ = re.compile(r'([A-Za-z0-9-]+)号機')\nRE_DATE = re.compile(r'(\\w+)\\s(\\\
          d+),\\s(\\d+)\\s\\((\\w+)\\)')\nRE_EQUIP_FULL = re.compile(r'(.+?)\\s([A-Za-z0-9-]+号機)')\n\
          \ndef format_time_jp(time_str: str) -> str:\n    match = RE_TIME.search(time_str)\n\
          \    if not match:\n        return time_str\n    \n    hour, minute, period\
          \ = match.groups()\n    hour = int(hour)\n    period = period.upper()\n\n\
          \    if period == \"PM\" and hour != 12:\n        hour += 12\n    elif period\
          \ == \"AM\" and hour == 12:\n        hour = 0\n    \n    return f\"{hour:02d}時{minute}分\"\
          \n\ndef extract_field(label: str, item: str) -> str:\n    match = re.search(rf\"\
          {label}:\\s*(.*)\", item)\n    return match.group(1).strip() if match else\
          \ \"\"\n\ndef extract_fields(item: str) -> dict:\n    date_raw = extract_field(\"\
          Inspection Date\", item)\n    date_match = RE_DATE.search(date_raw)\n  \
          \  \n    if date_match:\n        month, day, year, weekday = date_match.groups()\n\
          \        date_raw = f\"{year}年{MONTH_MAP.get(month, month)}月{int(day)}日\
          \ ({WEEKDAY_MAP.get(weekday, weekday)})\"\n\n    return {\n        \"支社コード\"\
          : extract_field(\"Branch Code\", item),\n        \"お客さま番号\": extract_field(\"\
          Customer Number\", item),\n        \"ビル名\": extract_field(\"Building Name\"\
          , item),\n        \"設備名称\": extract_field(\"Equipment Name\", item),\n \
          \       \"点検日\": date_raw,\n        \"点検開始\": format_time_jp(extract_field(\"\
          Inspection Start Time\", item)),\n        \"点検終了\": format_time_jp(extract_field(\"\
          Inspection End Time\", item))\n    }\n\ndef create_json_response(records:\
          \ list) -> str:\n    \"\"\"Helper to maintain the exact JSON output format.\"\
          \"\"\n    return json.dumps({\"点検詳細\": records}, ensure_ascii=False, indent=2)\n\
          \ndef main(response_text: str, result: list, user_input: str, equipment_state:\
          \ dict) -> dict:\n    # Logic-identical error phrases\n    ASK_EQUIPMENT\
          \ = \"設備を指定してください。\"\n    ASK_UNIT = \"号機を指定してください。\"\n    NOT_FOUND_MSG\
          \ = \"該当する設備が見つかりません。以下から選択してください。\"\n\n    raw_input = user_input.strip()\n\
          \n    # 1. Immediate Rating Error Check\n    if \"入力された評価が無効です。\" in response_text:\n\
          \        return {\n            \"aggregated_result\": \"\", \"equipment_list\"\
          : [], \"equipment_state\": equipment_state,\n            \"error_message\"\
          : \"RATING_ERROR_TRIGGER\", \"is_validation_success\": \"false\", \"next_step\"\
          : 5\n        }\n\n    # 2. Parse User Input\n    is_unit_only = raw_input.startswith(\"\
          UNIT_ONLY\")\n    unit_match = RE_UNIT.search(raw_input)\n    unit_number\
          \ = None\n    if unit_match:\n        unit_raw = unit_match.group(1)\n \
          \       unit_number = unit_raw.zfill(3) if unit_raw.isdigit() else unit_raw\n\
          \n    name_part = RE_UNIT.sub('', raw_input).strip()\n    equipment_name\
          \ = name_part if (name_part and \"{{\" not in name_part and name_part !=\
          \ \"UNIT_ONLY\") else None\n\n    # Context logic\n    prev_equipment =\
          \ equipment_state.get(\"equipment_name\")\n    prev_unit = equipment_state.get(\"\
          unit_number\")\n\n    if not equipment_name and prev_equipment and not is_unit_only:\n\
          \        equipment_name = prev_equipment\n    if not unit_number and prev_unit:\n\
          \        unit_number = prev_unit\n\n    # 3. Filtering Logic\n    matches\
          \ = []\n    for item in result:\n        eq_full_match = RE_EQUIP_NAME.search(item)\n\
          \        if not eq_full_match: continue\n        \n        full_name = eq_full_match.group(1).strip()\n\
          \        name_unit_match = RE_EQUIP_FULL.match(full_name)\n        if not\
          \ name_unit_match: continue\n\n        eq_name, eq_unit = name_unit_match.groups()\n\
          \        \n        if equipment_name and not eq_name.startswith(equipment_name):\n\
          \            continue\n        if unit_number and f\"{unit_number}号機\" not\
          \ in eq_unit:\n            continue\n        matches.append(item)\n\n  \
          \  # 4. Routing Logic (CASE 1, 2, 3)\n    \n    # CASE 1: Both provided\n\
          \    if equipment_name and unit_number:\n        if matches:\n         \
          \   return {\n                \"aggregated_result\": create_json_response([extract_fields(m)\
          \ for m in matches]),\n                \"equipment_list\": [],\n       \
          \         \"equipment_state\": {\"equipment_name\": equipment_name, \"unit_number\"\
          : unit_number},\n                \"error_message\": \"\", \"is_validation_success\"\
          : \"true\", \"next_step\": 5\n            }\n\n    # CASE 2: Unit only\n\
          \    if unit_number and not equipment_name:\n        unit_matches = [item\
          \ for item in result if f\"{unit_number}号機\" in item]\n        if len(unit_matches)\
          \ == 1:\n            return {\n                \"aggregated_result\": create_json_response([extract_fields(unit_matches[0])]),\n\
          \                \"equipment_list\": [],\n                \"equipment_state\"\
          : {\"equipment_name\": None, \"unit_number\": unit_number},\n          \
          \      \"error_message\": \"\", \"is_validation_success\": \"true\", \"\
          next_step\": 5\n            }\n        elif len(unit_matches) > 1:\n   \
          \         unique_equip = sorted(list(set(RE_EQUIP_NAME.search(i).group(1).strip()\
          \ for i in unit_matches)))\n            if len(unique_equip) == 1:\n   \
          \             return {\n                    \"aggregated_result\": create_json_response([extract_fields(i)\
          \ for i in unit_matches]),\n                    \"equipment_list\": [],\n\
          \                    \"equipment_state\": {\"equipment_name\": unique_equip[0],\
          \ \"unit_number\": unit_number},\n                    \"error_message\"\
          : \"\", \"is_validation_success\": \"true\", \"next_step\": 5\n        \
          \        }\n            return {\n                \"aggregated_result\"\
          : \"\", \"equipment_list\": unique_equip,\n                \"equipment_state\"\
          : {\"equipment_name\": None, \"unit_number\": unit_number},\n          \
          \      \"error_message\": ASK_EQUIPMENT, \"is_validation_success\": \"false\"\
          , \"next_step\": 4\n            }\n\n    # CASE 3: Equipment name only\n\
          \    if equipment_name and not unit_number:\n        equipment_matches =\
          \ [item for item in result if equipment_name in item]\n        if not equipment_matches:\n\
          \            all_equip = sorted(list(set(RE_EQUIP_NAME.search(i).group(1).strip()\
          \ for i in result if RE_EQUIP_NAME.search(i))))\n            return {\n\
          \                \"aggregated_result\": \"\", \"equipment_list\": all_equip,\n\
          \                \"equipment_state\": {\"equipment_name\": None, \"unit_number\"\
          : None},\n                \"error_message\": NOT_FOUND_MSG, \"is_validation_success\"\
          : \"false\", \"next_step\": 4\n            }\n        elif len(equipment_matches)\
          \ == 1:\n            eq_full = RE_EQUIP_NAME.search(equipment_matches[0]).group(1).strip()\n\
          \            u_match = RE_UNIT.search(eq_full)\n            u_num = u_match.group(1).zfill(3)\
          \ if u_match else None\n            return {\n                \"aggregated_result\"\
          : create_json_response([extract_fields(equipment_matches[0])]),\n      \
          \          \"equipment_list\": [],\n                \"equipment_state\"\
          : {\"equipment_name\": equipment_name, \"unit_number\": u_num},\n      \
          \          \"error_message\": \"\", \"is_validation_success\": \"true\"\
          , \"next_step\": 5\n            }\n        else:\n            unique_units\
          \ = sorted(list(set(RE_UNIT.search(RE_EQUIP_NAME.search(i).group(1)).group(1)\
          \ \n                                          for i in equipment_matches\
          \ if RE_UNIT.search(i))))\n            if len(unique_units) == 1:\n    \
          \            return {\n                    \"aggregated_result\": create_json_response([extract_fields(i)\
          \ for i in equipment_matches]),\n                    \"equipment_list\"\
          : [],\n                    \"equipment_state\": {\"equipment_name\": equipment_name,\
          \ \"unit_number\": unique_units[0]},\n                    \"error_message\"\
          : \"\", \"is_validation_success\": \"true\", \"next_step\": 5\n        \
          \        }\n            return {\n                \"aggregated_result\"\
          : \"\", \"equipment_list\": [f\"{equipment_name} {u}\" for u in unique_units],\n\
          \                \"equipment_state\": {\"equipment_name\": equipment_name,\
          \ \"unit_number\": None},\n                \"error_message\": ASK_UNIT,\
          \ \"is_validation_success\": \"false\", \"next_step\": 4\n            }\n\
          \n    # DEFAULT\n    all_equip = sorted(list(set(RE_EQUIP_NAME.search(i).group(1).strip()\
          \ for i in result if RE_EQUIP_NAME.search(i))))\n    return {\n        \"\
          aggregated_result\": \"\", \"equipment_list\": all_equip,\n        \"equipment_state\"\
          : {\"equipment_name\": None, \"unit_number\": None},\n        \"error_message\"\
          : NOT_FOUND_MSG, \"is_validation_success\": \"false\", \"next_step\": 4\n\
          \    }"
