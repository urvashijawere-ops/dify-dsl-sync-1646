    - data:
        code: "import json\nimport re\nfrom datetime import datetime\n\ndef main(input_json):\n\
          \    # 1. Parse Input\n    try:\n        result = json.loads(input_json)\
          \ if isinstance(input_json, str) else input_json\n    except (json.JSONDecodeError,\
          \ TypeError):\n        return {\"error\": \"Invalid JSON input\"}\n\n  \
          \  raw_date_str = str(result.get(\"inspection_date\", \"\") or \"\")\n \
          \   now = datetime.now()\n\n    # Default output structure\n    output_defaults\
          \ = {\n        \"formatted_date\": \"\",\n        \"start_date\": \"\",\n\
          \        \"end_date\": \"\",\n        \"date_scope\": \"LATEST\",\n    \
          \    \"discrete_dates\": []\n    }\n\n    # =====================================================\n\
          \    # 1. RELATIVE DATE DETECTION (Highest Priority)\n    # =====================================================\n\
          \    relative_year = None\n    relative_month_offset = None\n\n    # Year\
          \ Keywords\n    if \"今年\" in raw_date_str:\n        relative_year = now.year\n\
          \    elif any(k in raw_date_str for k in [\"昨年\", \"去年\"]):\n        relative_year\
          \ = now.year - 1\n    elif \"一昨年\" in raw_date_str:\n        relative_year\
          \ = now.year - 2\n    \n    # X年前 Match\n    year_ago_match = re.search(r\"\
          (\\d+)年前\", raw_date_str)\n    if year_ago_match:\n        relative_year\
          \ = now.year - int(year_ago_match.group(1))\n\n    # Month Keywords\n  \
          \  if \"今月\" in raw_date_str:\n        relative_month_offset = 0\n    elif\
          \ \"先月\" in raw_date_str:\n        relative_month_offset = -1\n    elif\
          \ \"先々月\" in raw_date_str:\n        relative_month_offset = -2\n    elif\
          \ \"再来月\" in raw_date_str:\n        relative_month_offset = 1\n\n    # Xヶ月前\
          \ Match\n    months_ago_match = re.search(r\"(\\d+)(?:ヶ月|か月|カ月)前\", raw_date_str)\n\
          \    if months_ago_match:\n        relative_month_offset = -int(months_ago_match.group(1))\n\
          \n    # Apply relative calculation\n    if relative_month_offset is not\
          \ None:\n        # Proper year/month rollover math\n        total_months\
          \ = now.year * 12 + (now.month - 1) + relative_month_offset\n        calc_year\
          \ = total_months // 12\n        calc_month = total_months % 12 + 1\n   \
          \     \n        output_defaults.update({\n            \"date_scope\": \"\
          MONTH\",\n            \"formatted_date\": f\"{calc_month:02d}/{calc_year}\"\
          \n        })\n    elif relative_year is not None:\n        month_match =\
          \ re.search(r\"(\\d{1,2})月\", raw_date_str)\n        if month_match:\n \
          \           output_defaults.update({\n                \"date_scope\": \"\
          MONTH\",\n                \"formatted_date\": f\"{int(month_match.group(1)):02d}/{relative_year}\"\
          \n            })\n        else:\n            output_defaults.update({\n\
          \                \"date_scope\": \"YEAR\",\n                \"formatted_date\"\
          : str(relative_year)\n            })\n\n    # Return immediately if relative\
          \ detection triggered\n    if output_defaults[\"date_scope\"] != \"LATEST\"\
          :\n        result.update(output_defaults)\n        return {\"result\": json.dumps(result,\
          \ ensure_ascii=False)}\n\n    # =====================================================\n\
          \    # 2. COLLECTING DATE COMPONENTS (Ranges, Months, Years)\n    # =====================================================\n\
          \    \n    # Range Collection\n    collected_ranges = []\n    # Year Range:\
          \ 2022年から2024年\n    for m in re.finditer(r\"(\\d{4})年?\\s*(?:から|〜|～|-|ー|to)\\\
          s*(\\d{4})年?\", raw_date_str):\n        collected_ranges.append((\"RANGE\"\
          , str(m.group(1)), str(m.group(2))))\n    \n    # Month Range: 2024年1月から3月\n\
          \    if not collected_ranges:\n        for m in re.finditer(r\"(\\d{4})年\\\
          s*(\\d{1,2})月\\s*(?:から|〜|～|-|ー|to)\\s*(\\d{1,2})月\", raw_date_str):\n  \
          \          y, s_m, e_m = m.group(1), int(m.group(2)), int(m.group(3))\n\
          \            collected_ranges.append((\"RANGE\", f\"{s_m:02d}/{y}\", f\"\
          {e_m:02d}/{y}\"))\n\n    # Single Month/Year Collection\n    collected_months\
          \ = re.findall(r\"(\\d{4})年\\s*(\\d{1,2})月\", raw_date_str)\n    \n    #\
          \ Standalone Years: Filter out years that were already part of a month match\n\
          \    found_years = re.findall(r\"(\\d{4})年?\", raw_date_str)\n    month_years\
          \ = {y for y, m in collected_months}\n    collected_years = sorted(list(set(y\
          \ for y in found_years if y not in month_years)))\n\n    # =====================================================\n\
          \    # 3. DECISION LOGIC (Exact Priority Preserved)\n    # =====================================================\n\
          \    if collected_ranges:\n        scope, start, end = \"RANGE\", collected_ranges[0][1],\
          \ collected_ranges[0][2]\n        output_defaults.update({\"date_scope\"\
          : scope, \"start_date\": start, \"end_date\": end})\n\n    elif len(collected_months)\
          \ > 1:\n        output_defaults.update({\n            \"date_scope\": \"\
          MULTI\",\n            \"discrete_dates\": [f\"{int(m):02d}/{y}\" for y,\
          \ m in collected_months]\n        })\n\n    elif len(collected_months) ==\
          \ 1:\n        y, m = collected_months[0]\n        output_defaults.update({\"\
          date_scope\": \"MONTH\", \"formatted_date\": f\"{int(m):02d}/{y}\"})\n\n\
          \    elif len(collected_years) > 1:\n        output_defaults.update({\"\
          date_scope\": \"MULTI\", \"discrete_dates\": collected_years})\n\n    elif\
          \ len(collected_years) == 1:\n        output_defaults.update({\"date_scope\"\
          : \"YEAR\", \"formatted_date\": collected_years[0]})\n\n    # Final Merge\
          \ and Output\n    result.update(output_defaults)\n    return {\"result\"\
          : json.dumps(result, ensure_ascii=False)}"
