    - data:
        code: "import re\nfrom typing import List, Dict, Any\n\ndef main(input_data:\
          \ str) -> dict:\n    \"\"\"\n    Extracts objects, adds client_id, and creates\
          \ client_selection text format\n    \"\"\"\n    try:\n        # Handle input\
          \ from Dify\n        if isinstance(input_data, str):\n            try:\n\
          \                import json\n                data = json.loads(input_data)\n\
          \            except:\n                data = [{\"text\": input_data}]\n\
          \        else:\n            data = input_data\n\n        # Extract text\n\
          \        if isinstance(data, list) and len(data) > 0:\n            text\
          \ = data[0].get(\"text\", \"\") if isinstance(data[0], dict) else str(data[0])\n\
          \        else:\n            text = str(data)\n\n        # Extract content\
          \ inside {data: [...]}\n        match = re.search(r'\\{data:\\s*\\[(.*?)\\\
          ]\\s*\\}', text, re.DOTALL)\n        if not match:\n            return {\"\
          result\": [], \"client_selection\": \"\", \"error\": \"No data list found\"\
          }\n\n        content = match.group(1).strip()\n\n        object_matches\
          \ = re.findall(r'\\{[^}]*\\}', content)\n        \n        result: List[Dict[str,\
          \ Any]] = []\n        client_selection_lines = [\"Client No | Client name\
          \ | Business Unit | Submission date\"]\n\n        for i, obj_str in enumerate(object_matches,\
          \ start=1):\n            inner = obj_str[1:-1].strip()\n\n            #\
          \ Parse key-value pairs\n            pairs = re.findall(r'([^,]+?)\\s*:\\\
          s*([^,]+?)(?=,|$)', inner)\n            \n            obj_dict: Dict[str,\
          \ Any] = {}\n            \n            for key, value in pairs:\n      \
          \          cleaned_key = key.strip()\n                cleaned_value = value.strip().strip('\"\
          \\'')\n                obj_dict[cleaned_key] = cleaned_value\n\n       \
          \     # Add client_id\n            client_id = f\"{i:02d}\"\n          \
          \  obj_dict[\"client_id\"] = client_id\n\n            # Reorder - client_id\
          \ first\n            ordered_obj = {\"client_id\": client_id}\n        \
          \    ordered_obj.update(obj_dict)\n            \n            result.append(ordered_obj)\n\
          \            # Create client_selection line\n            # Format: 01 |\
          \ Client A Remark 1 | 1/2/2025\n            client_name = obj_dict.get(\"\
          Client Name\", \"\").strip()\n            dept = obj_dict.get(\"Procurement\
          \ Department in Charge\", \"\").strip()\n            submission_date = obj_dict.get(\"\
          Confirmation Form Submission Date\", \"No date found\").strip()\n      \
          \      selection_line = f\"{client_id} | {client_name} | {dept} | {submission_date}\"\
          \n            client_selection_lines.append(selection_line)\n        client_selection_text\
          \ = \"\\n\".join(client_selection_lines)\n\n        return {\n         \
          \   \"result\": result,\n            \"client_selection\": client_selection_text,\n\
          \            \"clients_available\": str(len(result) > 0),\n            \"\
          error\" : \"\"\n        }\n\n    except Exception as e:\n        return\
          \ {\n            \"result\": [],\n            \"client_selection\": \"\"\
          ,\n            \"error\": f\"Processing failed: {str(e)}\",\n          \
          \  \"clients_available\": \"False\"\n        }"
        code_language: python3
        desc: ''
        error_strategy: fail-branch
        outputs:
          client_selection:
            children: null
            type: string
          clients_available:
            children: null
            type: string
          error:
            children: null
            type: string
          result:
            children: null
            type: array[object]
        selected: false
        title: Client Details Extractor
        type: code
        variables:
        - value_selector:
          - '1777459508996'
          - json
          value_type: array[object]
          variable: input_data
