    - data:
        code: "\ndef main(preferred_lang_error: str, missing_file_error: str,doc_rcv_error:str,\
          \ preferred_lang:str,file_extractor_error:str,static_data:dict):\n\n   \
          \ # execute if handling preferred language code node failed.\n    if preferred_lang_error:\n\
          \        button_template = static_data.get(\"button_template\", \"\")\n\
          \        lang_msg_data = static_data.get(\"error_message_language\", {})\n\
          \        message = lang_msg_data.get(\"en_jp\", \"\")\n        buttons_list\
          \ = lang_msg_data.get(\"buttons\", [])\n\n        formatted_buttons = []\n\
          \        for idx, btn in enumerate(buttons_list, start=1):\n           \
          \ btn_html = button_template.format(\n                index=idx,\n     \
          \           id=btn[\"id\"],\n                label=btn[\"label\"]\n    \
          \        )\n            formatted_buttons.append(btn_html)\n\n        final_output\
          \ = f\"{message}\\n\\n\" + \"\\n\".join(formatted_buttons)\n\n        return{\n\
          \            \"result\": final_output\n        }\n\n    elif missing_file_error:\n\
