        code: "import json\n\ndef main():\n\n\t# ── Cron schedule configuration ───────────────────────────────────\n\
          \t# Supports 1 or more executions per day.\n\t# Expressions follow standard\
          \ 5-field cron syntax:\n\t#   minute  hour  day-of-month  month  day-of-week\n\
          \t#\n\t# Examples:\n\t#   \"0 2 * * *\"       — daily at 02:00 UTC\n\t#\
          \   \"0 9,18 * * *\"    — twice daily at 09:00 and 18:00 UTC\n\t#   \"0\
          \ */6 * * *\"     — every 6 hours\n\t#   \"0 8 * * 1-5\"     — weekdays\
          \ at 08:00 UTC\n\t#   \"*/30 * * * *\"    — every 30 minutes\n\n\tCRON_CONFIG\
          \ = {\n\t\t\"schedules\": [\n\t\t\t{\"expression\": \"0 2 * * *\",  \"label\"\
          : \"nightly_02_utc\"},\n\t\t\t{\"expression\": \"0 14 * * *\", \"label\"\
          : \"afternoon_14_utc\"},\n\t\t],\n\t\t\"timezone\": \"UTC\",\n\t\t\"max_retries\"\
          : 3,\n\t\t\"retry_delay_seconds\": 60,\n\t\t\"timeout_seconds\": 120,\n\t\
          \t\"notify_on_failure\": True,\n\t\t\"skip_if_no_change\": True,\n\t}\n\n\
          \tcron_config_json  = json.dumps(CRON_CONFIG, indent=2)\n\tschedule_count\
          \    = len(CRON_CONFIG[\"schedules\"])\n\tschedule_labels   = \", \".join(s[\"\
          label\"] for s in CRON_CONFIG[\"schedules\"])\n\tschedule_exprs    = \"\
          , \".join(s[\"expression\"] for s in CRON_CONFIG[\"schedules\"])\n\t\n\t\
          return {\n\t\t\"cron_config_json\": cron_config_json,\n\t\t\"schedule_count\"\
          : schedule_count,\n\t\t\"schedule_labels\": schedule_labels,\n\t\t\"schedule_exprs\"\
          : schedule_exprs\n    }"
        code_language: python3
        desc: Defines the cron schedule configuration. Supports multiple expressions
