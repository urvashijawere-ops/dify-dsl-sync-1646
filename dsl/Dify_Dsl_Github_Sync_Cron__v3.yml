    - data:
        code: "import re\nimport json\n\ndef main(CONFIG_PY: str, DIFY_CLIENT_PY:\
          \ str, GITHUB_CLIENT_PY: str, SYNC_SERVICE_PY: str, SYNC_SCRIPT_PY: str):\n\
          \tdef extract_python(text: str, label: str) -> str:\n\t\tm = re.search(r'```python\\\
          s*\\n([\\s\\S]*?)```', text)\n\t\tsrc = m.group(1).rstrip() if m else text.strip()\n\
          \t\tif not src:\n\t\t\traise ValueError(\n\t\t\t\tf'[{label}] No Python\
          \ source extracted — '\n\t\t\t\t'LLM node returned no ```python``` code\
          \ block.'\n\t\t\t)\n\t\treturn src\n\n\n\tbundle = {\n\t\t'config.py': \
          \       extract_python(CONFIG_PY,        'config.py'),\n\t\t'dify_client.py':\
          \   extract_python(DIFY_CLIENT_PY,   'dify_client.py'),\n\t\t'github_client.py':\
          \ extract_python(GITHUB_CLIENT_PY, 'github_client.py'),\n\t\t'sync_service.py':\
          \  extract_python(SYNC_SERVICE_PY,  'sync_service.py'),\n\t\t'sync.py':\
          \          extract_python(SYNC_SCRIPT_PY,   'sync.py'),\n\t}\n\n\treturn\
          \ {\n        \"files_bundle\": json.dumps(bundle, ensure_ascii=False),\n\
          \        \"file_count\": len(bundle),\n        \"file_names\": ', '.join(bundle.keys())\n\
          \    }"
