        - id: usr-script
          role: user
          text: "Output sync.py exactly as follows:\n\n```python\n\"\"\"\nsync.py\
            \ — Dify DSL to GitHub sync script.\n\nDesigned to run as a standalone\
            \ cron job. No web server required.\n\nCron schedule examples (add to\
            \ crontab with: crontab -e):\n    0 2 * * *       python /path/to/sync.py\
            \          # daily at 02:00 UTC\n    0 2,14 * * *    python /path/to/sync.py\
            \          # twice daily\n    0 */6 * * *     python /path/to/sync.py\
            \          # every 6 hours\n    0 8 * * 1-5     python /path/to/sync.py\
            \          # weekdays at 08:00 UTC\n\nEnvironment variables (set in .env\
            \ or as system env vars):\n    DIFY_HOST            Dify Cloud URL (default:\
            \ https://cloud.dify.ai)\n    DIFY_ACCESS_TOKEN    Bearer token from browser\
            \ DevTools Local Storage\n    DIFY_APP_ID          UUID of the Dify app\
            \ to export\n    DIFY_APP_NAME        Short name used in commit messages\n\
            \    GITHUB_TOKEN         Personal Access Token with repo scope\n    GITHUB_OWNER\
            \         Repository owner or organisation\n    GITHUB_REPO          Repository\
            \ name\n    GITHUB_BRANCH        Target branch (default: main)\n    GITHUB_FILE_PATH\
            \     Destination path in repo (default: dsl/app.yml)\n\nExit codes:\n\
            \    0  — committed or no_change (success)\n    1  — error or token_expired\
            \ (failure — cron will log to syslog)\n\"\"\"\n\nimport asyncio\nimport\
            \ logging\nimport sys\nfrom datetime import datetime, timezone\n\nfrom\
            \ sync_service import sync_service\n\nlogging.basicConfig(\n    level=logging.INFO,\n\
            \    format='%(asctime)s  %(levelname)-8s  %(message)s',\n    datefmt='%Y-%m-%d\
            \ %H:%M:%S',\n    handlers=[\n        logging.StreamHandler(sys.stdout),\n\
            \    ],\n)\nlog = logging.getLogger(__name__)\n\n\nasync def main() ->\
            \ int:\n    started_at = datetime.now(timezone.utc).isoformat()\n    log.info('Dify\
            \ DSL sync started — %s', started_at)\n\n    result = await sync_service.run()\n\
            \n    log.info('Status        : %s', result.status)\n    log.info('Committed\
            \     : %s', result.committed)\n    log.info('Message       : %s', result.message)\n\
            \n    if result.committed:\n        log.info('Commit URL    : %s', result.commit_url)\n\
            \        log.info('Lines changed : %d', result.lines_changed)\n\n    if\
            \ result.status == 'token_expired':\n        log.error(\n            'ACTION\
            \ REQUIRED: DIFY_ACCESS_TOKEN has expired.\\n'\n            '  1. Go to\
            \ https://cloud.dify.ai and log in.\\n'\n            '  2. Open DevTools\
            \ > Application > Local Storage > access_token.\\n'\n            '  3.\
            \ Copy the value and update DIFY_ACCESS_TOKEN in your .env file.\\n'\n\
            \            '  4. Re-run this script to verify.'\n        )\n       \
            \ return 1\n\n    if result.status == 'error':\n        log.error('Sync\
            \ failed: %s', result.message)\n        return 1\n\n    log.info('Sync\
            \ complete.')\n    return 0\n\n\nif __name__ == '__main__':\n    sys.exit(asyncio.run(main()))\n\
            ```"
